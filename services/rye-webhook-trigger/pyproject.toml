[project]
name = "rye-webhook-trigger"
version = "0.1.0"
description = "Lightweight webhook trigger for ryeos-node — stdlib only, no engine dependency"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
rye-webhook-trigger = "rye_webhook_trigger:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rye_webhook_trigger"]
