[project]
name = "ryeos-remote-mcp"
version = "0.1.0"
description = "Stateless MCP-over-HTTP proxy for ryeos-remote"
requires-python = ">=3.12"
dependencies = [
    "mcp>=1.0.0",
    "starlette>=0.36.0",
    "httpx>=0.27.0",
    "uvicorn[standard]>=0.27.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ryeos_remote_mcp"]
