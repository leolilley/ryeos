[package]
name = "lillux"
version = "0.1.0"
edition = "2021"
description = "Lillux microkernel — Execute, Memory, Identity, Time"
license = "MIT"
repository = "https://github.com/leolilley/ryeos"

[[bin]]
name = "lillux"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde_json = "1"
ed25519-dalek = { version = "2", features = ["pkcs8", "rand_core", "pem"] }
sha2 = "0.10"
base64 = "0.22"
rand = "0.8"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = [
    "Win32_Foundation",
    "Win32_System_Threading",
    "Win32_Security",
] }

[profile.release]
strip = true
lto = true
