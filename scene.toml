# Rye OS TUI Scene Configuration
#
# Edit this file and save — the TUI hot-reloads changes automatically.
# Delete the file to regenerate defaults.

[animation]
# Milliseconds between frames (lower = smoother but more CPU)
tick_ms = 66

[scene]
# Global speed multiplier (1.0 = normal, 0.5 = half speed, 2.0 = double)
speed = 1.0

# Shard (central crystal)
shard.rotation_hz = 0.04
shard.bob_hz = 0.3
shard.bob_amplitude = 0.5
shard.size = 0.015

# Root (whole system)
root.breathe_hz = 0.05
root.breathe_amplitude = 0.15
root.rotation_hz = 0.001

# Spinner speed multiplier (applied to all rings)
spinner.speed_multiplier = 10.0

# Particle streams
stream.speed = 0.08

[camera]
theta = 0.0
phi = 1.427      # PI/2.2
radius = 45.0
fov_degrees = 55.0

[colors]
# Gruvbox Dark palette
background = [0x1d, 0x20, 0x21]
inner_ring = [0xfe, 0x80, 0x19]   # orange
mid_ring = [0x83, 0xa5, 0x98]     # blue-gray
outer_ring = [0xd3, 0x86, 0x9b]   # purple
shard = [0xfe, 0x80, 0x19]        # orange
star = [0xeb, 0xdb, 0xb2]         # light
stream = [0xfa, 0xbd, 0x2f]       # yellow
fragment = [0xfe, 0x80, 0x19]     # orange
fog = [0x25, 0x28, 0x29]          # slightly warmer than bg

[fog]
# Depth fog strength (0 = no fog, 1 = max fog)
strength = 0.7

[stars]
count = 2200
min_radius = 60.0
max_radius = 380.0
min_size = 0.4
max_size = 2.6
twinkle_min = 0.3
twinkle_max = 2.5

