# rye:signed:2026-03-11T09:47:33Z:31e3242581ffe492e005529ef4b6568ecbf95362f408a7167edbc5e45650bb07:Mblj0igImPBI07C-XUHQe1KzbBLekz60v90lPaIEZQRr9PUozunVCgl0OZuof2tUgO0tdV14WeSccccoNcG1BA==:4b987fd4e40303ac
version: "1.0.0"
tool_type: graph
executor_id: rye/core/runtimes/state-graph/runtime
category: graphs
description: "Read a Python file, analyze it with an LLM, and produce a structured report"
permissions:
  - rye.execute.tool.*
  - rye.execute.directive.*
  - rye.fetch.*

config_schema:
  type: object
  properties:
    file_path:
      type: string
      description: "Path to the Python file to analyze (relative to project)"
    output_dir:
      type: string
      default: "graph-output"
      description: "Output directory for reports"
  required: [file_path]

config:
  start: read_file
  max_steps: 15

  nodes:
    read_file:
      action:
        primary: execute
        item_type: tool
        item_id: rye/bash
        params:
          command: "cat ${inputs.file_path}"
      assign:
        source_code: "${result.stdout}"
      next: analyze

    analyze:
      action:
        primary: execute
        item_type: tool
        item_id: rye/agent/threads/thread_directive
        params:
          directive_id: test/graphs/analyze_code
          inputs:
            code_snippet: "${state.source_code}"
            output_path: "${inputs.output_dir}/analysis.json"
          limit_overrides:
            turns: 6
            spend: 0.05
      assign:
        analysis_result: "${result.result}"
        thread_id: "${result.thread_id}"
      next: read_analysis

    read_analysis:
      action:
        primary: execute
        item_type: tool
        item_id: rye/bash
        params:
          command: "cat ${inputs.output_dir}/analysis.json 2>/dev/null || echo '{\"error\": \"file not found\"}'"
      assign:
        analysis_json: "${result.stdout}"
      next: write_report

    write_report:
      action:
        primary: execute
        item_type: tool
        item_id: rye/bash
        params:
          command: "mkdir -p ${inputs.output_dir} && echo '# Code Analysis Report\n\n## Source File\n${inputs.file_path}\n\n## Analysis\n${state.analysis_json}\n\n## Thread\n${state.thread_id}' > ${inputs.output_dir}/report.md"
      assign:
        report_written: "${result.success}"
      next: done

    done:
      type: return
