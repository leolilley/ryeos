# ryeos:signed:2026-05-10T12:24:06Z:dd1bff88259181c5a90a5296ae4f962655dae67a4cc637b9f20e0475cbb0127e:hbOOXSb/Lgx9QTx88rRg5j0Tk69lSRg/ATLUinDWi2R1oXPI35d5hi70CeX6Dur5jpclQN6JBnwAy6oUVskqDg==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
category: "ryeos/agent/providers/openai"
tool_id: openai
tool_type: http
version: "1.0.0"
description: "OpenAI Chat Completions API provider for thread execution"
executor_id: ryeos/core/primitives/execute

requires:
  - net.call

tier_mapping:
  fast: "gpt-4o-mini"
  general: "gpt-4o-mini"
  high: "gpt-4o"
  max: "o3"

# Per-million-token pricing (USD)
pricing:
  gpt-4o:
    input: 2.50
    output: 10.00
  gpt-4o-mini:
    input: 0.15
    output: 0.60
  o3:
    input: 2.00
    output: 8.00
  o3-mini:
    input: 1.10
    output: 4.40
  o4-mini:
    input: 1.10
    output: 4.40

env_config:
  env:
    OPENAI_API_KEY: "${OPENAI_API_KEY}"

config:
  method: POST
  url: "https://api.openai.com/v1/chat/completions"

  auth:
    type: bearer
    token: "${OPENAI_API_KEY}"

  headers:
    Content-Type: application/json

  body:
    model: "{model}"
    max_tokens: "{max_tokens}"
    messages: "{messages}"
    tools: "{tools}"
    stream: "{stream}"

  timeout: 120

  retry:
    max_attempts: 2
    backoff: exponential

parameters:
  - name: model
    type: string
    required: true
    default: "gpt-4o-mini"
  - name: max_tokens
    type: integer
    required: false
    default: 4096
  - name: messages
    type: array
    required: true
    description: "Array of {role, content} message objects"
  - name: tools
    type: array
    required: false
    default: []
    description: "Array of tool definitions for function calling"

tool_use:
  mode: native

  tool_definition:
    type: function
    function:
      name: "{name}"
      description: "{description}"
      parameters: "{schema}"

  response_schema:
    content_mode: separate
    content_path: "choices.0.message"
    text_field: "content"
    tool_calls_field: "tool_calls"
    tool_call_name: "function.name"
    tool_call_input: "function.arguments"
    tool_call_input_format: json_string
    tool_call_id: "id"
    usage_path: "usage"
    input_tokens: "prompt_tokens"
    output_tokens: "completion_tokens"
    finish_reason_path: "choices.0.finish_reason"
    finish_reason_tool_use: "tool_calls"

  message_schema:
    role_map: {user: "user", assistant: "assistant"}
    content_key: "content"
    content_wrap: "string"
    tool_result:
      role: "tool"
      wrap_mode: "direct"
      block_template:
        tool_call_id: "{tool_call_id}"
        content: "{content}"
    tool_call_block_template:
      type: "function"
      id: "{id}"
      function:
        name: "{name}"
        arguments: "{input_json}"

  stream_schema:
    stream_mode: "delta_merge"
    done_signal: "[DONE]"
    choices_field: "choices"
    delta_field: "delta"
    text_delta_field: "content"
    tool_calls_field: "tool_calls"
    tool_call_index_field: "index"
    tool_call_id_field: "id"
    tool_call_func_path: "function"
    tool_call_name_field: "name"
    tool_call_args_field: "arguments"
    finish_reason_field: "finish_reason"
    usage_path: "usage"
    input_tokens_field: "prompt_tokens"
    output_tokens_field: "completion_tokens"