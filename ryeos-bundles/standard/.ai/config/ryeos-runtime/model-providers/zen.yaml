profiles:
  # Claude family — Zen converts our /chat/completions calls to
  # Anthropic's Messages API server-side; we don't need to call /messages
  # directly. This profile exists so Anthropic-specific stream framing
  # can be set if Zen ever exposes it.
  - name: anthropic
    match: ["claude-*"]
    # Inherits everything from base (URL, auth, schemas, headers).

  # OpenAI-compat — explicit profile for clarity even though it equals
  # the base config. Future per-model overrides slot here cleanly.
  - name: openai_compat
    match:
      - "gpt-*"
      - "minimax-*"
      - "glm-*"
      - "kimi-*"
      - "qwen*"
      - "big-pickle"
      - "trinity-*"
      - "nemotron-*"
      - "hy3-*"

  # Gemini — Zen routes Gemini through GCP's API which rejects the
  # default `Authorization: Bearer ...` header and demands
  # `x-goog-api-key`. Profile swaps the auth header without changing
  # the env var (still ZEN_API_KEY in the vault).
  - name: gemini
    match: ["gemini-*"]
    base_url: "https://opencode.ai/zen/v1/models/{model}:streamGenerateContent"
    auth:
      env_var: ZEN_API_KEY
      header_name: x-goog-api-key
      prefix: ""
    extra:
      stream_url: ""   # base_url is the full endpoint

extra:
  stream_url: "/chat/completions"
  available_models:
    claude: [claude-opus-4-7, claude-opus-4-6, claude-opus-4-5, claude-opus-4-1,
             claude-sonnet-4-6, claude-sonnet-4-5, claude-sonnet-4, claude-haiku-4-5]
    openai: [gpt-5.5, gpt-5.5-pro, gpt-5.4, gpt-5.4-pro, gpt-5.4-mini, gpt-5.4-nano,
             gpt-5.3-codex-spark, gpt-5.3-codex, gpt-5.2, gpt-5.2-codex,
             gpt-5.1, gpt-5.1-codex-max, gpt-5.1-codex, gpt-5.1-codex-mini,
             gpt-5, gpt-5-codex, gpt-5-nano]
    open_weights: [glm-5.1, glm-5, minimax-m2.7, minimax-m2.5, kimi-k2.6,
                   kimi-k2.5, qwen3.6-plus, qwen3.5-plus]
    gemini: [gemini-3.1-pro, gemini-3-flash]
    free: [big-pickle, minimax-m2.5-free, hy3-preview-free,
           trinity-large-preview-free, nemotron-3-super-free]
