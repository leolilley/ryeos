# ryeos:signed:2026-05-09T23:50:18Z:46df26ba9475ab332733d70cbff2dbb76aedc1d97df6fd086221a388c6644503:nkDbsqlQXjgPDiGNS70tQaea4BfRLj8j67bJrrH5zf+1/XoWwNwzx3qH6boM5AwPVGuhYoLJvYbOFyWNbJf4BA==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
category: "ryeos-runtime/model-providers"
family: chat_completions
base_url: "https://opencode.ai/zen/v1"
auth:
  env_var: ZEN_API_KEY
  header_name: Authorization
  prefix: "Bearer "
headers:
  Content-Type: application/json
schemas:
  messages:
    role_map: {user: user, assistant: assistant, system: system, tool: tool}
    content_key: content
    system_message: {mode: message_role}
    tool_result:
      role: tool
      wrap_mode: direct
      block_template:
        tool_call_id: "{tool_call_id}"
        content: "{content}"
    tool_call_block_template:
      id: "{id}"
      type: function
      function:
        name: "{name}"
        arguments: "{input_json}"
  tools:
    template:
      type: function
      function:
        name: "{name}"
        description: "{description}"
        parameters: "{schema}"
  streaming: {mode: delta_merge}
body_template:
  model: "{model}"
  messages: "{messages}"
  tools: "{tools}"
  stream: "{stream}"
  stream_options:
    include_usage: true
pricing:
  input_per_million: 0.0
  output_per_million: 0.0
  models:
    # Claude
    claude-haiku-4-5:    {input_per_million: 0.80, output_per_million: 4.00}
    claude-sonnet-4:     {input_per_million: 3.00, output_per_million: 15.00}
    claude-sonnet-4-5:   {input_per_million: 3.00, output_per_million: 15.00}
    claude-sonnet-4-6:   {input_per_million: 3.00, output_per_million: 15.00}
    claude-opus-4-1:     {input_per_million: 15.00, output_per_million: 75.00}
    claude-opus-4-5:     {input_per_million: 15.00, output_per_million: 75.00}
    claude-opus-4-6:     {input_per_million: 15.00, output_per_million: 75.00}
    claude-opus-4-7:     {input_per_million: 15.00, output_per_million: 75.00}
    # OpenAI
    gpt-5.4-nano:        {input_per_million: 0.10, output_per_million: 0.40}
    gpt-5.4-mini:        {input_per_million: 0.30, output_per_million: 1.20}
    gpt-5.4:             {input_per_million: 1.25, output_per_million: 10.00}
    gpt-5.4-pro:         {input_per_million: 5.00, output_per_million: 30.00}
    gpt-5.5:             {input_per_million: 1.25, output_per_million: 10.00}
    gpt-5.5-pro:         {input_per_million: 5.00, output_per_million: 30.00}
    # Open-weights (free or near-free)
    minimax-m2.5-free:   {input_per_million: 0.00, output_per_million: 0.00}
    big-pickle:          {input_per_million: 0.00, output_per_million: 0.00}
    trinity-large-preview-free: {input_per_million: 0.00, output_per_million: 0.00}
    nemotron-3-super-free: {input_per_million: 0.00, output_per_million: 0.00}
    hy3-preview-free:    {input_per_million: 0.00, output_per_million: 0.00}
    minimax-m2.5:        {input_per_million: 1.10, output_per_million: 4.40}
    glm-5:               {input_per_million: 0.50, output_per_million: 2.00}
    glm-5.1:             {input_per_million: 0.50, output_per_million: 2.00}
    kimi-k2.5:           {input_per_million: 1.10, output_per_million: 4.40}
    kimi-k2.6:           {input_per_million: 1.10, output_per_million: 4.40}
    qwen3.5-plus:        {input_per_million: 2.00, output_per_million: 8.00}
    qwen3.6-plus:        {input_per_million: 2.00, output_per_million: 8.00}
    # Gemini (via Zen's Gemini routing)
    gemini-3-flash:      {input_per_million: 0.10, output_per_million: 0.40}
    gemini-3.1-pro:      {input_per_million: 1.25, output_per_million: 10.00}

profiles:
  # ── Anthropic Messages API (Claude family routed through Zen's /v1/messages) ──
  - name: anthropic
    match: ["claude-*"]
    family: anthropic_messages
    base_url: "https://opencode.ai/zen/v1/messages"
    auth:
      env_var: ZEN_API_KEY
      header_name: x-api-key
      prefix: ""
    headers:
      anthropic-version: "2023-06-01"
    body_template:
      model: "{model}"
      max_tokens: "{max_tokens}"
      messages: "{messages}"
      tools: "{tools}"
      stream: "{stream}"
    body_extra:
      max_tokens: 8192
    schemas:
      messages:
        role_map: {user: user, assistant: assistant}
        content_key: content
        text_placement: blocks_array
        text_block_template:
          type: text
          text: "{text}"
        assistant_tool_calls_placement: inline_blocks
        system_message:
          mode: body_field
          field: system
        tool_result:
          role: user
          wrap_mode: content_blocks
          block_template:
            type: tool_result
            tool_use_id: "{tool_call_id}"
            content: "{content}"
        tool_call_block_template:
          type: tool_use
          id: "{id}"
          name: "{name}"
          input: "{input}"
      tools:
        template:
          name: "{name}"
          description: "{description}"
          input_schema: "{schema}"
      streaming:
        mode: event_typed
    extra:
      stream_url: ""

  # OpenAI-compat — Zen's default /chat/completions endpoint.
  # Uses the base body_template (same shape) with no overrides.
  - name: openai_compat
    match:
      - "gpt-*"
      - "minimax-*"
      - "glm-*"
      - "kimi-*"
      - "qwen*"
      - "big-pickle"
      - "trinity-*"
      - "nemotron-*"
      - "hy3-*"

  # ── Gemini (native Google API via Zen's :streamGenerateContent endpoint) ──
  - name: gemini
    match: ["gemini-*"]
    family: google_generate_content
    base_url: "https://opencode.ai/zen/v1/models/{model}:streamGenerateContent?alt=sse"
    auth:
      env_var: ZEN_API_KEY
      header_name: x-goog-api-key
      prefix: ""
    body_template:
      contents: "{messages}"
    body_extra:
      generationConfig:
        maxOutputTokens: 4096
        thinkingConfig:
          includeThoughts: true
          thinkingLevel: low
    schemas:
      messages:
        role_map: {user: user, assistant: model}
        content_key: parts
        text_placement: parts_array
        assistant_tool_calls_placement: inline_blocks
        text_block_template:
          text: "{text}"
        system_message:
          mode: body_inject
          template:
            systemInstruction:
              parts:
                - text: "{system}"
        tool_result:
          role: user
          wrap_mode: content_blocks
          block_template:
            functionResponse:
              name: "{tool_name}"
              response:
                content: "{content}"
        tool_call_block_template:
          functionCall:
            name: "{name}"
            args: "{input}"
      tools:
        template:
          name: "{name}"
          description: "{description}"
          parameters: "{schema}"
        list_wrap: functionDeclarations
      streaming:
        mode: complete_chunks
        paths:
          content_path: "candidates.0.content.parts"
          text_field: text
          thought_field: thought
          tool_call_field: functionCall
          tool_call_name_path: "functionCall.name"
          tool_call_args_path: "functionCall.args"
          usage_path: usageMetadata
          input_tokens_field: promptTokenCount
          output_tokens_field: candidatesTokenCount
          finish_reason_path: "candidates.0.finishReason"
    extra:
      stream_url: ""

extra:
  stream_url: "/chat/completions"
  available_models:
    claude: [claude-opus-4-7, claude-opus-4-6, claude-opus-4-5, claude-opus-4-1,
             claude-sonnet-4-6, claude-sonnet-4-5, claude-sonnet-4, claude-haiku-4-5]
    openai: [gpt-5.5, gpt-5.5-pro, gpt-5.4, gpt-5.4-pro, gpt-5.4-mini, gpt-5.4-nano,
             gpt-5.3-codex-spark, gpt-5.3-codex, gpt-5.2, gpt-5.2-codex,
             gpt-5.1, gpt-5.1-codex-max, gpt-5.1-codex, gpt-5.1-codex-mini,
             gpt-5, gpt-5-codex, gpt-5-nano]
    open_weights: [glm-5.1, glm-5, minimax-m2.7, minimax-m2.5, kimi-k2.6,
                   kimi-k2.5, qwen3.6-plus, qwen3.5-plus]
    gemini: [gemini-3.1-pro, gemini-3-flash]
    free: [big-pickle, minimax-m2.5-free, hy3-preview-free,
           trinity-large-preview-free, nemotron-3-super-free]
