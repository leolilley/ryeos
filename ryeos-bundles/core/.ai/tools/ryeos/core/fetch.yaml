category: "ryeos/core"
name: "fetch"
executor_id: "@subprocess"
required_caps: ["bundle.read"]
description: "Resolve, optionally verify, and read an item via the engine"

config:
  command: "bin:ryeos-core-tools"
  args:
    - "fetch"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 60

config_schema:
  type: object
  properties:
    item_ref:
      type: string
      description: "Canonical ref to fetch (e.g. tool:ryeos/core/fetch)"
    with_content:
      type: boolean
      description: "Include the full file content in the report"
      default: false
    verify:
      type: boolean
      description: "Also verify trust status"
      default: false
    project_path:
      type: string
      description: "Project root path"
  required: [item_ref]
