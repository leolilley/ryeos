# ryeos:signed:2026-05-10T06:33:15Z:e2b04f65615d231ab8e92f7941117c54da360a547e93a817f9cc736be0a6436d:FQRpCW+XQlxygOfJkVaMd84qMBENB/G4ZtIcEsdU3uvvZfGUoveeHAdO5NnHYOYu1mT4Tgpb/5zU7e8s/16/AQ==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
version: "1.0.0"
executor_id: "@subprocess"
category: "ryeos/core"
description: "Sign a Rye item by canonical ref after running the path-anchoring validator."

config:
  command: "bin:ryeos-core-tools"
  args:
    - "sign"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 60

config_schema:
  type: object
  properties:
    item_ref:
      type: string
      description: "Canonical ref of the item to sign, e.g. directive:hello"
    project_path:
      type: string
      description: "Project root (parent of .ai/). Defaults to caller cwd."
    source:
      type: string
      enum: [project, user]
      description: "Where to look for the item. `system` is rejected (bundle items are signed by their author key)."
      default: project
  required: [item_ref]
