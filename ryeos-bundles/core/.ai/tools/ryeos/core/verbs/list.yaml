category: "ryeos/core/verbs"
executor_id: "@subprocess"
description: "List all known verbs and their aliases from installed bundles"

config:
  command: "python3"
  args:
    - "{tool_path}"
  input_data: "{params_json}"
  timeout_secs: 30

config_schema:
  type: object
  properties:
    surface:
      type: string
      description: "Filter aliases by surface (e.g. 'cli'). Omit for all."
    project_path:
      type: string
      description: "Project root path (used to discover bundle roots)"
  required: []
