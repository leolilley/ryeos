# rye:unsigned
version: "1.0.0"
tool_type: subprocess
__executor_id__: null
category: rye/core/subprocess
description: "Subprocess execute - run commands with configurable arguments (terminal node)"

config_schema:
  type: object
  properties:
    command:
      type: string
      description: Command to execute
    args:
      type: array
      items:
        type: string
      description: Command arguments
    cwd:
      type: string
      description: Working directory
    env:
      type: object
      description: Environment variables
    timeout_secs:
      type: integer
      default: 300
      description: Timeout in seconds
    input_data:
      type: string
      description: Data to pipe to stdin
  required: [command]
