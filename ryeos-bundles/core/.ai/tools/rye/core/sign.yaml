# rye:signed:2026-04-29T05:50:26Z:395394a7d5b6da6893c199a32052a2c113cc9eb6792c7652b6773b5a9a526bd8:xUv5GziwFOM9rknpMSUPdTTmz2GNtRxmcW/He08ttFfUbGWoQPn2bIvXf6P9rivuDNvUf8re2Qyu9EU9B/IiAA==:09674c8998e9dd01bfc40ec9f8c4b6b2c1bd01333842582a9c34b3c7db5aa86c
version: "1.0.0"
executor_id: "@subprocess"
category: "rye/core"
description: "Sign a Rye item by canonical ref after running the path-anchoring validator."

config:
  command: "rye-sign"
  args:
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 60

config_schema:
  type: object
  properties:
    item_ref:
      type: string
      description: "Canonical ref of the item to sign, e.g. directive:hello"
    project_path:
      type: string
      description: "Project root (parent of .ai/). Defaults to caller cwd."
    source:
      type: string
      enum: [project, user]
      description: "Where to look for the item. `system` is rejected (bundle items are signed by their author key)."
      default: project
  required: [item_ref]
