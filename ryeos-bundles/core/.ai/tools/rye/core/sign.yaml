# rye:signed:2026-05-01T23:24:09Z:0d79b95bce840694d82077a56f54eb5ccaae19c01371eea4f0c94cd925923c21:4amduAvKYCs7PD68+Ej7486DK89hxpQg8JJkTAlnU54JTyH0FSBZOxuFGCRk6vdprtWKv3Bmp9S5dmz827s0Ag==:09674c8998e9dd01bfc40ec9f8c4b6b2c1bd01333842582a9c34b3c7db5aa86c
version: "1.0.0"
executor_id: "@subprocess"
category: "rye/core"
description: "Sign a Rye item by canonical ref after running the path-anchoring validator."

config:
  command: "bin:rye-sign"
  args:
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 60

config_schema:
  type: object
  properties:
    item_ref:
      type: string
      description: "Canonical ref of the item to sign, e.g. directive:hello"
    project_path:
      type: string
      description: "Project root (parent of .ai/). Defaults to caller cwd."
    source:
      type: string
      enum: [project, user]
      description: "Where to look for the item. `system` is rejected (bundle items are signed by their author key)."
      default: project
  required: [item_ref]
