category: "engine/kinds/graph"
version: "1.0.0"
location:
  directory: graphs
execution:
  # Explicit delegation to the runtime registry. The dispatcher will
  # call `RuntimeRegistry::lookup_for("graph")` to find the default
  # runtime serving this kind (today: `runtime:graph-runtime`).
  # Without this `delegate` block the dispatcher refuses to consult
  # the registry — there is no implicit fallback.
  delegate:
    via: runtime_registry
  thread_profile: graph_run
  resolution:
    - step: resolve_extends_chain
formats:
  - extensions: [".yaml", ".yml"]
    parser: parser:rye/core/yaml/yaml
    signature:
      prefix: "#"
# Empty until graph schema stabilizes — graph-walker enforces fields
# at consumer layer for now.
# Identity composer — this kind has no multi-document composition (no extends chain, no inheritance). Items are loaded as-is.
inventory_kinds: [tool]
composer: rye/core/identity
composed_value_contract:
  root_type: mapping
  required: {}
metadata:
  rules:
    name:
      from: filename
    version:
      from: path
      key: version
    description:
      from: path
      key: description
    category:
      from: path
      key: category
    executor_id:
      from: path
      key: executor_id