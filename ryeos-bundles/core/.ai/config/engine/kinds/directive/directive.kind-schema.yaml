category: "engine/kinds/directive"
version: "1.0.0"
location:
  directory: directives
execution:
  # No `@directive` alias — directive→runtime dispatch is resolved
  # by `RuntimeRegistry::lookup_for("directive")` in the dispatch
  # loop. This is an EXPLICIT, NAMED registry hop (see B2 in the
  # V5.4 advanced-path foundation), not a silent fallback.
  thread_profile: directive_run
  resolution:
    - step: resolve_extends_chain
formats:
  - extensions: [".md"]
    parser: parser:rye/core/markdown/directive
    signature:
      prefix: "<!--"
      suffix: "-->"
composer: rye/core/extends_chain
composer_config:
  extends_field: extends
  fields:
    - name: body
      strategy: root_verbatim
      required: true
      expect_value_type: string
      derive_as: body
    - name: permissions
      strategy: inherit_from_topmost
      expect_value_type: mapping
    - name: context
      strategy: dict_merge_string_seq_root_last
      expect_value_type: mapping
      derive_as: composed_context
      derived_dict_string_seq: true
  policy_facts:
    - name: effective_caps
      path: [permissions, execute]
      expect: array_of_strings
composed_value_contract:
  root_type: mapping
  required:
    body: string
  optional:
    extends: [string, "null"]
    permissions: mapping
    context: mapping
metadata:
  rules:
    name:
      from: path
      key: name
    version:
      from: path
      key: version
    description:
      from: path
      key: description
    category:
      from: path
      key: category