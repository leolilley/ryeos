category: "engine/kinds/service"
version: "1.0.0"
location:
  directory: services
# Service kind is daemon-dispatched (see ryeosd::service_registry +
# ServiceDescriptor table). It is NOT execution-pipeline; no `execution:`
# block. Dispatch happens at /execute via ServiceAvailability lookup.
formats:
  - extensions: [".yaml", ".yml"]
    parser: parser:rye/core/yaml/yaml
    signature:
      prefix: "#"
# Identity composer — service items are loaded as-is.
composer: rye/core/identity
composed_value_contract:
  root_type: mapping
  required: {}
metadata:
  rules:
    name:
      from: path
      key: name
    version:
      from: path
      key: version
    category:
      from: path
      key: category
    endpoint:
      from: path
      key: endpoint
    required_caps:
      from: path_string_seq
      key: required_caps
    description:
      from: path
      key: description