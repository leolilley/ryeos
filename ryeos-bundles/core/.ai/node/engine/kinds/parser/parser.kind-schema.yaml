# rye:signed:2026-05-01T04:58:52Z:92f90ad2509c68a0e4b6074cc76fdb305f5230e3b36fed536dea37e3f4614255:sJFPrE59P/wat6gJahTXmOtvlctDGydSsdfzbfx+a7zmfjC6HVVcAMzFKHiKEUjbK44/Ie/+Hgf5MV+DlTfvDw==:09674c8998e9dd01bfc40ec9f8c4b6b2c1bd01333842582a9c34b3c7db5aa86c
category: "engine/kinds/parser"
version: "1.0.0"
location:
  directory: parsers
formats:
  - extensions: [".yaml"]
    parser: parser:rye/core/yaml/yaml
    signature:
      prefix: "#"
# Empty by design — DESERVES USER ATTENTION.
# Parser descriptors ARE strongly typed (`ParserDescriptor` struct
# with `#[serde(deny_unknown_fields)]` enforces shape at deserialize
# time). The "honest" kind-level contract would require version /
# handler / parser_api_version / output_schema, but the producer
# is the GENERIC `parser:rye/core/yaml/yaml` parser whose
# `output_schema` is `required: {}` — it parses any YAML mapping and
# can't pre-declare per-consumer fields. Forcing a strict contract
# here would crash boot with MissingRequiredField for every parser
# YAML even though `serde_yaml::from_value::<ParserDescriptor>` will
# catch the same problems at the next layer.
# Real enforcement lives in the descriptor deserializer; this slot
# is left empty until the wiring-contract layer learns about
# per-consumer-kind specialisation of generic parsers.
# Identity composer — this kind has no multi-document composition (no extends chain, no inheritance). Items are loaded as-is.
composer: handler:rye/core/identity
composed_value_contract:
  root_type: mapping
  required: {}
metadata:
  rules:
    name:
      from: filename
      required: true
      match: filename
    version:
      from: path
      key: version
    description:
      from: path
      key: description
    category:
      from: path
      key: category
      required: true
      match: path
    handler:
      from: path
      key: handler
# no execution block — parsers are not launcher-executable
