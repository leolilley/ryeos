category: "engine/kinds/config"
version: "1.0.0"
location:
  directory: config
formats:
  - extensions: [".yaml", ".yml"]
    parser: parser:rye/core/yaml/yaml
    signature:
      prefix: "#"
# Each config consumer enforces its own schema — config kind is an
# escape hatch for per-domain configs (execution.yaml, etc.).
# Identity composer — this kind has no multi-document composition (no extends chain, no inheritance). Items are loaded as-is.
composer: rye/core/identity
composed_value_contract:
  root_type: mapping
  required: {}
metadata:
