# rye:signed:2026-04-29T08:29:45Z:42130dc34b2e1de0108839c3ae6449531672d6e8717edec737786c8e876487a4:aU6KyL/2iVod/wtMxqbDTTUOAfRcYrRSJDS/l4ixUd+6NMLA7Ku6zd5s7siAcyCFR5xLlz/GWm2YEdbrlj2+Cw==:09674c8998e9dd01bfc40ec9f8c4b6b2c1bd01333842582a9c34b3c7db5aa86c
category: "engine/kinds/knowledge"
version: "1.0.0"
location:
  directory: knowledge
formats:
  - extensions: [".md"]
    parser: parser:rye/core/markdown/frontmatter
    signature:
      prefix: "<!--"
      suffix: "-->"
  - extensions: [".yaml", ".yml"]
    parser: parser:rye/core/yaml/yaml
    signature:
      prefix: "#"
# Knowledge items have no structural shape requirement at the kind
# level — consumers pull arbitrary structured data from markdown
# frontmatter or yaml documents.
# Identity composer — this kind has no multi-document composition (no extends chain, no inheritance). Items are loaded as-is.
composer: rye/core/identity
composed_value_contract:
  root_type: mapping
  required: {}
metadata:
  rules:
    name:
      from: path
      key: name
      required: true
      match: filename
    version:
      from: path
      key: version
    category:
      from: path
      key: category
      required: true
      match: path