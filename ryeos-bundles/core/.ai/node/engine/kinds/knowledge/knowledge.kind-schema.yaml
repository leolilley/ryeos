# rye:signed:2026-05-02T11:21:57Z:c282f01f6b6f504687e663246c2d13ca9de91c0b219c1f107ae9a46684bb7a5e:YO1vJys0azoDULbzSbwvMxn2fXfwtPHSGNikG/wi2wOjTyr+zyT3l0iQDvNlNvzHPe20tZwTY0Cf9V4XZNn8CA==:09674c8998e9dd01bfc40ec9f8c4b6b2c1bd01333842582a9c34b3c7db5aa86c
category: "engine/kinds/knowledge"
version: "1.0.0"
location:
  directory: knowledge
execution:
  # Op-dispatch execution model. The daemon resolves the requested op
  # (default: `compose`) against the declared operations, validates
  # inputs, then spawns the kind's runtime with a BatchOpEnvelope.
  # Mixed-dispatch reject forbids `operations` + `delegate`/`terminator`.
  operations:
    - name: compose
      side_effects: writes_chain
      dispatch: { via: runtime_registry }
      inputs:
        token_budget:
          type: integer
          required: false
          default: 4000
        exclude_refs:
          type: array
          items:
            type: string
          required: false
          default: []
  default_operation: compose
  thread_profile: knowledge_run
  resolution:
    - step: resolve_references
formats:
  - extensions: [".md"]
    parser: parser:rye/core/markdown/frontmatter
    signature:
      prefix: "<!--"
      suffix: "-->"
  - extensions: [".yaml", ".yml"]
    parser: parser:rye/core/yaml/yaml
    signature:
      prefix: "#"
# Knowledge items have no structural shape requirement at the kind
# level — consumers pull arbitrary structured data from markdown
# frontmatter or yaml documents.
# Identity composer — this kind has no multi-document composition (no extends chain, no inheritance). Items are loaded as-is.
composer: handler:rye/core/identity
composed_value_contract:
  root_type: mapping
  required: {}
metadata:
  rules:
    name:
      from: path
      key: name
      required: true
      match: filename
    version:
      from: path
      key: version
    category:
      from: path
      key: category
      required: true
      match: path