# rye:signed:2026-05-03T14:38:30Z:c25adc37ef5baa06450e5dd2c71f98231315d1a5ceeb086eee46697784124b65:3WxTGgaXGTWitTUEeL6XmQz7dW5xjw8pV1AfvBsSa42XRGcJ+dJNisOBynSv/6CReHjgdjRiZHySb9LllMC0AQ==:09674c8998e9dd01bfc40ec9f8c4b6b2c1bd01333842582a9c34b3c7db5aa86c
category: "engine/kinds/knowledge"
version: "1.0.0"
location:
  directory: knowledge
execution:
  # Op-dispatch execution model. The daemon resolves the requested op
  # (default: `compose`) against the declared operations, validates
  # inputs, then spawns the kind's runtime with a BatchOpEnvelope.
  # Mixed-dispatch reject forbids `operations` + `delegate`/`terminator`.
  operations:
    - name: compose
      side_effects: writes_chain
      dispatch: { via: runtime_registry }
      inputs:
        token_budget:
          type: integer
          required: false
          default: 4000
        exclude_refs:
          type: array
          items:
            type: string
          required: false
          default: []
    - name: compose_positions
      side_effects: writes_projection
      dispatch: { via: runtime_registry }
      inputs:
        roots_by_position:
          type: object
          required: true
        per_position_budget:
          type: object
          required: false
        default_budget:
          type: integer
          required: false
          default: 2000
  default_operation: compose
  thread_profile: knowledge_run
  resolution:
    - step: resolve_references
formats:
  - extensions: [".md"]
    parser: parser:rye/core/markdown/frontmatter
    signature:
      prefix: "<!--"
      suffix: "-->"
  - extensions: [".yaml", ".yml"]
    parser: parser:rye/core/yaml/yaml
    signature:
      prefix: "#"
# Knowledge items have no structural shape requirement at the kind
# level — consumers pull arbitrary structured data from markdown
# frontmatter or yaml documents.
# Identity composer — this kind has no multi-document composition (no extends chain, no inheritance). Items are loaded as-is.
composer: handler:rye/core/identity
composed_value_contract:
  root_type: mapping
  required: {}
metadata:
  rules:
    name:
      from: path
      key: name
      required: true
      match: filename
    version:
      from: path
      key: version
    category:
      from: path
      key: category
      required: true
      match: path