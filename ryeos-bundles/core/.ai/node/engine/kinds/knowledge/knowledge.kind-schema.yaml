# ryeos:signed:2026-05-10T03:17:42Z:14cd9aeb19de4658b79b462381b99955a2ea28167a64301c5112d7954dfc7ff6:tDGqikn4SWAEmwkL4xg6GEOCnGbr9rVPzjZpaQjG/44meAZJU1YJzpKxIsbP8uH/iMYd2RgI53E+A6tTi6XTAw==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
category: "engine/kinds/knowledge"
version: "1.0.0"
location:
  directory: knowledge
execution:
  # Op-dispatch execution model. The daemon resolves the requested op
  # (default: `compose`) against the declared operations, validates
  # inputs, then spawns the kind's runtime with a BatchOpEnvelope.
  # Mixed-dispatch reject forbids `operations` + `delegate`/`terminator`.
  operations:
    - name: compose
      side_effects: writes_chain
      dispatch: { via: runtime_registry }
      inputs:
        token_budget:
          type: integer
          required: false
          default: 4000
        exclude_refs:
          type: array
          items:
            type: string
          required: false
          default: []
    - name: compose_positions
      side_effects: writes_projection
      dispatch: { via: runtime_registry }
      inputs:
        roots_by_position:
          type: object
          required: true
        per_position_budget:
          type: object
          required: false
        default_budget:
          type: integer
          required: false
          default: 2000
  default_operation: compose
  thread_profile: knowledge_run
  resolution:
    - step: resolve_references
formats:
  - extensions: [".md"]
    parser: parser:ryeos/core/markdown/frontmatter
    signature:
      prefix: "<!--"
      suffix: "-->"
  - extensions: [".yaml", ".yml"]
    parser: parser:ryeos/core/yaml/yaml
    signature:
      prefix: "#"
# Knowledge items have no structural shape requirement at the kind
# level — consumers pull arbitrary structured data from markdown
# frontmatter or yaml documents.
# Identity composer — this kind has no multi-document composition (no extends chain, no inheritance). Items are loaded as-is.
composer: handler:ryeos/core/identity
composed_value_contract:
  root_type: mapping
  required: {}
metadata:
  rules:
    name:
      from: path
      key: name
      required: true
      match: filename
    version:
      from: path
      key: version
    category:
      from: path
      key: category
      required: true
      match: path