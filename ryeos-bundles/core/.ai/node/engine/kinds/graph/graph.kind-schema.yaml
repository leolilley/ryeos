# rye:signed:2026-05-05T08:53:04Z:cad7dae6ad788f4e508ce3f73b3a919beefe1c0668bc874e35794fcc9e58c33e:miWxv9qSYU0wNbG/ZzBQNgdS4CftvAQMrYlqDJmL2/7giCJDEYZjbpEwlphhd11jOArAJr5Imkpy25HaStIsAA==:09674c8998e9dd01bfc40ec9f8c4b6b2c1bd01333842582a9c34b3c7db5aa86c
category: "engine/kinds/graph"
version: "1.0.0"
location:
  directory: graphs
execution:
  # Explicit delegation to the runtime registry. The dispatcher will
  # call `RuntimeRegistry::lookup_for("graph")` to find the default
  # runtime serving this kind (today: `runtime:graph-runtime`).
  # Without this `delegate` block the dispatcher refuses to consult
  # the registry — there is no implicit fallback.
  delegate:
    via: runtime_registry
  thread_profile: graph_run
  resolution:
    - step: resolve_extends_chain
formats:
  - extensions: [".yaml", ".yml"]
    parser: parser:rye/core/yaml/yaml
    signature:
      prefix: "#"
# Graph permissions composer — lifts `permissions:` from the graph item
# into `policy_facts.effective_caps` so the daemon-side callback cap
# enforcement (V5.5 P2) gates graph action callbacks the same way it
# gates directive tool callbacks. Replaces the identity composer which
# produced no policy facts (deny-all at the daemon boundary).
composer: handler:rye/core/graph-permissions
composed_value_contract:
  root_type: mapping
  required: {}
  optional:
    config:
      type: single
      prim: mapping
    permissions:
      type: single
      prim: sequence
metadata:
  rules:
    name:
      from: filename
      required: true
      match: filename
    version:
      from: path
      key: version
    description:
      from: path
      key: description
    category:
      from: path
      key: category
      required: true
      match: path
    executor_id:
      from: path
      key: executor_id