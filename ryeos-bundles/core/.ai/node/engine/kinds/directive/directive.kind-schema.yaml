category: "engine/kinds/directive"
version: "1.0.0"
location:
  directory: directives
execution:
  # Explicit delegation to the runtime registry. The dispatcher will
  # call `RuntimeRegistry::lookup_for("directive")` to find the
  # default runtime serving this kind (today: `runtime:directive-runtime`).
  # Without this `delegate` block the dispatcher refuses to consult
  # the registry — there is no implicit fallback.
  delegate:
    via: runtime_registry
  thread_profile: directive_run
  resolution:
    - step: resolve_extends_chain
formats:
  - extensions: [".md"]
    parser: parser:rye/core/markdown/directive
    signature:
      prefix: "<!--"
      suffix: "-->"
inventory_kinds: [tool]
composer: handler:rye/core/extends-chain
composer_config:
  extends_field: extends
  fields:
    - name: body
      strategy: root_verbatim
      required: true
      expect_value_type: string
      derive_as: body
    - name: permissions
      strategy: inherit_from_topmost
      expect_value_type: mapping
    - name: context
      strategy: dict_merge_string_seq_root_last
      expect_value_type: mapping
      derive_as: composed_context
      derived_dict_string_seq: true
  policy_facts:
    - name: effective_caps
      path: [permissions, execute]
      expect: array_of_strings
composed_value_contract:
  root_type: mapping
  required:
    body:
      type: single
      prim: string
  optional:
    extends:
      type: union
      prims: [string, "null"]
    permissions:
      type: single
      prim: mapping
    context:
      type: single
      prim: mapping
metadata:
  rules:
    name:
      from: path
      key: name
      required: true
      match: filename
    version:
      from: path
      key: version
    description:
      from: path
      key: description
    category:
      from: path
      key: category
      required: true
      match: path
    required_secrets:
      from: path_string_seq
      key: required_secrets