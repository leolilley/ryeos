# rye:signed:2026-05-02T11:21:57Z:64d893fbeba148fd1fe6d87bcf90b8e10f4493474769dcd56b89251c1c7a021e:oqFcgUX9mgQQXj7HrvWXq2eEZu98XBCn1J64MdODRRtZXJ1c01z+XARAbUa8+i1Iduep6YjsER32w8tpVgfMBA==:09674c8998e9dd01bfc40ec9f8c4b6b2c1bd01333842582a9c34b3c7db5aa86c
category: "engine/kinds/directive"
version: "1.0.0"
location:
  directory: directives
execution:
  # Explicit delegation to the runtime registry. The dispatcher will
  # call `RuntimeRegistry::lookup_for("directive")` to find the
  # default runtime serving this kind (today: `runtime:directive-runtime`).
  # Without this `delegate` block the dispatcher refuses to consult
  # the registry — there is no implicit fallback.
  delegate:
    via: runtime_registry
  thread_profile: directive_run
  resolution:
    - step: resolve_extends_chain
  # Launch augmentation: before the directive runtime is spawned, the
  # daemon pre-resolves knowledge refs declared in the directive's
  # `context:` block, dispatches a child knowledge-runtime compose
  # op, and writes the rendered strings into `rendered_contexts`.
  # If `composed_context` is missing or empty, the augmentation is a
  # no-op — directives without context blocks are unaffected.
  launch_augmentations:
    - step: compose_context_positions
      target_kind: knowledge
      target_op: compose
      source_derived: composed_context
      output_derived: rendered_contexts
      meta_output_derived: rendered_contexts_meta
      per_position_budget:
        system: 4000
        before: 2000
        after: 2000
formats:
  - extensions: [".md"]
    parser: parser:rye/core/markdown/directive
    signature:
      prefix: "<!--"
      suffix: "-->"
inventory_kinds: [tool]
composer: handler:rye/core/extends-chain
composer_config:
  extends_field: extends
  fields:
    - name: body
      strategy: root_verbatim
      required: true
      expect_value_type: string
      derive_as: body
    - name: permissions
      strategy: inherit_from_topmost
      expect_value_type: mapping
    - name: context
      strategy: dict_merge_string_seq_root_last
      expect_value_type: mapping
      derive_as: composed_context
      derived_dict_string_seq: true
  policy_facts:
    - name: effective_caps
      path: [permissions, execute]
      expect: array_of_strings
composed_value_contract:
  root_type: mapping
  required:
    body:
      type: single
      prim: string
  optional:
    extends:
      type: union
      prims: [string, "null"]
    permissions:
      type: single
      prim: mapping
    context:
      type: single
      prim: mapping
metadata:
  rules:
    name:
      from: path
      key: name
      required: true
      match: filename
    version:
      from: path
      key: version
    description:
      from: path
      key: description
    category:
      from: path
      key: category
      required: true
      match: path
    required_secrets:
      from: path_string_seq
      key: required_secrets