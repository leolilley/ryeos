[package]
name = "ryeos-tools"
version = "0.1.0"
edition = "2021"

[lib]
name = "ryeos_tools"
path = "src/lib.rs"

[dependencies]
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
ryeos-tracing = { path = "../ryeos-tracing" }
clap = { version = "4", features = ["derive"] }
base64 = "0.22"
sha2 = "0.10"
serde_yaml = "0.9"
rmp-serde = "1"

# Engine + state
ryeos-engine = { path = "../ryeos-engine" }
ryeos-state = { path = "../ryeos-state" }

# Required for verify
lillux = { path = "../lillux" }

[dev-dependencies]
tempfile = "3"

[features]
default = []
