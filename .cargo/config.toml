# Tier 1 compile-time / strain-reduction config.
#
# - mold linker via clang for fast link times.
# - codegen-units=256 + incremental=true for fast incremental rebuilds.
# - debug = "line-tables-only" to shrink target/ on disk and reduce I/O.
# - profile.dev.package."*" opt-level=1: pay a small one-time cost to
#   optimize third-party deps, then every link/run is faster.
# - build.jobs = 6: leave 2 cores + ~3 GB RAM headroom on the 8c/15GB
#   machine. Default -j8 swaps under load.

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[profile.dev]
debug = "line-tables-only"
incremental = true
codegen-units = 256

[profile.dev.package."*"]
opt-level = 1

[profile.test]
debug = "line-tables-only"
incremental = true
codegen-units = 256

[profile.test.package."*"]
opt-level = 1

[build]
jobs = 6
