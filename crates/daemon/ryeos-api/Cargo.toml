[package]
name = "ryeos-api"
version = "0.1.0"
edition = "2021"
description = "ryeos-api: HTTP routes, service handlers, remote client, and API state"
license = "MIT"
repository = "https://github.com/leolilley/ryeos"

[dependencies]
anyhow = "1"
arc-swap = "1.9.1"
async-stream = "0.3"
axum = "0.7"
base64 = "0.22"
bytes = "1"
chrono = "0.4"
form_urlencoded = "1"
glob = "0.3"
hmac = "0.12"
lillux = { path = "../../kernel/lillux" }
rand = "0.8"
regex = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
rmp-serde = "1"
ryeos-app = { path = "../../daemon/ryeos-app" }
ryeos-engine = { path = "../../engine/ryeos-engine" }
ryeos-executor = { path = "../../engine/ryeos-executor" }
ryeos-runtime = { path = "../../engine/ryeos-runtime" }
ryeos-scheduler = { path = "../../state/ryeos-scheduler" }
ryeos-state = { path = "../../state/ryeos-state" }
ryeos-bundle = { path = "../../daemon/ryeos-bundle" }
ryeos-tracing = { path = "../../support/ryeos-tracing" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
toml = "0.8"
sha2 = "0.10"
subtle = "2"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v4"] }
tokio-stream = "0.1.18"
tracing = "0.1"
url = "2"

[dev-dependencies]
tempfile = "3"
ryeos-engine = { path = "../../engine/ryeos-engine", features = ["test-support"] }
