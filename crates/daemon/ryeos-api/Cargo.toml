[package]
name = "ryeos-api"
version = "0.1.0"
edition = "2021"
description = "ryeos-api: HTTP routes, service handlers, remote client, and API state"
license = "MIT"
repository = "https://github.com/leolilley/ryeos"

[dependencies]
anyhow = { workspace = true }
arc-swap = { workspace = true }
async-stream = { workspace = true }
axum = { workspace = true, features = ["default"] }
base64 = { workspace = true }
bytes = { workspace = true }
chrono = { workspace = true }
form_urlencoded = { workspace = true }
glob = { workspace = true }
hmac = { workspace = true }
lillux = { workspace = true }
rand = { workspace = true }
regex = { workspace = true }
reqwest = { workspace = true, features = ["json", "rustls-tls"] }
rmp-serde = { workspace = true }
ryeos-app = { workspace = true }
ryeos-engine = { workspace = true }
ryeos-executor = { workspace = true }
ryeos-runtime = { workspace = true }
ryeos-scheduler = { workspace = true }
ryeos-state = { workspace = true }
ryeos-bundle = { workspace = true }
ryeos-tracing = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
toml = { workspace = true }
sha2 = { workspace = true }
subtle = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros", "sync", "net", "time", "process"] }
uuid = { workspace = true }
tokio-stream = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
ryeos-engine = { workspace = true, features = ["test-support"] }
