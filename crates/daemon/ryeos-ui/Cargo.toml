[package]
name = "ryeos-ui"
version = "0.1.0"
edition = "2021"
license.workspace = true
description = "RyeOS UI/browser session handlers and session event substrate"

[dependencies]
anyhow = { workspace = true }
async-stream = { workspace = true }
axum = { workspace = true, features = ["default"] }
lillux = { workspace = true }
rand = { workspace = true }
ryeos-api = { workspace = true }
ryeos-app = { workspace = true }
ryeos-engine = { workspace = true }
ryeos-executor = { workspace = true }
ryeos-runtime = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
sha2 = { workspace = true }
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros", "sync", "time"] }
tokio-stream = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
ryeos-engine = { workspace = true, features = ["test-support"] }
ryeos-runtime = { workspace = true }
ryeos-scheduler = { workspace = true }
