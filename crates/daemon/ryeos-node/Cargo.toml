[package]
name = "ryeos-node"
version = "0.1.0"
edition = "2021"
license.workspace = true

[lib]
name = "ryeos_node"
path = "src/lib.rs"

[dependencies]
anyhow = { workspace = true }
base64 = { workspace = true }
chrono = { workspace = true }
dirs = { workspace = true }
hkdf = { workspace = true }
hex = { workspace = true }
lillux = { workspace = true }
rand = { workspace = true }
rmp-serde = { workspace = true }
ryeos-app = { workspace = true }
ryeos-bundle = { workspace = true }
ryeos-engine = { workspace = true }
ryeos-state = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
sha2 = { workspace = true }
tokio = { workspace = true, features = ["net", "process", "time", "io-util", "macros"] }
tracing = { workspace = true }
zeroize = { workspace = true }

[target.'cfg(unix)'.dependencies]
libc = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
