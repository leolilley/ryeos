[package]
name = "ryeos-tools"
version = "0.5.23"
edition = "2021"

[lib]
name = "ryeos_tools"
path = "src/lib.rs"

[dependencies]
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
ryeos-tracing = { workspace = true }
clap = { workspace = true }
base64 = { workspace = true }
sha2 = { workspace = true }
serde_yaml = { workspace = true }
rmp-serde = { workspace = true }
dirs = { workspace = true }
glob = { workspace = true }
rand = { workspace = true }
toml = { workspace = true }

# Engine + state
ryeos-engine = { workspace = true }
ryeos-state = { workspace = true }
ryeos-runtime = { workspace = true }

# Required for verify
lillux = { workspace = true }

ryeos-vault = { workspace = true }
ryeos-bundle = { workspace = true }
ryeos-app = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[features]
default = []

# Exposes `ryeos_tools::test_support` for downstream test crates that
# need a manifest-stable copy of the `core` bundle (eliminates the
# dev-tree manifest concurrency race documented in
# `docs/operations/dev-tree-caveats.md`).
test-support = []

# ── Unified core tools binary ──────────────────────────────────────
# Subcommands: sign, fetch, verify, identity. Invoked by tool YAMLs
# via `bin:ryeos-core-tools <subcommand>`.
[[bin]]
name = "ryeos-core-tools"
path = "src/bin/ryeos-core-tools.rs"
