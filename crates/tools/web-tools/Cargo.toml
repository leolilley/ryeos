[package]
name = "ryeos-web-tools"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1"
encoding_rs = "0.8"
regex = "1"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
scraper = "0.23"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
url = "2"

[[bin]]
name = "ryeos-web-tools"
path = "src/bin/ryeos-web-tools.rs"
