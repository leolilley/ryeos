[package]
name = "ryeos-node"
version = "0.1.0"
edition = "2021"

[lib]
name = "ryeos_node"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
base64 = "0.22"
dirs = "5"
lillux = { path = "../../kernel/lillux" }
rand = "0.8"
rmp-serde = "1"
ryeos-app = { path = "../app" }
ryeos-bundle = { path = "../bundle" }
ryeos-engine = { path = "../engine" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
tokio = { version = "1", features = ["net", "process", "time", "io-util", "macros"] }
tracing = "0.1"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = "3"
