[package]
name = "ryeos-directive-runtime"
version = "0.1.0"
edition = "2021"
license.workspace = true

[[bin]]
name = "ryeos-directive-runtime"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
clap = { workspace = true }
lillux = { workspace = true }
regex = { workspace = true }
reqwest = { workspace = true, features = ["json", "rustls-tls", "stream"] }
futures-util = { workspace = true }
bytes = { workspace = true }
ryeos-engine = { workspace = true }
ryeos-runtime = { workspace = true }
ryeos-state = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
sha2 = { workspace = true }
signal-hook = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "signal", "io-util", "net"] }
tracing = { workspace = true }
ryeos-tracing = { workspace = true }
base64 = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
ryeos-engine = { workspace = true, features = ["test-support"] }
ryeos-tracing = { workspace = true, features = ["test-harness"] }
