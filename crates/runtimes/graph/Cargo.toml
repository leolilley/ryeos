[package]
name = "ryeos-graph-runtime"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Native graph walker runtime for Rye OS"

[[bin]]
name = "ryeos-graph-runtime"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
clap = { workspace = true, features = ["env"] }
lillux = { workspace = true }
rand = { workspace = true }
regex = { workspace = true }
ryeos-bundle = { workspace = true }
ryeos-runtime = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
sha2 = { workspace = true }
signal-hook = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "process", "io-util", "time"] }
tracing = { workspace = true }
ryeos-tracing = { workspace = true }

[target.'cfg(unix)'.dependencies]
libc = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
ryeos-tracing = { workspace = true, features = ["test-harness"] }
