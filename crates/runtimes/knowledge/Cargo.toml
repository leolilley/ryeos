[package]
name = "ryeos-knowledge-runtime"
version = "0.2.0"
edition = "2021"
license.workspace = true
description = "Native Rust runtime for the knowledge kind. Spawned via lillux::run by ryeosd. Single-mode op dispatcher over verified knowledge graphs."

[[bin]]
name = "ryeos-knowledge-runtime"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
ryeos-runtime = { workspace = true }
ryeos-tracing = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
thiserror = { workspace = true }
tiktoken-rs = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "net", "io-util"] }
tracing = { workspace = true }
