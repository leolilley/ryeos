[package]
name = "ryeos-ui-web"
version = "0.1.0"
edition = "2021"
description = "Web renderer for Rye OS"

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "web"
path = "src/bin/web.rs"

[dependencies]
ryeos-client-base = { path = "../base" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
anyhow = "1"
base64 = "0.22"
clap = { version = "4", features = ["derive"] }
dirs = "5"
hex = "0.4"
lillux = { path = "../../kernel/lillux" }
rand = "0.8"
reqwest = { version = "0.12", features = ["json"] }
ryeos-engine = { path = "../../engine/ryeos-engine" }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "Window", "Document", "Element", "HtmlElement",
    "HtmlCanvasElement", "CanvasRenderingContext2d",
    "HtmlTextAreaElement", "KeyboardEvent", "MouseEvent",
    "Performance", "console",
] }
serde-wasm-bindgen = "0.6"
getrandom = { version = "0.2", features = ["js"] }
