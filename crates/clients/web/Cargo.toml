[package]
name = "ryeos-tui-web"
version = "0.1.0"
edition = "2021"
description = "Web/WASM TUI renderer for Rye OS"

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "web"
path = "src/bin/web.rs"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
dirs = "5"
lillux = { path = "../../kernel/lillux" }
ryeos-client-base = { path = "../base" }
ryeos-engine = { path = "../../core/engine" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1", features = ["v4"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "Window", "Document", "Element", "HtmlElement",
    "HtmlCanvasElement", "CanvasRenderingContext2d",
    "HtmlTextAreaElement", "KeyboardEvent", "MouseEvent",
    "Performance", "console",
] }
serde-wasm-bindgen = "0.6"
getrandom = { version = "0.2", features = ["js"] }
