[package]
name = "ryeos-client-base"
version = "0.1.0"
edition = "2021"
description = "Renderer-neutral client model, layout, views, text surfaces, scene primitives"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
toml = "0.8"
unicode-width = "0.2"
bitflags = { version = "2", features = ["serde"] }
thiserror = "2"
