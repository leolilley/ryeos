[package]
name = "ryeos-ui-terminal"
version = "0.1.0"
edition = "2021"
description = "Native terminal TUI for Rye OS"

[[bin]]
name = "ryeos-tui"
path = "src/main.rs"

[dependencies]
ryeos-client-base = { workspace = true }
ryeos-cli = { workspace = true }
lillux = { workspace = true }
ed25519-dalek = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "signal", "io-util", "net", "time", "sync"] }
hyper = { workspace = true, features = ["client", "http1"] }
hyper-util = { workspace = true, features = ["http1", "tokio"] }
http-body-util = { workspace = true }
bytes = { workspace = true }
eventsource-stream = "0.2"
futures-util = { workspace = true }
crossterm = { version = "0.29", features = ["event-stream"] }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
thiserror = { workspace = true }
dirs = { workspace = true }
notify = "7"
tracing = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
