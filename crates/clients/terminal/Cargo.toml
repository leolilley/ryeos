[package]
name = "ryeos-client-terminal"
version = "0.1.0"
edition = "2021"
license.workspace = true
description = "Native terminal TUI for Rye OS"

[[bin]]
name = "ryeos-tui"
path = "src/main.rs"

[dependencies]
ryeos-client-base = { workspace = true }
ryeos-cli = { workspace = true }
lillux = { workspace = true }
ed25519-dalek = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "signal", "io-util", "net", "time", "sync"] }
reqwest = { workspace = true, features = ["rustls-tls"] }
eventsource-stream = "0.2"
futures-util = { workspace = true }
crossterm = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
thiserror = { workspace = true }
dirs = { workspace = true }
notify = "8.2"
tracing = { workspace = true }
unicode-width = "0.2"

[dev-dependencies]
tempfile = { workspace = true }
