[package]
name = "ryeos-ui-terminal"
version = "0.1.0"
edition = "2021"
description = "Native terminal TUI for Rye OS"

[[bin]]
name = "ryeos-tui"
path = "src/main.rs"

[dependencies]
ryeos-client-base = { path = "../base" }
ryeos-cli = { path = "../../bin/cli" }
lillux = { path = "../../kernel/lillux" }
ed25519-dalek = { version = "2", features = ["default"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "io-util", "net", "time", "sync"] }
hyper = { version = "1", features = ["client", "http1"] }
hyper-util = { version = "0.1", features = ["client-legacy", "http1", "tokio"] }
http-body-util = "0.1"
bytes = "1"
eventsource-stream = "0.2"
futures-util = "0.3"
crossterm = { version = "0.29", features = ["event-stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
thiserror = "2"
dirs = "6"
notify = "7"
tracing = "0.1"

[dev-dependencies]
tempfile = "3"
