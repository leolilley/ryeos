[package]
name = "ryeos-scheduler"
version = "0.1.0"
edition = "2021"
description = "Scheduler for ryeosd — cron, timers, SQLite projection"
license.workspace = true
repository = "https://github.com/leolilley/ryeos"

[dependencies]
anyhow = { workspace = true }
chrono = { workspace = true }
chrono-tz = { workspace = true }
cron = { workspace = true }
lillux = { workspace = true }
ryeos-engine = { workspace = true }
ryeos-state = { workspace = true }
rusqlite = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros", "sync", "time"] }
tracing = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
ryeos-engine = { workspace = true, features = ["test-support"] }
