[package]
name = "ryeos-tui-core"
version = "0.1.0"
edition = "2021"
description = "Platform-neutral TUI model, layout, views, text surfaces, scene primitives"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
unicode-width = "0.2"
bitflags = { version = "2", features = ["serde"] }
thiserror = "2"
