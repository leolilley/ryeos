[package]
name = "ryeos-tracing"
version = "0.1.0"
edition = "2021"
description = "Shared tracing infrastructure for Rye OS workspace"
license.workspace = true

[features]
default = []
test-harness = []

[dependencies]
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter", "fmt", "json"] }

[dev-dependencies]
tempfile = { workspace = true }
serde_json = { workspace = true }
ryeos-tracing = { workspace = true, features = ["test-harness"] }
ryeos-node = { workspace = true }
