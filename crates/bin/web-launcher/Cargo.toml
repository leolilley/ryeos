[package]
name = "ryeos-web-launcher"
version = "0.1.0"
edition = "2021"
description = "Browser launcher for RyeOS web client"

[[bin]]
name = "ryeos-web-launcher"
path = "src/main.rs"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
dirs = "5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
lillux = { path = "../../kernel/lillux" }
ryeos-engine = { path = "../../core/engine" }
