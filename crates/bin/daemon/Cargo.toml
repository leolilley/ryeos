[package]
name = "ryeosd"
version = "0.5.46"
edition = "2021"
description = "ryeosd daemon - Rust control plane for Rye OS"
license.workspace = true
repository = "https://github.com/leolilley/ryeos"

[lib]
name = "ryeosd"
path = "src/lib.rs"

[[bin]]
name = "ryeosd"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
ryeos-runtime = { workspace = true }
async-stream = { workspace = true }
axum = { workspace = true, features = ["default"] }
base64 = { workspace = true }
clap = { workspace = true }
directories = { workspace = true }
form_urlencoded = { workspace = true }
glob = { workspace = true }
lillux = { workspace = true }
rand = { workspace = true }
rmp-serde = { workspace = true }
ryeos-engine = { workspace = true }
ryeos-isolation-protocol = { workspace = true }
ryeos-node = { workspace = true }
ryeos-state = { workspace = true }
ryeos-scheduler = { workspace = true }
ryeos-app = { workspace = true }
ryeos-executor = { workspace = true }
ryeos-api = { workspace = true }
ryeos-ui = { workspace = true }
rusqlite = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
sha2 = { workspace = true }
hmac = { workspace = true }
toml = { workspace = true }
subtle = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }
ryeos-tracing = { workspace = true }
arc-swap = { workspace = true }
tokio-stream = { workspace = true }
once_cell = { workspace = true }
regex = { workspace = true }
chrono = { workspace = true }
chrono-tz = { workspace = true }
cron = { workspace = true }
reqwest = { workspace = true, features = ["json", "rustls-tls"] }
url = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
ryeos-app = { workspace = true, features = ["test-support"] }
ryeos-engine = { workspace = true, features = ["test-support"] }
ryeos-core-tools = { workspace = true, features = ["test-support"] }
ryeos-runtime = { workspace = true }
ryeos-tracing = { workspace = true, features = ["test-harness"] }
http-body-util = { workspace = true }
hyper = { workspace = true, features = ["server", "http1"] }
hyper-util = { workspace = true, features = ["tokio", "server", "http1"] }
bytes = { workspace = true }

[target.'cfg(unix)'.dependencies]
libc = { workspace = true }
