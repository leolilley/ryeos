[package]
name = "ryeos-cli"
version = "0.5.43"
edition = "2021"
license.workspace = true
description = "CLI for Rye OS"

[[bin]]
name = "ryeos"
path = "src/main.rs"

[dependencies]
anyhow      = { workspace = true }
base64      = { workspace = true }
clap        = { workspace = true }
dirs        = { workspace = true }
hex         = { workspace = true }
libc        = { workspace = true }
rand        = { workspace = true }
reqwest     = { workspace = true, features = ["rustls-tls"] }
serde       = { workspace = true }
serde_json  = { workspace = true }
serde_yaml  = { workspace = true }
thiserror   = { workspace = true }
tokio       = { workspace = true, features = ["rt-multi-thread", "macros", "signal", "io-util", "net"] }
tracing     = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
unicode-width = { workspace = true }

lillux         = { workspace = true }
ryeos-app      = { workspace = true }
ryeos-bundle   = { workspace = true }
ryeos-engine   = { workspace = true }
ryeos-node     = { workspace = true }
ryeos-runtime  = { workspace = true }
ryeos-state    = { workspace = true }
ryeos-core-tools    = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
