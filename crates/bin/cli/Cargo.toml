[package]
name = "ryeos-cli"
version = "0.5.20"
edition = "2021"
description = "CLI for Rye OS"

[[bin]]
name = "ryeos"
path = "src/main.rs"

[dependencies]
anyhow      = { workspace = true }
base64      = { workspace = true }
bytes       = { workspace = true }
clap        = { workspace = true }
dirs        = { workspace = true }
hex         = { workspace = true }
http-body-util = { workspace = true }
hyper       = { workspace = true, features = ["client", "http1"] }
hyper-util  = { workspace = true, features = ["http1", "tokio"] }
rand        = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
serde_yaml  = { workspace = true }
thiserror   = { workspace = true }
tokio       = { workspace = true, features = ["rt-multi-thread", "macros", "signal", "io-util", "net"] }
tracing     = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }

lillux         = { workspace = true }
ryeos-app      = { workspace = true }
ryeos-bundle   = { workspace = true }
ryeos-engine   = { workspace = true }
ryeos-node     = { workspace = true }
ryeos-runtime  = { workspace = true }
ryeos-state    = { workspace = true }
ryeos-tools    = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
