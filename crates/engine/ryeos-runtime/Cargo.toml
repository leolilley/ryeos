[package]
name = "ryeos-runtime"
version = "0.5.49"
edition = "2021"
license.workspace = true
description = "Shared runtime library for Rye OS Rust runtimes"

[lib]
name = "ryeos_runtime"
path = "src/lib.rs"

[features]
default = []

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
base64 = { workspace = true }
lillux = { workspace = true }
ryeos-engine = { workspace = true }
ryeos-state = { workspace = true }
regex = { workspace = true }
rmp-serde = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["io-util", "net", "rt-multi-thread", "macros", "sync", "time"] }
tracing = { workspace = true }

[target.'cfg(unix)'.dependencies]
libc = { workspace = true }

[dev-dependencies]
ed25519-dalek = { workspace = true }
tempfile = { workspace = true }
