[package]
name = "ryeos-engine"
version = "0.1.0"
edition = "2021"
description = "Native policy engine for Rye OS — resolution, trust, planning"
license = "MIT"

[dependencies]
base64 = { workspace = true }
directories = { workspace = true }
jsonschema = { workspace = true }
lillux = { workspace = true }
regex = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
sha2 = { workspace = true }
ryeos-handler-protocol = { workspace = true }
thiserror = { workspace = true }
toml = { workspace = true }
tracing = { workspace = true }

[features]
# Exposes `ryeos_engine::test_support` for downstream test crates that
# need the live HandlerRegistry / ParserDispatcher wiring against the
# core bundle (see `crates/engine/ryeos-engine/src/test_support.rs`).
test-support = []

[dev-dependencies]
tempfile = { workspace = true }
ryeos-tracing = { workspace = true, features = ["test-harness"] }
