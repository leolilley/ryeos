[package]
name = "ryeosd"
version = "0.1.0"
edition = "2021"
description = "ryeosd daemon - Rust control plane for Rye OS"
license = "MIT"
repository = "https://github.com/leolilley/ryeos"

[lib]
name = "ryeosd"
path = "src/lib.rs"

[[bin]]
name = "ryeosd"
path = "src/main.rs"

[dependencies]
anyhow = "1"
async-stream = "0.3"
axum = "0.7"
base64 = "0.22"
clap = { version = "4", features = ["derive"] }
directories = "5"
form_urlencoded = "1"
futures-core = "0.3"
hmac = "0.12"
lillux = { path = "../lillux" }
rand = "0.8"
rmp-serde = "1"
ryeos-engine = { path = "../ryeos-engine" }
ryeos-state = { path = "../ryeos-state" }
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
sha2 = "0.10"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

[dev-dependencies]
tempfile = "3"

[target.'cfg(unix)'.dependencies]
libc = "0.2"
