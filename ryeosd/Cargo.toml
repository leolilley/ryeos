[package]
name = "ryeosd"
version = "0.2.0"
edition = "2021"
description = "ryeosd daemon - Rust control plane for Rye OS"
license = "MIT"
repository = "https://github.com/leolilley/ryeos"

[lib]
name = "ryeosd"
path = "src/lib.rs"

[[bin]]
name = "ryeosd"
path = "src/main.rs"

[dependencies]
anyhow = "1"
ryeos-runtime = { path = "../ryeos-runtime" }
async-stream = "0.3"
axum = "0.7"
base64 = "0.22"
clap = { version = "4", features = ["derive"] }
directories = "5"
form_urlencoded = "1"
glob = "0.3"
lillux = { path = "../lillux" }
rand = "0.8"
rmp-serde = "1"
ryeos-engine = { path = "../ryeos-engine" }
ryeos-state = { path = "../ryeos-state" }
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
sha2 = "0.10"
hmac = "0.12"
toml = "0.8"
subtle = "2"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
ryeos-tracing = { path = "../ryeos-tracing" }
ryeos-tools = { path = "../ryeos-tools" }   # for actions::catalog::OPERATIONAL_TOOLS
arc-swap = "1.9.1"
tokio-stream = "0.1.18"
once_cell = "1"
regex = "1"

[dev-dependencies]
tempfile = "3"
ryeos-engine = { path = "../ryeos-engine", features = ["test-support"] }
ryeos-tools = { path = "../ryeos-tools", features = ["test-support"] }
ryeos-runtime = { path = "../ryeos-runtime" }
ryeos-tracing = { path = "../ryeos-tracing", features = ["test-harness"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
http-body-util = "0.1"
hyper = { version = "1", features = ["server", "http1"] }
hyper-util = { version = "0.1", features = ["tokio", "server", "http1"] }
bytes = "1"

[target.'cfg(unix)'.dependencies]
libc = "0.2"
