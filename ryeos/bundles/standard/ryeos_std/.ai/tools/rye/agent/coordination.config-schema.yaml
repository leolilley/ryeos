version: "1.0.0"
tool_type: config-schema
executor_id: null
category: agent
description: "Schema for coordination.yaml — thread wait, continuation, and orphan detection"

target_config: coordination.yaml

schema:
  type: object
  properties:
    schema_version:
      type: string
    coordination:
      type: object
      properties:
        wait_threads:
          type: object
          properties:
            default_timeout:
              type: integer
            max_timeout:
              type: integer
        continuation:
          type: object
          properties:
            trigger_threshold:
              type: number
            summary_directive:
              type: string
            summary_model:
              type: string
            summary_limit_overrides:
              type: object
            resume_ceiling_tokens:
              type: integer
            summary_max_tokens:
              type: integer
        transcript_integrity:
          type: string
        orphan_detection:
          type: object
          properties:
            enabled:
              type: boolean
            scan_on_startup:
              type: boolean
            stale_threshold_minutes:
              type: integer
