# rye:signed:2026-04-10T00:57:19Z:98dc15495d58ba3fa63489ea2051ef58f3f9560c025baa379a1da92ff1f7a49a:WUvikxF_4RJg3aoDKfkmbSofL1eIgKUJLcD-9OIqNIW_iu1d_zSRKc-RS_5LWwYC3zzR7vWel20aOBAxPzIjAg:4b987fd4e40303ac
version: "1.0.0"
tool_type: extractor
executor_id: null
category: rye/core/extractors/knowledge
description: "Knowledge extractor - extracts metadata from YAML frontmatter in markdown files"

extensions:
  - .md
  - .yaml
  - .yml

parser: markdown/frontmatter

signature_format:
  prefix: "<!--"
  suffix: "-->"
  after_shebang: false

extraction_rules:
  name:
    type: path
    key: name
  title:
    type: path
    key: title
  version:
    type: path
    key: version
  entry_type:
    type: path
    key: entry_type
  category:
    type: path
    key: category
  tags:
    type: path
    key: tags
  body:
    type: path
    key: body
  executor_id:
    type: constant
    value: "rye/core/executors/knowledge/knowledge"

search_fields:
  title: 3.0
  name: 3.0
  description: 2.0
  category: 1.5
  content: 1.0

validation_schema:
  fields:
    name:
      required: true
      type: string
      match_filename: true
    title:
      required: true
      type: string
    version:
      required: true
      type: semver
    entry_type:
      required: true
      type: string
    category:
      required: false
      type: string
      match_path: true
