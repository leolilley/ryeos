version: "1.0.0"
tool_type: runtime
executor_id: rye/core/primitives/execute
category: rye/core/runtimes/bash
description: "Bash runtime - executes shell commands directly"

env_config:
  env:
    PATH: "${PATH}"

config_resolve:
  path: "execution/execution.yaml"
  mode: "deep_merge"

config:
  command: "/bin/bash"
  args:
    - "-c"
    - "{command}"
