# rye:signed:2026-04-05T03:17:01Z:360e3476b2e46588aa8c7d63ff9757197c3346d1a392fdd608d69412d062e445:VSYYKk5OggXt4YFumQUNbgsEOx38sP-mvXD6D2ckw_WvdwprckosiI7l-n5AG-1K96gb873ApXV0dVKb3-amBw:4b987fd4e40303ac
version: "1.0.0"
tool_type: runtime
executor_id: rye/core/primitives/subprocess
category: rye/core/runtimes/mcp
description: "MCP HTTP runtime - executes MCP tools via HTTP transport"

env_config:
  env:
    PYTHONUNBUFFERED: "1"

config_resolve:
  path: "execution/execution.yaml"
  mode: "deep_merge"

config:
  command: "${RYE_KERNEL_PYTHON}"
  args:
    - "{system_space}/.ai/tools/rye/mcp/connect.py"
    - "--server-config"
    - "{server_config_path}"
    - "--tool"
    - "{tool_name}"
    - "--project-path"
    - "{project_path}"
  input_data: "{params_json}"
  timeout: 60

config_schema:
  type: object
  properties:
    server:
      type: string
      description: "Relative tool ID to server config (e.g., mcp/servers/context7)"
    tool_name:
      type: string
      description: MCP tool name to call
    timeout:
      type: number
      description: Execution timeout in seconds
      default: 60
  required: [server, tool_name]
