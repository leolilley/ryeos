name: tv-tracker-authoring
version: "0.1.0"
description: "Operator authoring wrapper for tv-tracker context/prompt knowledge docs"
requires_kinds:
  - tool
uses_kinds: []
# Grants the daemon-minted authority to author signed knowledge items under the
# tv-tracker namespace. The wrapper tool below requests a subset of this; the
# daemon mints only the intersection into the tool's per-thread callback token.
runtime_authority:
  item_authoring:
    - kind: knowledge
      namespace: apps/tv-tracker/*
