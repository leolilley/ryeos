name: tv-tracker-authoring
version: "0.1.0"
description: "Operator authoring wrappers for tv-tracker context/prompt knowledge docs"
requires_kinds:
  - tool
uses_kinds: []
# Authoring authority, tightest possible for each need:
#   - The three legacy base context docs are each pinned CONCRETELY (per-doc
#     wrappers below request exactly one). A route bug or bad item_ref cannot
#     touch any other item — the minted authority, not the caller's intent, is
#     what the daemon enforces.
#   - apps/tv-tracker/context/*  — the dynamic doc-set namespace. Operators add
#     arbitrarily-named context docs here; a single wildcard grant authorizes the
#     whole subtree (the daemon glob-matches the concrete author target against
#     it). Deliberately NOT apps/tv-tracker/* — that would expose every knowledge
#     doc under the app, not just the prompt context set.
#   - directive apps/tv-tracker/ai_chat_base — re-author the base chat directive
#     to manage which docs its context.system references (add/remove/reorder).
runtime_authority:
  item_authoring:
    - kind: knowledge
      namespace: apps/tv-tracker/Identity
    - kind: knowledge
      namespace: apps/tv-tracker/AnalysisBehavior
    - kind: knowledge
      namespace: apps/tv-tracker/ChatInstructions
    - kind: knowledge
      namespace: apps/tv-tracker/context/*
    - kind: directive
      namespace: apps/tv-tracker/ai_chat_base
