version: "0.1.0"
category: "tv-tracker-authoring"
name: "read-context-doc"
executor_id: "@subprocess"
description: "Read the raw signed source of any tv-tracker context doc under apps/tv-tracker/context/* (resolve + verify + read the on-disk file). Read-only — no authoring authority. Returns fetch report incl. raw content + signature_status."

config:
  command: "bin:core/ryeos-core-tools"
  args:
    - "fetch"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 20

config_schema:
  type: object
  properties:
    item_ref:
      type: string
      pattern: "^knowledge:apps/tv-tracker/context/[a-z0-9][a-z0-9-]*$"
    with_content:
      type: boolean
      default: true
    verify:
      type: boolean
      default: true
    project_path:
      type: string
  required: [item_ref]
