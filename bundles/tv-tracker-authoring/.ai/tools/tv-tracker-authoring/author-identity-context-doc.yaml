version: "0.1.0"
category: "tv-tracker-authoring"
name: "author-identity-context-doc"
executor_id: "@subprocess"
description: "Author the signed tv-tracker Identity context doc via the daemon runtime.author_item callback. Authority is scoped to this one doc; the daemon signs (this wrapper never holds a key)."

# Requests authoring authority for EXACTLY one doc. The daemon mints only
# ryeos.author.knowledge.apps/tv-tracker/Identity into this tool's callback token,
# so it can never author any other item even if handed a different item_ref.
requires:
  capabilities:
    manifest:
      runtime_authority:
        item_authoring:
          - kind: knowledge
            namespace: apps/tv-tracker/Identity

config:
  command: "bin:core/ryeos-core-tools"
  args:
    - "author-item"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 30

config_schema:
  type: object
  properties:
    item_ref:
      type: string
      enum: ["knowledge:apps/tv-tracker/Identity"]   # early failure; daemon authority is the real boundary
    content:
      type: string
      description: "Unsigned item body. Must not contain a signature line or ryeos:authored: marker."
    mode:
      type: string
      enum: ["create", "upsert"]
      default: "upsert"
    format_ext:
      type: string
      default: ".md"
    expected_digest:
      type: string
      description: "CAS guard — the incumbent authored content_digest. Required for guarded saves."
  required: [item_ref, content]
