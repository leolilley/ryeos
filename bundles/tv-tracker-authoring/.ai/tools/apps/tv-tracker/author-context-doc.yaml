version: "0.1.0"
category: "apps/tv-tracker"
name: "author-context-doc"
executor_id: "@subprocess"
description: "Author a signed tv-tracker knowledge context doc (Identity / AnalysisBehavior / ChatInstructions) via the daemon runtime.author_item callback. The daemon signs; this wrapper never holds a key."

# Requests the authoring authority from this bundle's signed manifest. The daemon
# mints ryeos.author.knowledge.apps/tv-tracker/<target> into this tool's callback
# token at launch — it cannot be self-granted. Anyone able to execute this tool can
# author anywhere under apps/tv-tracker/*; the backend route whitelists the exact
# refs it ever sends.
requires:
  capabilities:
    manifest:
      runtime_authority:
        item_authoring:
          - kind: knowledge
            namespace: apps/tv-tracker/*

config:
  command: "bin:core/ryeos-core-tools"
  args:
    - "author-item"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 30

config_schema:
  type: object
  properties:
    item_ref:
      type: string
      description: "Canonical target ref, e.g. knowledge:apps/tv-tracker/Identity (no suffix)."
    content:
      type: string
      description: "The unsigned item body. Must not contain a signature line or ryeos:authored: marker."
    mode:
      type: string
      enum: ["create", "upsert"]
      default: "upsert"
      description: "create fails if the item exists; upsert overwrites."
    format_ext:
      type: string
      default: ".md"
      description: "File extension; required when creating a new item."
    expected_digest:
      type: string
      description: "Optional compare-and-swap guard for upsert (incumbent content_digest)."
  required: [item_ref, content]
