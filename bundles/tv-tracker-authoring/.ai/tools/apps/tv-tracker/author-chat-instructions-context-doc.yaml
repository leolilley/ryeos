version: "0.1.0"
category: "apps/tv-tracker"
name: "author-chat-instructions-context-doc"
executor_id: "@subprocess"
description: "Author the signed tv-tracker ChatInstructions context doc via the daemon runtime.author_item callback. Authority is scoped to this one doc; the daemon signs (this wrapper never holds a key)."

requires:
  capabilities:
    manifest:
      runtime_authority:
        item_authoring:
          - kind: knowledge
            namespace: apps/tv-tracker/ChatInstructions

config:
  command: "bin:core/ryeos-core-tools"
  args:
    - "author-item"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 30

config_schema:
  type: object
  properties:
    item_ref:
      type: string
      enum: ["knowledge:apps/tv-tracker/ChatInstructions"]
    content:
      type: string
      description: "Unsigned item body. Must not contain a signature line or ryeos:authored: marker."
    mode:
      type: string
      enum: ["create", "upsert"]
      default: "upsert"
    format_ext:
      type: string
      default: ".md"
    expected_digest:
      type: string
      description: "CAS guard — the incumbent authored content_digest. Required for guarded saves."
  required: [item_ref, content]
