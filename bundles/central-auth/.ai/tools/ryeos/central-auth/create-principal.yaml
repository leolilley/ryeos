version: "0.1.0"
category: "ryeos/central-auth"
name: "create-principal"
executor_id: "@subprocess"
required_caps: ["ryeos.execute.tool.ryeos.central-auth.create-principal"]
description: "Create a central-auth principal with roles, capabilities, and optional passphrase."

config:
  command: "python3"
  args:
    - "{tool_dir}/../../../bin/central_auth.py"
    - "create-principal"
  input_data: "{params_json}"
  timeout_secs: 15

config_schema:
  type: object
  properties:
    project_path:
      type: string
      description: "Project root used for .ai/state/central-auth storage."
    runtime_state_dir:
      type: string
      description: "Optional absolute central-auth runtime state dir override."
    realm_id:
      type: string
      description: "Realm/app namespace, e.g. tv-tracker."
    principal_id:
      type: string
    display_name:
      type: string
    roles:
      type: array
      items: { type: string }
      default: []
    capabilities:
      type: array
      items: { type: string }
      default: []
    passphrase:
      type: string
    bootstrap:
      type: boolean
      default: false
    replace:
      type: boolean
      default: false
    disabled:
      type: boolean
      default: false
  required: [realm_id, principal_id, display_name]
