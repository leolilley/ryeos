version: "0.1.0"
category: "ryeos/central-auth"
name: "check-capability"
executor_id: "@subprocess"
required_caps: ["ryeos.execute.tool.ryeos.central-auth.check-capability"]
description: "Verify a session token and check one required capability."

config:
  command: "python3"
  args:
    - "{tool_dir}/../../../bin/central_auth.py"
    - "check-capability"
  input_data: "{params_json}"
  timeout_secs: 15

config_schema:
  type: object
  properties:
    project_path:
      type: string
      description: "Project root used for .ai/state/central-auth storage."
    runtime_state_dir:
      type: string
      description: "Optional absolute central-auth runtime state dir override."
    realm_id:
      type: string
      description: "Realm/app namespace, e.g. tv-tracker."
    session_token:
      type: string
    required_capability:
      type: string
  required: [realm_id, session_token, required_capability]
