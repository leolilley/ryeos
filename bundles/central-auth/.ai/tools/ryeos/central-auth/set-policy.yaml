version: "0.1.0"
category: "ryeos/central-auth"
name: "set-policy"
executor_id: "@subprocess"
required_caps: ["ryeos.execute.tool.ryeos.central-auth.set-policy"]
description: "Store the central-auth role/capability policy for a realm."

config:
  command: "python3"
  args:
    - "{tool_dir}/../../../bin/central_auth.py"
    - "set-policy"
  input_data: "{params_json}"
  timeout_secs: 15

config_schema:
  type: object
  properties:
    project_path:
      type: string
      description: "Project root used for .ai/state/central-auth storage."
    state_root:
      type: string
      description: "Optional absolute central-auth state root override."
    realm_id:
      type: string
      description: "Realm/app namespace, e.g. tv-tracker."
    policy:
      type: object
      description: "Policy object with roles and allowed_capabilities."
  required: [realm_id, policy]
