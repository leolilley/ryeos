version: "0.1.0"
category: "ryeos/central-auth"
name: "revoke-session"
executor_id: "@subprocess"
required_caps: ["ryeos.execute.tool.ryeos.central-auth.revoke-session"]
description: "Revoke one session token."

config:
  command: "python3"
  args:
    - "{tool_dir}/lib/central_auth.py"
    - "revoke-session"
  input_data: "{params_json}"
  timeout_secs: 15

config_schema:
  type: object
  properties:
    project_path:
      type: string
      description: "Project root used for .ai/state/central-auth storage."
    runtime_state_dir:
      type: string
      description: "Optional absolute central-auth runtime state dir override."
    realm_id:
      type: string
      description: "Realm/app namespace, e.g. tv-tracker."
    session_token:
      type: string
  required: [realm_id, session_token]
