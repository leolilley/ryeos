# ryeos:signed:2026-07-03T03:58:05Z:a64b4bd2406e8002e9f8d0ee40548bb1788ca0ce8e7653aa5b4744a301836887:JEcxpsFmgpZkHIYUR7nzt4BJXQiahBOoUV+POsIPaDZmVQatru+gOcj7Mluwzb9/hP/MBf1I5MgBKrCmB19yDg==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
version: "0.1.0"
category: "ryeos/central-auth"
name: "login"
executor_id: "@subprocess"
required_caps: ["ryeos.execute.tool.ryeos.central-auth.login"]
description: "Validate credentials or redeem an invite and issue an opaque session token."

config:
  command: "python3"
  args:
    - "{tool_dir}/../../../bin/central_auth.py"
    - "login"
  input_data: "{params_json}"
  timeout_secs: 15

config_schema:
  type: object
  properties:
    project_path:
      type: string
      description: "Project root used for .ai/state/central-auth storage."
    runtime_state_dir:
      type: string
      description: "Optional absolute central-auth runtime state dir override."
    realm_id:
      type: string
      description: "Realm/app namespace, e.g. tv-tracker."
    method:
      type: string
      enum: [passphrase, invite]
      default: passphrase
    principal_id:
      type: string
    display_name:
      type: string
      description: "Required for invite redemption."
    passphrase:
      type: string
    invite_code:
      type: string
      description: "Required for invite redemption."
    ttl_secs:
      type: integer
      default: 28800
  required: [realm_id, method]
