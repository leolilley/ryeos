# ryeos:signed:2026-06-02T03:51:51Z:8c76a47360e34c66e7bf458d29d4d510d8020516db27f28d1e1a2ccf9a913f3b:kv0oqnu55cIAk6CCwPnkWdSjAOKNl9JTI2Pc1MPIrWkuyVyVplzlFyED8fXp+OrV7Ovj3xVkWCHHNSxtiDYFAA==:f168bc6752bd022d89a6778a8d2239b302f453d7e862770ed7ed1093c96363d1
version: "0.1.0"
category: "ryeos/central-auth"
name: "login"
executor_id: "@subprocess"
required_caps: ["ryeos.execute.tool.ryeos.central-auth.login"]
description: "Validate credentials or redeem an invite and issue an opaque session token."

config:
  command: "python3"
  args:
    - "{tool_dir}/../../../bin/central_auth.py"
    - "login"
  input_data: "{params_json}"
  timeout_secs: 15

config_schema:
  type: object
  properties:
    project_path:
      type: string
      description: "Project root used for .ai/state/central-auth storage."
    runtime_state_dir:
      type: string
      description: "Optional absolute central-auth runtime state dir override."
    realm_id:
      type: string
      description: "Realm/app namespace, e.g. tv-tracker."
    method:
      type: string
      enum: [passphrase, invite]
      default: passphrase
    principal_id:
      type: string
    display_name:
      type: string
      description: "Required for invite redemption."
    passphrase:
      type: string
    invite_code:
      type: string
      description: "Required for invite redemption."
    ttl_secs:
      type: integer
      default: 28800
  required: [realm_id, method]
