# ryeos:signed:2026-07-03T03:58:05Z:33535d6aa59e6a1a4652b2023ac52d9f0b18e3230bc84defb3a6ae669dfd9361:d3RgwIQYAmjHH25qcWuckddjf6Gqv3MPTumGcQt31oJsYxEQo5Sf8t5rumjkj2wIweGcl5h5dcXoGc3DlZyTCg==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
version: "0.1.0"
category: "ryeos/central-auth"
name: "create-invite"
executor_id: "@subprocess"
required_caps: ["ryeos.execute.tool.ryeos.central-auth.create-invite"]
description: "Create a high-entropy one-time invite code for a realm."

config:
  command: "python3"
  args:
    - "{tool_dir}/../../../bin/central_auth.py"
    - "create-invite"
  input_data: "{params_json}"
  timeout_secs: 15

config_schema:
  type: object
  properties:
    project_path:
      type: string
      description: "Project root used for .ai/state/central-auth storage."
    runtime_state_dir:
      type: string
      description: "Optional absolute central-auth runtime state dir override."
    realm_id:
      type: string
      description: "Realm/app namespace, e.g. tv-tracker."
    roles:
      type: array
      items: { type: string }
      default: []
    capabilities:
      type: array
      items: { type: string }
      default: []
    ttl_secs:
      type: integer
      default: 86400
    max_uses:
      type: integer
      default: 1
  required: [realm_id]
