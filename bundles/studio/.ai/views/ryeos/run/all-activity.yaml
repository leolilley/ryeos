# ryeos:signed:2026-07-06T08:06:08Z:8fbfcfc9fb801dec416cd2aa7bd5c5ee1da6e0575d3900102b6eaa5b3fd53a03:qLRP+v5WuJa8+mALtxCkg9x4woV6VpC+HeCWlscRXz7xdy3YqGlk0SW4wOTeXYZqnPBdwS7a+yjc0sK7Rg/WDQ==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
name: run-all-activity
version: "1.0.0"
description: >-
  Machine-wide live activity across registered project contexts. Use this when
  the daemon is running threads from more than one cwd and the current-project
  activity lens is intentionally scoped too narrowly.

widget: table
source:
  ref: service:ui/studio/threads/list
  params:
    active: true
    sort: newest
    limit: 120
    exclude_item_prefixes:
      - service:ui/studio/
      - surface:ryeos/studio/
  collection: threads
projections:
  columns:
    - label: id
      field: thread_id
    - label: project
      field: project.name
    - label: item
      field: item_ref
    - label: stage
      field: current_node.node
    - label: follow
      field: follow.display_state
      tone:
        field: follow.display_state
        map:
          suspended: warn
          resume_queued: neutral
          resumed: good
    - label: status
      field: status
    - label: started
      field: created_at
  expand:
    fields: [thread_id, chain_root_id, project.name, project.path, item_ref, current_node.node, follow.role, follow.follow_node, follow.child_thread_id, follow.child_chain_root_id, follow.parent_successor_thread_id, error]
  tone:
    field: status
    map:
      running: accent
      created: accent
      accepted: accent
      failed: danger
      cancelled: warn
      killed: danger
      timed_out: warn
      completed: good
    default: neutral
selection:
  activate: watch
affordances:
  - id: watch
    label: Watch
    invoke:
      plane: ui
      facet: input.route
      merge:
        thread: "{record.thread_id}"
        chain_root: "{record.chain_root_id}"
      open_view: view:ryeos/chain/timeline
      drill: true
refresh:
  on_hint: [thread, activity]
