name: items-space
version: "1.0.0"
description: The item space - signed content across system, user, and project

widget: rows
source:
  ref: service:ui/studio/items/list
  params:
    limit: 500
    project_path: ""
  collection: items
projections:
  primary: canonical_ref
  meta: kind
  tone:
    field: trust
    map:
      trusted: good
      untrusted: danger
    default: neutral
selection:
  activate: inspect
affordances:
  - id: inspect
    label: Inspect
    invoke:
      plane: ui
      facet: selection
      value:
        item: "{record.canonical_ref}"
