name: chain-timeline
version: "1.0.0"
description: Event braid timeline for the input route's conversation chain

widget: timeline
source:
  ref: service:events/chain_replay
  params:
    chain_root_id: "@facet:input.route.chain_root"
  collection: events
projections:
  event_kinds:
    cognition_out:
      primary: payload.content
      role: flow
    thread_continued:
      primary: payload.previous_thread_id
      meta: event_type
      role: boundary
    cognition_in:
      primary: payload.turn
      meta: event_type
      role: boundary
    tool_call_start:
      primary: payload.tool
      meta: payload.call_id
      role: pair_open
      pair_key: payload.call_id
    tool_call_result:
      primary: payload.tool
      meta: payload.result_size_bytes
      role: pair_close
      pair_key: payload.call_id
      tone:
        field: payload.truncated_reason
        missing: good
        map:
          error_envelope: danger
          size_cap_exceeded: warn
          result_guard: warn
        default: good
  default:
    primary: event_type
    meta: ts
refresh:
  on_hint: thread
