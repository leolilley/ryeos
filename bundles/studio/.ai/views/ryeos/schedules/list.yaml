# ryeos:signed:2026-06-30T00:10:25Z:780b0e7af259b0337dc3d5a8d81259ba5a655242a55a60aaf2cf68da1291b8d2:f8VOL4dYFWYMlDlY4yyV5SC5PEO9ubRkawy6G2Dcn9Al1qVFea7oW100N0PFHuM0Tcy8lYUTIY0AO8IK1I6VAA==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
name: schedules-list
version: "1.0.0"
description: Registered schedules and their state

widget: table
source:
  ref: service:scheduler/list
  params: {}
  collection: schedules
projections:
  columns:
    - label: schedule
      field: schedule_id
    - label: item
      field: item_ref
    - label: expression
      field: expression
    - label: enabled
      field: enabled
  tone:
    field: enabled
    map:
      "true": good
      "false": warn
    default: neutral
selection:
  activate: pause
affordances:
  - id: pause
    label: Pause
    invoke:
      plane: rye
      tokens: [scheduler, pause]
      args:
        schedule_id: "{record.schedule_id}"
  - id: resume
    label: Resume
    invoke:
      plane: rye
      tokens: [scheduler, resume]
      args:
        schedule_id: "{record.schedule_id}"
