name: schedules-list
version: "1.0.0"
description: Registered schedules and their state

widget: rows
source:
  ref: service:scheduler/list
  params: {}
  collection: schedules
projections:
  primary: schedule_id
  meta: expression
  tone:
    field: enabled
    map:
      "true": good
      "false": warn
    default: neutral
selection:
  activate: pause
affordances:
  - id: pause
    label: Pause
    invoke:
      plane: rye
      tokens: [scheduler, pause]
      args:
        schedule_id: "{record.schedule_id}"
  - id: resume
    label: Resume
    invoke:
      plane: rye
      tokens: [scheduler, resume]
      args:
        schedule_id: "{record.schedule_id}"
