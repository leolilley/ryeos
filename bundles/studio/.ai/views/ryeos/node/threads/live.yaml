# ryeos:unsigned
name: node-threads-live
version: "1.0.0"
description: Node-wide live threads across project contexts

widget: table
source:
  ref: service:ui/studio/threads/list
  params:
    active: true
    sort: newest
    limit: 120
    exclude_item_prefixes:
      - service:ui/studio/
      - surface:ryeos/studio/
  collection: threads
projections:
  columns:
    - label: thread
      field: thread_id
    - label: project
      field: project.name
    - label: item
      field: item_ref
    - label: stage
      field: current_node.node
    - label: follow
      field: follow.role
      tone:
        field: follow.display_state
        map:
          suspended: warn
          resume_queued: neutral
          resumed: good
    - label: status
      field: status
    - label: started
      field: created_at
  expand:
    fields: [thread_id, chain_root_id, project.name, project.path, item_ref, current_node.node, follow.role, follow.display_state, follow.follow_node, follow.child_thread_id, follow.child_chain_root_id, follow.parent_successor_thread_id, error]
  tone:
    field: status
    map:
      running: accent
      created: accent
      accepted: accent
      failed: danger
      killed: danger
      timed_out: danger
      cancelled: warn
      completed: good
    default: neutral
selection:
  activate: watch
affordances:
  - id: watch
    label: Watch
    invoke:
      plane: ui
      facet: input.route
      merge:
        thread: "{record.thread_id}"
        chain_root: "{record.chain_root_id}"
      open_view: view:ryeos/thread/transcript
      drill: true
input:
  id: filter
  feeds:
    fields:
      - { param: status, label: status }
      - { param: kind, label: kind }
      - { param: requested_by, label: source }
    debounce_ms: 120
refresh:
  on_hint: [thread, activity]
