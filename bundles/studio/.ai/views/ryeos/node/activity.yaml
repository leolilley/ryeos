# ryeos:signed:2026-07-06T05:31:39Z:40eb9c308360dd85f308ce4a15d4ee44dfdcf1e0317806f3965d62087478b19d:Esw4YKSAjYGZOKtUqoc5n76zbnqjGcDFg6I5AsKR3d4Onlkr5uDSYtlWNEQ8u2eJwUK1igR1KbdKoqrsGu1TCQ==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
name: node-activity
version: "1.0.0"
description: >-
  The node's execution pulse — what the one key is running now, what settled
  inside the window and what it cost, above the latest durable events across
  every thread on the node. Enter on an event steps into that thread's braid.

widget: sections
affordances:
  - id: watch-thread
    label: Watch thread
    invoke:
      plane: ui
      facet: input.route
      merge:
        thread: "{record.thread_id}"
        chain_root: "{record.chain_root_id}"
      open_view: view:ryeos/chain/timeline
      drill: true
sections:
  - title: Pulse
    source:
      ref: service:ui/studio/node/activity
      params:
        # Pulse only — the Recent section fetches the feed itself.
        event_limit: 1
      collection: pulse
    projection:
      primary: value
      meta: label
  - title: Recent
    source:
      ref: service:ui/studio/node/activity
      params:
        event_limit: 80
        # Feed noise is a content decision: seat facet writes are UI state,
        # thread_usage is accounting (the Pulse carries it), cognition_out
        # bulk text belongs to a thread's own braid lens.
        exclude_types: ["seat.facet", "thread_usage", "cognition_out"]
      collection: events
    projection:
      primary: event_type
      meta: thread_id
      tone:
        field: event_type
        map:
          thread_failed: danger
          thread_killed: danger
          thread_timed_out: danger
          thread_cancelled: warn
          provider_retry: warn
          cost_untracked: warn
          thread_completed: good
          artifact_published: good
          thread_created: accent
          child_thread_spawned: accent
        default: neutral
    activate: watch-thread
refresh:
  on_hint: [thread, activity]
