# ryeos:signed:2026-07-05T03:26:18Z:fb086a9555018d4c369056078920f24b153d7bd0ee42d1937cf265025adf7f8c:h7BNDNRVSjAE3oWldaoGJNw4+J1sgLqPGTqNf9QRihR4RRbPhx50ez1K0Klij2Var+kcSHffbWoMGlPWc6ViCQ==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
name: backdrop-prism
version: "1.0.0"
description: >-
  The empty-center backdrop scene — the RyeOS prism: a filled hexagonal
  crystal column, double-terminated (a pyramidal point at both ends),
  flat-shaded per facet under a
  light that sweeps across it, simmering with per-cell noise, ringed by
  orbiting motes, with the brand/welcome/hint text below. The background
  is content (a `scene`), drawn by the one generic scene renderer;
  selecting this view as a surface's `backdrop` shows it on an empty
  center. New backgrounds are new scene content, never renderer cases.

widget: scene
body:
  # Light rolls across the field every period ticks — the sweep is a
  # generic scene capability; this content just opts in and shapes it.
  sweep: { period: 48, width: 4.5 }
  objects:
    # ── the prism: a FILLED solid (`kind: fill`) — the renderer shades
    # every interior cell from the shape's facets under an oscillating
    # light. Double-terminated: a pyramidal point at BOTH ends.
    # scale = [radius, body half-height, termination height per end].
    - { kind: fill, shape: prism, id: prism/body, position: [0.0, 0.4], scale: [3.0, 3.6, 2.6], color: "#d65d0e", tone: accent, opacity: 0.95 }
    # ── orbiting motes: diamond dust circling the crystal on the ring
    # plane (`orbit:` = degrees per generation, sign = direction; the
    # declared position is the ring radius + starting phase). Mixed
    # radii, speeds, and directions so the swirl never syncs; the back
    # half of each pass glows faintly through the crystal. ──
    - { kind: particle, position: [-11.0, 4.0], scale: 0.4, color: "#a89984", tone: neutral, opacity: 0.7, glyph: diamond, orbit: 0.7 }
    - { kind: particle, position: [10.0, 3.4], scale: 0.5, color: "#d5c4a1", tone: neutral, opacity: 0.7, glyph: diamond, orbit: -0.9 }
    - { kind: particle, position: [-9.0, -3.5], scale: 0.7, color: "#8ec07c", tone: good, opacity: 0.7, glyph: diamond, orbit: 1.1 }
    - { kind: particle, position: [9.5, -3.0], scale: 0.5, color: "#a89984", tone: neutral, opacity: 0.7, glyph: diamond, orbit: -0.6 }
    - { kind: particle, position: [-13.0, 0.5], scale: 0.4, color: "#d5c4a1", tone: neutral, opacity: 0.7, glyph: diamond, orbit: 0.5 }
    - { kind: particle, position: [12.5, -0.5], scale: 0.6, color: "#8ec07c", tone: good, opacity: 0.7, glyph: diamond, orbit: 0.8 }
    - { kind: particle, position: [-6.5, 5.5], scale: 0.4, color: "#a89984", tone: neutral, opacity: 0.7, glyph: diamond, orbit: -1.3 }
    - { kind: particle, position: [6.0, 5.2], scale: 0.5, color: "#d5c4a1", tone: neutral, opacity: 0.7, glyph: diamond, orbit: 1.0 }
    - { kind: particle, position: [-7.5, -5.5], scale: 0.6, color: "#a89984", tone: neutral, opacity: 0.7, glyph: diamond, orbit: -0.8 }
    - { kind: particle, position: [7.0, -5.4], scale: 0.4, color: "#8ec07c", tone: good, opacity: 0.7, glyph: diamond, orbit: 1.4 }
    - { kind: particle, position: [0.0, 7.4], scale: 0.5, color: "#d5c4a1", tone: neutral, opacity: 0.7, glyph: diamond, orbit: -0.5 }
    - { kind: particle, position: [-14.0, -2.0], scale: 0.4, color: "#a89984", tone: neutral, opacity: 0.7, glyph: diamond, orbit: 0.6 }
    - { kind: particle, position: [13.5, 2.0], scale: 0.5, color: "#d5c4a1", tone: neutral, opacity: 0.7, glyph: diamond, orbit: -1.1 }
    # brand / welcome / hints as text objects
    - { kind: text, position: [0.0, -8.2], label: "RYE OS", color: "#d65d0e", tone: accent }
    - { kind: text, position: [0.0, -9.6], label: "portable verified execution", color: "#a89984", tone: neutral }
    - { kind: text, position: [0.0, -11.0], label: "ctrl+k launcher · ctrl+c quit", color: "#a89984", tone: neutral }
