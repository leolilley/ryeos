name: item-inspector
version: "1.0.0"
description: Key-value inspection of the selected item, provenance first

widget: key_value
source:
  ref: service:ui/studio/item/inspect
  params:
    canonical_ref: "@facet:selection.item"
    include_raw: false
    include_effective: true
    project_path: ""
projections:
  detail:
    - canonical_ref
    - kind
    - signer
    - version
    - description
refresh:
  on_facet: selection
