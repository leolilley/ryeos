# ryeos:signed:2026-07-02T03:26:06Z:6066f4810fd0cc3f85508456ca3d058fd6d10d3126303e64944bb44ccedfa082:WrtypUJy+iptDhW/sRYeW4cea4LD7LBM7gQGwuSnmlHu/kJ40CzVkE3gxlTd814XgfNGXP/WQU6XVkaILkRICw==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
name: thread-detail
version: "1.0.0"
description: >-
  Thread detail lens: the triage read for one execution. Sections project the
  inspect service (summary, usage, outcome, artifacts, children) — each reads a
  sub-value of the one inspect response, so the whole thing degrades to empty
  sections rather than a raw-JSON dump when a thread has no result/artifacts yet.

widget: sections
title: Thread

sections:
  # Summary: the whole `thread` sub-record projected to one row (item + status),
  # toned by status so the header reads at a glance.
  - title: Summary
    source:
      ref: service:ui/studio/thread/inspect
      params:
        thread_id: "@facet:selection.thread"
      collection: thread
    projection:
      primary: item_ref
      meta: status
      tone:
        field: status
        map:
          running: accent
          created: accent
          failed: danger
          cancelled: warn
          completed: good
        default: neutral

  # Usage: chain-wide execution totals (tokens, cost, turns, thread count), one
  # metric per row — the deep-watch summary of what this execution consumed.
  - title: Usage
    source:
      ref: service:ui/studio/thread/inspect
      params:
        thread_id: "@facet:selection.thread"
      collection: usage
    projection:
      primary: value
      meta: label

  # Execution: the thread's durable execution posture — capabilities minted,
  # hard limits, effective trust class, model, runtime — one labeled metric per
  # row, read from the signed thread.json audit record (plus the projection's
  # executor identity). Empty when the thread carries no audit record.
  - title: Execution
    source:
      ref: service:ui/studio/thread/inspect
      params:
        thread_id: "@facet:selection.thread"
      collection: execution_meta
    projection:
      primary: value
      meta: label

  # Outcome: the `result` sub-object (outcome code + error). Null until the
  # thread finishes → this section is simply empty.
  - title: Outcome
    source:
      ref: service:ui/studio/thread/inspect
      params:
        thread_id: "@facet:selection.thread"
      collection: result
    projection:
      primary: outcome_code
      meta: error
      tone:
        field: outcome_code
        map:
          ok: good
          error: danger
        default: neutral

  # Artifacts the execution produced (one row each; empty when none).
  - title: Artifacts
    source:
      ref: service:ui/studio/thread/inspect
      params:
        thread_id: "@facet:selection.thread"
      collection: artifacts
    projection:
      primary: artifact_type
      meta: uri

  # Child threads spawned by this one (the chain fanning out).
  - title: Children
    source:
      ref: service:ui/studio/thread/inspect
      params:
        thread_id: "@facet:selection.thread"
      collection: children
    projection:
      primary: item_ref
      meta: status
      tone:
        field: status
        map:
          running: accent
          created: accent
          failed: danger
          cancelled: warn
          completed: good
        default: neutral

# Re-fetch whenever the selected thread changes (the inspect affordance writes
# selection.thread before opening this lens).
refresh:
  on_facet: selection
