# ryeos:signed:2026-06-29T23:43:32Z:40892707cedf8fd8964f8beacf443e0075f8ce5d02b279daa56d416c0dbaaa76:fB2de6S09QoSS5tjfU/B4TfN36LaDQ4IoJdnp+PzULopW/bjwuY7VkYi+fAxGeH4b9WMO+d41EJ/orjnXAKGBA==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
name: threads-list
version: "1.0.0"
description: Thread list over the studio threads source

widget: table
source:
  ref: service:threads/list
  params: {}
  collection: threads
projections:
  columns:
    - label: thread
      field: thread_id
    - label: item
      field: item_ref
    - label: status
      field: status
    - label: created
      field: created_at
  tone:
    field: status
    map:
      running: accent
      created: accent
      failed: danger
      cancelled: warn
      completed: good
    default: neutral
selection:
  activate: inspect
affordances:
  - id: inspect
    label: Inspect
    invoke:
      plane: ui
      facet: selection
      value:
        thread: "{record.thread_id}"
  - id: aim-input
    label: Aim input here
    invoke:
      plane: ui
      facet: input.route
      merge:
        thread: "{record.thread_id}"
  - id: cancel
    label: Cancel
    invoke:
      plane: rye
      tokens: [thread, cancel]
      args:
        thread_id: "{record.thread_id}"
refresh:
  on_hint: thread
