# ryeos:signed:2026-06-13T05:38:46Z:125ccded23ec57aa67d65892d173bdf8c91ceb0ebd046b2f14752ab9affce681:+3E39RgrGa2X9PO3SqWrD+QHmwpdB2ci7HQ9AvN2VnBYu4wQuoKIt9EJeqtQEZA4ZiWgkkoFnjBsA++sZUSvAA==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
name: threads-list
version: "1.0.0"
description: Thread list over the studio threads source

widget: rows
source:
  ref: service:threads/list
  params: {}
  collection: threads
projections:
  primary: item_ref
  meta: status
  tone:
    field: status
    map:
      running: accent
      created: accent
      failed: danger
      cancelled: warn
      completed: good
    default: neutral
selection:
  activate: inspect
affordances:
  - id: inspect
    label: Inspect
    invoke:
      plane: ui
      facet: selection
      value:
        thread: "{record.thread_id}"
  - id: aim-input
    label: Aim input here
    invoke:
      plane: ui
      facet: input.route
      merge:
        thread: "{record.thread_id}"
  - id: cancel
    label: Cancel
    invoke:
      plane: rye
      tokens: [thread, cancel]
      args:
        thread_id: "{record.thread_id}"
refresh:
  on_hint: thread
