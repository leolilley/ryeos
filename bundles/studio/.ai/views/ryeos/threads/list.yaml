name: threads-list
version: "1.0.0"
description: Thread list over the studio threads source

widget: table
# Operator watch dashboard: the UI-studio (operator-scoped) thread list, ordered
# active-first then newest (sort: watch), applied before the limit so the most
# relevant rows always show.
source:
  ref: service:ui/studio/threads/list
  params:
    limit: 200
    sort: watch
  collection: threads
projections:
  columns:
    - label: thread
      field: thread_id
    - label: kind
      field: kind
    - label: item
      field: item_ref
    - label: status
      field: status
    - label: source
      field: requested_by
    - label: created
      field: created_at
  tone:
    field: status
    map:
      running: accent
      created: accent
      failed: danger
      cancelled: warn
      completed: good
    default: neutral
# Enter watches the row: aim the route at the thread (both thread + chain_root so
# the braid resolves) and swap the single center lens to its braid.
selection:
  activate: watch
affordances:
  - id: watch
    label: Watch
    invoke:
      plane: ui
      facet: input.route
      merge:
        thread: "{record.thread_id}"
        chain_root: "{record.chain_root_id}"
      open_view: view:ryeos/chain/timeline
  # Inspect swaps the center lens to the thread's detail sections. Write the
  # selected thread FIRST (the detail sources read @facet:selection.thread),
  # then open the lens — the P1 open_view ordering guarantees the facet is set
  # before the new lens fetches.
  - id: inspect
    label: Inspect
    invoke:
      plane: ui
      facet: selection
      value:
        thread: "{record.thread_id}"
      open_view: view:ryeos/threads/detail
  # Row-specific cancel through the operator-scoped studio service (args reach
  # the daemon as parameters via /execute — the token path would drop them).
  - id: cancel
    label: Cancel
    invoke:
      plane: rye
      ref: service:ui/studio/thread/cancel
      args:
        thread_id: "{record.thread_id}"
# Inline live filter: typing narrows the list by status (substring) as you type;
# it feeds the `status` source param (empty buffer = unfiltered). No `submit:`, so
# this is a live filter — Enter activates the focused row (watches it), it does
# not submit. When the list lens is focused, printable keys edit this filter
# rather than the foot route input — the watch dashboard filters, it doesn't compose.
input:
  id: filter
  placeholder: "filter by status…"
  feeds:
    param: status
    debounce_ms: 120
refresh:
  on_hint: thread
