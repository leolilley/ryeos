# ryeos:signed:2026-07-06T07:48:45Z:7db4fe45caa5b7c226af9a1843e9e09f9c7ed593a3f29a3d777f94c43ccc1861:5JpQXOsOSDl9hS10K79rTpZN5IIDbas6RtWHAZ8hsg/E8nCQ9So6T7SWjKS/pEFSEyVDTCT4WFPOmmDs6/jhAw==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
name: studio-lens
version: "1.0.0"
description: >-
  The cell-grid single-lens operator surface. One center lens fills the
  screen at a time; breadth comes from swapping the lens (Ctrl+K launcher),
  never from arranging panes. The foot input routes at the directive, so the
  timeline lens reads as a live cognition feed you talk into. This is the
  TUI's own composition over the shared model — not the web's tiled Studio.

# Single lens: the center holds exactly one tile and opening a view REPLACES
# it rather than splitting. `compute_layout` renders the one tile full-bleed.
tiling:
  mode: single_lens
  master: { side: left, arrange: vertical, ratio: 1.0, count: 1 }
  stack: { arrange: vertical }
  insert: end

# Land on the empty center: the prism backdrop breathes until the operator
# picks a lens (Ctrl+K) or speaks into the foot input. Every lens in the
# library — the live activity table, a thread's braid, the item space — is
# one launcher stroke away; nothing is presumed open. Breadth is swapping
# the lens, never arranging panes.
tiles: []

# Only the foot input and a thin top status strip — no edge panes.
slots:
  bottom: { content: "view:ryeos/input", open: true, size: 7 }
  top:    { content: "view:ryeos/node/status", open: true, size: 3 }

style:
  border: thin

backdrop: view:ryeos/backdrop/prism

# The full lens set — swap the single center lens to reach any of these.
library:
  - view:ryeos/run/activity
  - view:ryeos/run/all-activity
  - view:ryeos/projects/list
  - view:ryeos/node/activity
  - view:ryeos/chain/timeline
  - view:ryeos/studio/status
  - view:ryeos/input
  - view:ryeos/threads/list
  - view:ryeos/threads/detail
  - view:ryeos/item/inspector
  - view:ryeos/items/space
  - view:ryeos/item/explain
  - view:ryeos/files/list
  - view:ryeos/graph/topology
  - view:ryeos/remotes/list
  - view:ryeos/schedules/list
  - view:ryeos/commands/grammar
  - view:ryeos/bundles/list
  - view:ryeos/node/status
  - view:ryeos/gc/status
  - view:ryeos/backdrop/prism

input:
  route:
    invoke:
      type: service
      ref: service:threads/input
    params:
      directive: directive:ryeos/ops/base
      # Opt into project scoping: the client fills this empty slot with the
      # seat's project (threads/input requires project_path). Services that
      # don't declare it never receive it.
      project_path: ""

ambient:
  show_background: true
  opacity: 1.0

affordances:
  - id: view.threads
    label: Threads
    category: View
  - id: view.items
    label: Items
    category: View
  - id: view.files
    label: Files
    category: View
  - id: view.item_inspector
    label: Inspector
    category: View
  - id: view.graph
    label: Graph
    category: View
