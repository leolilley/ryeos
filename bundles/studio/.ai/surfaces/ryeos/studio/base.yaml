# ryeos:signed:2026-07-03T09:54:36Z:b447ef90f12c67f527c099be59d4856898cd69cdd815189ab6c5d182d03a1e37:cxzwtXodF1N66NklgtpsaRi4ZiOclom0obEozT57rU4fvJlwdOs2WU81InGr/nzH4ucAz1SB6/aNbpXSWT7mDA==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
name: studio-base
version: "1.0.0"
description: RyeOS Studio home space

tiling:
  mode: master_stack
  master: { side: right, arrange: vertical, ratio: 0.6, count: 1 }
  stack: { arrange: horizontal }
  insert: end

tiles: []

slots:
  bottom: { content: "view:ryeos/input", open: true, size: 7 }
  top:    { content: "view:ryeos/node/status", open: false, size: 6 }
  left: { content: "view:ryeos/threads/list", open: false, size: 32 }
  right: { content: "view:ryeos/item/inspector", open: false, size: 40 }

style:
  border: thin

backdrop: view:ryeos/backdrop/shard

library:
  - view:ryeos/backdrop/shard
  - view:ryeos/input
  - view:ryeos/threads/list
  - view:ryeos/item/inspector
  - view:ryeos/chain/timeline
  - view:ryeos/remotes/list
  - view:ryeos/schedules/list
  - view:ryeos/commands/grammar
  - view:ryeos/bundles/list
  - view:ryeos/node/status
  - view:ryeos/items/space
  - view:ryeos/item/explain
  - view:ryeos/files/list
  - view:ryeos/gc/status


input:
  route:
    invoke:
      type: service
      ref: service:threads/input
    params:
      directive: directive:ryeos/ops/base

ambient:
  show_background: true
  opacity: 1.0

affordances:
  - id: view.graph
    label: Graph
    category: View
  - id: view.items
    label: Items
    category: View
  - id: view.files
    label: Files
    category: View
  - id: view.item_inspector
    label: Inspector
    category: View
  - id: view.threads
    label: Threads
    category: View
  - id: view.services
    label: Services
    category: View
