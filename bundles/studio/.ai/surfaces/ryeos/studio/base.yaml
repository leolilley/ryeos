name: studio-base
version: "1.0.0"
description: RyeOS Studio home space

tiling:
  mode: master_stack
  master: { side: right, arrange: vertical, ratio: 0.6, count: 1 }
  stack: { arrange: horizontal }
  insert: end

tiles: []

slots:
  bottom: { content: "view:ryeos/input", open: true, size: 7 }
  left: { content: "view:ryeos/threads/list", open: false, size: 32 }
  right: { content: "view:ryeos/item/inspector", open: false, size: 40 }

style:
  border: thin

home_view: view:ryeos/home/brand

library:
  - view:ryeos/input
  - view:ryeos/threads/list
  - view:ryeos/item/inspector
  - view:ryeos/chain/timeline
  - view:ryeos/remotes/list
  - view:ryeos/schedules/list
  - view:ryeos/commands/grammar
  - view:ryeos/bundles/list
  - view:ryeos/node/status
  - view:ryeos/items/space
  - view:ryeos/files/list
  - view:ryeos/gc/status


input:
  route:
    invoke:
      type: service
      ref: service:threads/input
    params:
      directive: directive:rye/agent/core/base

ambient:
  show_background: true
  opacity: 1.0

affordances:
  - id: view.graph
    label: Graph
    category: View
  - id: view.items
    label: Items
    category: View
  - id: view.files
    label: Files
    category: View
  - id: view.item_inspector
    label: Inspector
    category: View
  - id: view.threads
    label: Threads
    category: View
  - id: view.services
    label: Services
    category: View
