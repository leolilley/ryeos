category: "rye/browser"
version: "1.0.0"
tool_type: "subprocess"
executor_id: "@subprocess"
description: "Browser automation facade backed by Node and Playwright. Browser execution is disabled by default and enabled via enabled: true in .ai/config/browser/browser.yaml; otherwise the tool validates inputs and returns diagnostics."

config:
  command: "bin:ryeos-browser-tools"
  args:
    - "browser"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 120

config_schema:
  type: object
  properties:
    action:
      type: string
      enum: ["navigate", "snapshot", "screenshot", "click", "type", "close_session"]
    url:
      type: string
      description: "URL for navigate. Must start with http:// or https://"
    session_id:
      type: string
      pattern: "^[A-Za-z0-9_.-]{1,80}$"
      default: "default"
    selector:
      type: string
    text:
      type: string
    timeout_ms:
      type: integer
      minimum: 1000
      maximum: 100000
      default: 30000
    max_output_chars:
      type: integer
      minimum: 1000
      maximum: 200000
      default: 50000
  required: [action]
