# ryeos:signed:2026-05-23T13:47:53Z:4a1bbaab252209271be39d07a0297b6d782d37d568b96ea7d06d13b779d37df3:rDtRc6SAj74bmIFELpaHCAzuYU2W72GLhM9S4UY9f3byExGUvgffCiAtraWgYgqTX6N04bNNL31NF3qXo8WDCg==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
name: cockpit-base
version: "1.0.0"
description: Default RyeOS cockpit — three-pane mission control

layout:
  root: main
  nodes:
    main:
      type: split
      axis: horizontal
      ratio: 0.25
      first: thread_list
      second: right
    thread_list:
      type: pane
      view: thread_list
    right:
      type: split
      axis: vertical
      ratio: 0.85
      first: thread
      second: status
    thread:
      type: pane
      view: thread
    status:
      type: pane
      view: remotes

ambient:
  show_background: true
  opacity: 1.0

affordances:
  - id: view.thread_list
    label: Threads
    category: View
  - id: view.remotes
    label: Remotes
    category: View
  - id: view.trust
    label: Trust
    category: View
  - id: view.graph
    label: Graph
    category: View
  - id: layout.reset
    label: Reset Layout
    category: Layout

instruments:
  - id: thread_budget
    kind: facet_gauge
    source: focused.thread
    facets:
      - cost.spend
      - cost.input_tokens
      - cost.output_tokens
  - id: graph_progress
    kind: facet_status
    source: focused.thread
    facets:
      - graph.current_node
      - graph.progress
