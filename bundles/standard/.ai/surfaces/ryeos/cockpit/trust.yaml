# ryeos:signed:2026-05-23T12:11:51Z:48e167c630fe90828059961783cc3c066755f8c6b3b3a143a44171d9422c2866:XE6DUsmdiH0FeHyRDmWTo9YqYtJZQRnqdcOgUsQ8O3s3STGW+6h9Tv9BFoYO9yHfXbLgPPU8kc6Fpm0W+g4oCA==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
extends: surface:ryeos/cockpit/base
name: trust-console
version: "1.0.0"
description: Trust/security-focused RyeOS cockpit

layout:
  root: main
  nodes:
    main:
      type: split
      axis: horizontal
      ratio: 0.35
      first: trust
      second: right
    trust:
      type: pane
      view: trust
    right:
      type: split
      axis: vertical
      ratio: 0.6
      first: thread_list
      second: items
    thread_list:
      type: pane
      view: thread_list
    items:
      type: pane
      view: space_browser

commands:
  - id: view.trust
    label: Trust Dashboard
    category: Trust
  - id: view.items
    label: Item Signatures
    category: Trust

instruments:
  - id: trust_summary
    kind: facet_status
    source: global
    facets:
      - trust.summary
      - trust.untrusted_count
