# ryeos:signed:2026-05-23T13:47:53Z:84088286a083bce96b3ea59f2c2fd76c43201f99543e800acb178df7d0ea59a2:MCRxQiAyX9345iMpn0j7o3N1Y+Y3GRXmsvcxxZhALCryz1mIMuE85D1a2R3ZjHkcSxUePdLGjDO7bVo9idefDQ==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
extends: surface:ryeos/cockpit/base
name: graph-operator
version: "1.0.0"
description: Graph-focused RyeOS cockpit

layout:
  root: main
  nodes:
    main:
      type: split
      axis: horizontal
      ratio: 0.28
      first: graph
      second: details
    graph:
      type: pane
      view: graph
    details:
      type: split
      axis: vertical
      ratio: 0.6
      first: event_timeline
      second: thread_list
    event_timeline:
      type: pane
      view: event_inspector
    thread_list:
      type: pane
      view: thread_list

affordances:
  - id: view.graph
    label: Graph Topology
    category: Graph
  - id: view.events
    label: Event Timeline
    category: Graph

instruments:
  - id: graph_progress
    kind: facet_status
    source: focused.thread
    facets:
      - graph.current_node
      - graph.progress
      - graph.retry_count
