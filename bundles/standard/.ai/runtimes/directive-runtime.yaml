kind: runtime
serves: directive
default: true
binary_ref: bin/x86_64-unknown-linux-gnu/ryeos-directive-runtime
abi_version: "v1"
required_caps:
  - runtime.execute
launch_contract:
  primary_allowed_kinds:
    - directive
  primary_allowed_spaces:
    - bundle
    - project
  primary_allowed_trust:
    - trusted_bundle
    - trusted_project
  ref_bindings:
    model:
      required: true
      allowed_kinds:
        - directive
      allowed_spaces:
        - bundle
        - project
      allowed_trust:
        - trusted_bundle
        - trusted_project
  preparation:
    kind: handler
    handler: handler:ryeos/standard/directive-launch
    config: {}
  config_inputs:
    model_routing:
      kind: item
      id: ryeos-runtime/model_routing
      required: false
      merge: deep_merge
      allowed_spaces:
        - bundle
        - project
      allowed_trust:
        - trusted_bundle
        - trusted_project
    model_providers:
      kind: catalog
      prefix: ryeos-runtime/model-providers
      required: true
      entry_merge: deep_merge
      allowed_spaces:
        - bundle
      allowed_trust:
        - trusted_bundle
  secret_policy:
    max_requirements: 4
    allowed_names:
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
      - OPENROUTER_API_KEY
      - ZEN_API_KEY
  required_runtime_data:
    - provider_snapshot
  runtime_facts:
    provider_id: {required: true, kind: string, max_bytes: 128}
    model_name: {required: true, kind: string, max_bytes: 256}
    context_window: {required: true, kind: integer, max_bytes: 32}
    sampling: {required: true, kind: json, max_bytes: 4096}
    matched_profile: {required: false, kind: string, max_bytes: 128}
    config_hash: {required: true, kind: string, max_bytes: 66}
    config_value_digest: {required: true, kind: string, max_bytes: 66}
    config_sources: {required: true, kind: json, max_bytes: 4096}
description: "Interprets directive workflows by orchestrating LLM threads"
