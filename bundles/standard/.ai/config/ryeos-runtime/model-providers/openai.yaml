# ryeos:signed:2026-05-23T09:45:40Z:1b6cf6fc0175c73a06c38598f594102bd354c1bde8a882c19fd9273eb2efba4b:HeptwVR6R5FIU9MlNurccut+AceXRT2WM5kb8lJT1f9Kjh74RJbAifTPBci00Gzn0XqP8eZqRiOkfmktnTGYAQ==:f168bc6752bd022d89a6778a8d2239b302f453d7e862770ed7ed1093c96363d1
category: "ryeos-runtime/model-providers"
family: chat_completions
base_url: "https://api.openai.com/v1"
auth:
  env_var: OPENAI_API_KEY
  header_name: Authorization
  prefix: "Bearer "
headers:
  Content-Type: application/json
schemas:
  messages:
    role_map: {user: user, assistant: assistant, system: system, tool: tool}
    content_key: content
    system_message: {mode: message_role}
    tool_result:
      role: tool
      wrap_mode: direct
      block_template:
        tool_call_id: "{tool_call_id}"
        content: "{content}"
    tool_call_block_template:
      id: "{id}"
      type: function
      function:
        name: "{name}"
        arguments: "{input_json}"
  tools:
    template:
      type: function
      function:
        name: "{name}"
        description: "{description}"
        parameters: "{schema}"
  streaming: {mode: delta_merge}
body_template:
  model: "{model}"
  messages: "{messages}"
  tools: "{tools}"
  stream: "{stream}"
  stream_options:
    include_usage: true
pricing:
  input_per_million: 0.0
  output_per_million: 0.0
  models:
    gpt-4o:        {input_per_million: 2.50, output_per_million: 10.00}
    gpt-4o-mini:   {input_per_million: 0.15, output_per_million: 0.60}
    o1:            {input_per_million: 15.00, output_per_million: 60.00}
    o3-mini:       {input_per_million: 1.10, output_per_million: 4.40}
extra:
  stream_url: "/chat/completions"
