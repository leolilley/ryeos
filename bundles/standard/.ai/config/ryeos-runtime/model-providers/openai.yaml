# ryeos:signed:2026-07-21T00:52:25Z:0a1546ad6a4afedc6bf25c587c755c8afb82df38424fd39fd488a786bbe292ec:sNb+TCRJ9i7DgT9zSAiGKkXZ+BchthlVTb+oLxWajf6iXsRApeWYn/yeRvqmNfQ1vaa/o7i5taF/ELITaeGrAg==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
category: "ryeos-runtime/model-providers"
family: chat_completions
base_url: "https://api.openai.com/v1"
auth:
  env_var: OPENAI_API_KEY
  header_name: Authorization
  prefix: "Bearer "
headers:
  Content-Type: application/json
schemas:
  messages:
    role_map: {user: user, assistant: assistant, system: system, tool: tool}
    content_key: content
    system_message: {mode: message_role}
    tool_result:
      role: tool
      wrap_mode: direct
      block_template:
        tool_call_id: "{tool_call_id}"
        content: "{content}"
    tool_call_block_template:
      id: "{id}"
      type: function
      function:
        name: "{name}"
        arguments: "{input_json}"
  tools:
    template:
      type: function
      function:
        name: "{name}"
        description: "{description}"
        parameters: "{schema}"
  streaming: {mode: delta_merge}
body_template:
  model: "{model}"
  messages: "{messages}"
  tools: "{tools}"
  stream: "{stream}"
  stream_options:
    include_usage: true
pricing:
  input_per_million: 0.0
  output_per_million: 0.0
  models:
    gpt-4o:        {input_per_million: 2.50, output_per_million: 10.00}
    gpt-4o-mini:   {input_per_million: 0.15, output_per_million: 0.60}
    o1:            {input_per_million: 15.00, output_per_million: 60.00}
    o3-mini:       {input_per_million: 1.10, output_per_million: 4.40}
extra:
  stream_url: "/chat/completions"
  setup:
    display_name: OpenAI
    priority: 20
    credential: {label: API key, secret_name: OPENAI_API_KEY, input: secret}
    help_url: https://platform.openai.com/api-keys
    validation: {ref: "service:model-providers/validate", url: "https://api.openai.com/v1/models", timeout_seconds: 15}
    models:
      - {name: gpt-4o-mini, display_name: GPT-4o mini, context_window: 128000}
      - {name: gpt-4o, display_name: GPT-4o, context_window: 128000, recommended: true}
      - {name: o3-mini, display_name: o3-mini, context_window: 200000}
