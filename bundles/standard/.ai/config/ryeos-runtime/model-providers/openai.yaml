# ryeos:signed:2026-07-22T08:09:36Z:65a04058a86445a38e74091ef1a715d7ad58eae933830b0aff5072b182be7567:Ei7BRvq1wjLEmcqxzleFYceN2oHW3rM3c476aoQKpeesS1HQgnN8a5UupGFdFW7ooskx0hVXzdLCtR16OEPxDA==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
category: "ryeos-runtime/model-providers"
family: chat_completions
base_url: "https://api.openai.com/v1"
auth:
  env_var: OPENAI_API_KEY
  header_name: Authorization
  prefix: "Bearer "
headers:
  Content-Type: application/json
schemas:
  accounting: {require_usage: true}
  messages:
    role_map: {user: user, assistant: assistant, system: system, tool: tool}
    content_key: content
    system_message: {mode: message_role}
    tool_result:
      role: tool
      wrap_mode: direct
      block_template:
        tool_call_id: "{tool_call_id}"
        content: "{content}"
    tool_call_block_template:
      id: "{id}"
      type: function
      function:
        name: "{name}"
        arguments: "{input_json}"
  tools:
    template:
      type: function
      function:
        name: "{name}"
        description: "{description}"
        parameters: "{schema}"
  streaming:
    mode: delta_merge
    metadata:
      finish_reason_path: choices.0.finish_reason
      response_id_path: id
      error:
        path: error
        message_path: message
        code_path: code
  output_limit: {path: max_completion_tokens, semantics: provider_native_output_tokens}
body_template:
  model: "{model}"
  messages: "{messages}"
  tools: "{tools}"
  stream: "{stream}"
  stream_options:
    include_usage: true
pricing:
  input_per_million: 0.0
  output_per_million: 0.0
  models:
    gpt-4o:        {input_per_million: 2.50, output_per_million: 10.00}
    gpt-4o-mini:   {input_per_million: 0.15, output_per_million: 0.60}
    o1:            {input_per_million: 15.00, output_per_million: 60.00}
    o3-mini:       {input_per_million: 1.10, output_per_million: 4.40}
extra:
  stream_url: "/chat/completions"
  setup:
    display_name: OpenAI
    priority: 20
    credential: {label: API key, secret_name: OPENAI_API_KEY, input: secret}
    help_url: https://platform.openai.com/api-keys
    validation: {ref: "service:model-providers/validate", url: "https://api.openai.com/v1/models", timeout_seconds: 15}
    models:
      - {name: gpt-4o-mini, display_name: GPT-4o mini, context_window: 128000}
      - {name: gpt-4o, display_name: GPT-4o, context_window: 128000, recommended: true}
      - {name: o3-mini, display_name: o3-mini, context_window: 200000}
