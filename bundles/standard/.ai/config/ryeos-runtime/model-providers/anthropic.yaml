category: "ryeos-runtime/model-providers"
family: anthropic_messages
base_url: "https://api.anthropic.com/v1/messages"
auth:
  env_var: ANTHROPIC_API_KEY
  header_name: x-api-key
  prefix: ""
headers:
  Content-Type: application/json
  anthropic-version: "2023-06-01"
schemas:
  accounting: {require_usage: true}
  messages:
    role_map: {user: user, assistant: assistant, system: system, tool: user}
    content_key: content
    text_placement: blocks_array
    text_block_template:
      type: text
      text: "{text}"
    assistant_tool_calls_placement: inline_blocks
    system_message: {mode: body_field, field: system}
    tool_result:
      role: user
      wrap_mode: content_blocks
      block_template:
        type: tool_result
        tool_use_id: "{tool_call_id}"
        content: "{content}"
    tool_call_block_template:
      type: tool_use
      id: "{id}"
      name: "{name}"
      input: "{input}"
  tools:
    template:
      name: "{name}"
      description: "{description}"
      input_schema: "{schema}"
  streaming:
    mode: event_typed
    metadata:
      finish_reason_path: delta.stop_reason
      response_id_path: message.id
      error:
        path: error
        message_path: message
        code_path: type
  output_limit: {path: max_tokens, semantics: provider_native_output_tokens}
body_template:
  model: "{model}"
  messages: "{messages}"
  tools: "{tools}"
  stream: "{stream}"
body_extra:
  max_tokens: 8192
pricing:
  input_per_million: 0.0
  output_per_million: 0.0
