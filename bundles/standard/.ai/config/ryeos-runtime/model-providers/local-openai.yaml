# ryeos:signed:2026-07-22T08:09:36Z:e794e2a61cd646db1af3f169c60626f645b8622fca4ec0e544d749fa2aaff504:1YnT6qAmq+9eldZq9MXYFJeLw8X6Q9+4/d8S1kQZip2kxrV2Ta3/8n7GHn9l0cNfys6VQ3xPUvze14TwqoQZCw==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
category: "ryeos-runtime/model-providers"
family: chat_completions
# Offline/eval target: a local OpenAI-compatible server (vLLM, llama.cpp,
# etc.). `auth: {}` means no credential header is sent, so this provider
# works with internet disabled and no API key set.
base_url: "http://127.0.0.1:8000/v1"
auth: {}
headers:
  Content-Type: application/json
schemas:
  messages:
    role_map: {user: user, assistant: assistant, system: system, tool: tool}
    content_key: content
    system_message: {mode: message_role}
    tool_result:
      role: tool
      wrap_mode: direct
      block_template:
        tool_call_id: "{tool_call_id}"
        content: "{content}"
    tool_call_block_template:
      id: "{id}"
      type: function
      function:
        name: "{name}"
        arguments: "{input_json}"
  tools:
    template:
      type: function
      function:
        name: "{name}"
        description: "{description}"
        parameters: "{schema}"
  streaming:
    mode: delta_merge
    metadata:
      finish_reason_path: choices.0.finish_reason
      response_id_path: id
      error:
        path: error
        message_path: message
        code_path: code
  output_limit: {path: max_tokens, semantics: provider_native_output_tokens}
body_template:
  model: "{model}"
  messages: "{messages}"
  tools: "{tools}"
  stream: "{stream}"
  stream_options:
    include_usage: true
# Local open-weights models are free to run; report zero spend so cost
# accounting still records token counts without inventing a dollar figure.
pricing:
  explicitly_free: true
  input_per_million: 0.0
  output_per_million: 0.0
extra:
  stream_url: "/chat/completions"
  setup:
    display_name: Local OpenAI-compatible
    priority: 90
    credential: null
    validation: {ref: "service:model-providers/validate", url: "http://127.0.0.1:8000/v1/models", timeout_seconds: 5}
    models: []
