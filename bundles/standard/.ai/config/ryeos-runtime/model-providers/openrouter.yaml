# ryeos:signed:2026-07-22T08:09:36Z:fc3a075ac1e7ebe6bd01c2178162f20d8f2e6ab32bf89063a8a7f1f1e3c89660:Uqs2K3jlebTwIcybujbevgmQKkSl4IBcwcyt3d4iqixH1QRyeKRMQ2E8dziowV9H8HPH1dygdYfFb+MXJEiUBw==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
category: "ryeos-runtime/model-providers"
family: chat_completions
base_url: "https://openrouter.ai/api/v1"
auth:
  env_var: OPENROUTER_API_KEY
  header_name: Authorization
  prefix: "Bearer "
headers:
  Content-Type: application/json
schemas:
  accounting: {require_usage: true}
  messages:
    role_map: {user: user, assistant: assistant, system: system, tool: tool}
    content_key: content
    system_message: {mode: message_role}
    tool_result:
      role: tool
      wrap_mode: direct
      block_template:
        tool_call_id: "{tool_call_id}"
        content: "{content}"
    tool_call_block_template:
      id: "{id}"
      type: function
      function:
        name: "{name}"
        arguments: "{input_json}"
  tools:
    template:
      type: function
      function:
        name: "{name}"
        description: "{description}"
        parameters: "{schema}"
  streaming:
    mode: delta_merge
    metadata:
      usage:
        path: usage
        input_tokens_path: prompt_tokens
        output_tokens_path: completion_tokens
        reasoning_tokens_path: completion_tokens_details.reasoning_tokens
        reported_cost_path: cost
        reported_cost_unit: usd
        cost_details_path: cost_details
        is_byok_path: is_byok
        reasoning_included_in_output: true
        aggregation: latest_snapshot
        single_snapshot: true
      finish_reason_path: choices.0.finish_reason
      response_id_path: id
      generation_id_header: x-generation-id
      error:
        path: error
        message_path: message
        finish_reasons: [error]
        code_path: code
        metadata_path: metadata
  output_limit: {path: max_tokens, semantics: provider_native_output_tokens}
body_template:
  model: "{model}"
  messages: "{messages}"
  tools: "{tools}"
  stream: "{stream}"
  stream_options:
    include_usage: true
