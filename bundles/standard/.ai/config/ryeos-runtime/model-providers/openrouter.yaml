category: "ryeos-runtime/model-providers"
family: chat_completions
base_url: "https://openrouter.ai/api/v1"
auth:
  env_var: OPENROUTER_API_KEY
  header_name: Authorization
  prefix: "Bearer "
headers:
  Content-Type: application/json
schemas:
  messages:
    role_map: {user: user, assistant: assistant, system: system, tool: tool}
    content_key: content
    system_message: {mode: message_role}
    tool_result:
      role: tool
      wrap_mode: direct
      block_template:
        tool_call_id: "{tool_call_id}"
        content: "{content}"
    tool_call_block_template:
      id: "{id}"
      type: function
      function:
        name: "{name}"
        arguments: "{input_json}"
  tools:
    template:
      type: function
      function:
        name: "{name}"
        description: "{description}"
        parameters: "{schema}"
  streaming: {mode: delta_merge}
body_template:
  model: "{model}"
  messages: "{messages}"
  tools: "{tools}"
  stream: "{stream}"
  stream_options:
    include_usage: true
