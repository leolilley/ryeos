# ryeos:signed:2026-07-02T03:50:18Z:1a8f00b7543f8af5db78fbbd80f68ac0d8a4ae3bca3de52bac44b40dbdc4e0b3:ktiUIO6pjibQOLds/kBbnYP5/sOhKZQiPBR8o9A/DHrgMi+Gkkdfm9eFjPKfUjFlg+icFzn7rKxumkvQItU6Aw==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
category: "ryeos/knowledge"
version: "1.0.0"
description: "Recall a knowledge item composed into text within a token budget. Use this at runtime to load a specific knowledge doc on demand — e.g. a per-run model written by an upstream step whose ref is only known now."

executor_id: "@method_dispatch"

method_dispatch:
  method: compose
  ref_kind: knowledge

input_schema:
  type: object
  required: [ref]
  properties:
    ref:
      type: string
      description: "Knowledge item to compose. A bare id (e.g. arc/games/ar25/dynamics — the knowledge kind is implied) or a full knowledge:… ref."
    token_budget:
      type: integer
      default: 4000
      description: "Maximum tokens of composed context to return."
