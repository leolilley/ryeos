version: "1.0.0"
category: "ryeos/core/markdown"
description: "Directive parser: extracts YAML header (frontmatter or fenced block) and body from markdown"
handler: "handler:ryeos/core/yaml-header-document"
parser_api_version: 1
parser_config:
  require_header: true
  body_field: body
  forms:
    - kind: frontmatter
      delimiter: "---"
    - kind: fenced_block
      language: yaml
output_schema:
  root_type: mapping
  required:
    body:
      type: single
      prim: string
  optional:
    extends:
      type: union
      prims: [string, "null"]
    requires:
      type: single
      prim: mapping
    context:
      type: single
      prim: mapping
