category: routes
section: routes
id: ui/events/session
path: /ui/events/session/{session_id}
methods:
  - GET
auth: browser_session
limits:
  body_bytes_max: 0
  timeout_ms: 0
  concurrent_max: 256
response:
  mode: event_stream
  source: session_events
  source_config:
    session_id: "${path.session_id}"
    keep_alive_secs: 15
