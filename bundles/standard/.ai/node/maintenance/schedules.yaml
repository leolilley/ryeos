# Bundle-authored maintenance schedule declaration (standard bundle).
#
# The daemon reconciles this into a signed node schedule spec at init
# (crates/bin/daemon/src/maintenance_schedule.rs), filling in its own identity
# as the acting principal and signing with the node key. The scheduler reconcile
# then projects and fires it like any other schedule, so `ryeos thread list`
# shows maintenance fires and `scheduler pause maintenance-gc` pauses them.
#
# This is the ONLY source of maintenance cadence/params: no declaration, no
# scheduled GC — the daemon schedules nothing implicitly. Every boot refreshes
# declaration-owned fields and removes generated specs no longer declared.
# `enabled` is the initial value for a new spec; after creation, use scheduler
# pause/resume, whose explicit operator override survives declaration refresh.
#
# Runs the deep GC profile daily (see GcParams profile docs): CAS sweep plus
# cache purge, trace truncation, and captured-policy runtime-history pruning.
# Operational cleanup windows are authored here; omission disables that pass
# because Rust supplies no retention age/count. overlap_policy `skip` never
# stacks a second GC over a running one.
spec_version: 1
schedules:
  - schedule_id: maintenance-gc
    item_ref: "service:maintenance/gc"
    ref_bindings: {}
    schedule_type: cron
    expression: "0 0 4 * * *"   # 04:00:00 UTC daily
    timezone: UTC
    misfire_policy: skip
    overlap_policy: skip
    lateness_grace_secs: 60
    # The cadence and every cleanup window are signed data. Rust supplies no
    # implicit timer or fallback age. This seeds a newly created spec; use
    # scheduler pause/resume for the durable operator override thereafter.
    enabled: true
    params:
      compact: true
      policy:
        manual_pushes: 10
        auto_snapshots: 30
      deep: true
      schedule_fire_max_age_days: 30
      schedule_fire_max_count: 500
      sync_job_retention_days: 14
      seat_lease_grace_seconds: 600
      durable_cas_upload_max_age_seconds: 21600
    capabilities:
      - "ryeos.execute.service.maintenance/gc"
