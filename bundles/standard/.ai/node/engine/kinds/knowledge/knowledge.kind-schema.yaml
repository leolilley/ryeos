# ryeos:signed:2026-07-02T06:20:26Z:b0f14eebd5ae369c13ecb22fab52b7f42a6d0737a3dae3a0c40fb869c251848d:1Z+H7s5fppxqm1ATmAEEAZ0RsLZ9cb996VxkcC5VqH0cYKhOeI04N9WSEhXlFLrfALclruDk55HMd6xicLG6Dw==:64f806fe8f81efdecf5245e1b1941aeecfe3a56ff1826adc1214538ab69953ca
category: "engine/kinds/knowledge"
version: "1.0.0"
location:
  directory: knowledge
resolution:
  - step: resolve_references
effective_trust:
  include_references: false
execution:
  # Method-dispatch execution model. The daemon resolves the requested
  # method (default: `compose`) against the declared methods, validates
  # args, then spawns the kind's runtime with a MethodCallEnvelope.
  # Mixed-dispatch reject forbids `methods` + `delegate`/`terminator`.
  #
  # `methods:` lists the GENERICALLY-DISPATCHABLE methods (invocable via
  # `execute … call.method=<name>`). It is NOT the full set the runtime
  # implements: `compose_positions` (multi-root context composition) is also
  # handled by the knowledge runtime, but ONLY via the
  # `compose_context_positions` launch augmentation, which builds a bespoke
  # multi-root payload and is not generically dispatchable. It is
  # intentionally absent here so a direct `call.method=compose_positions`
  # is cleanly rejected as undeclared.
  method_dispatch:
    via: runtime_registry
    default: compose
  methods:
    compose:
      scope: single_root
      runtime_config:
        token_estimation:
          path: knowledge-runtime/token_estimation
      args:
        token_budget:
          type: integer
          required: false
          default: 4000
        exclude_refs:
          type: array
          items:
            type: string
          required: false
          default: []
    # Read side. These methods do not mutate state; the daemon builds the
    # verified corpus (items_by_ref/edges) and the runtime computes over it.
    query:
      scope: corpus
      args:
        query:
          type: string
          required: true
        limit:
          type: integer
          required: false
          default: 10
        include_content:
          type: boolean
          required: false
          default: false
        filters:
          type: object
          required: false
    graph:
      scope: corpus
      args:
        roots:
          type: array
          items:
            type: string
          required: false
          default: []
        depth:
          type: integer
          required: false
          default: 3
    validate:
      scope: corpus
      args:
        roots:
          type: array
          items:
            type: string
          required: false
          default: []
  thread_profile:
    name: knowledge_run
    root_executable: true
    supports_interrupt: false
    supports_continuation: false
formats:
  - extensions: [".md"]
    parser: parser:ryeos/core/markdown/frontmatter
    signature:
      prefix: "<!--"
      suffix: "-->"
  - extensions: [".yaml", ".yml"]
    parser: parser:ryeos/core/yaml/yaml
    signature:
      prefix: "#"
# Knowledge items have no structural shape requirement at the kind
# level — consumers pull arbitrary structured data from markdown
# frontmatter or yaml documents.
# Identity composer — this kind has no multi-document composition (no extends chain, no inheritance). Items are loaded as-is.
composer: handler:ryeos/core/identity
composed_value_contract:
  root_type: mapping
  required: {}
metadata:
  rules:
    name:
      from: filename
      required: true
    version:
      from: path
      key: version
    category:
      from: relative_dir
      required: true
