# ryeos:signed:2026-06-21T12:25:07Z:d315e6257f983e6e1471a8fe3ad2deb20d5f9a5adeba4f850db9e86f1bad604d:MnQFhPXXIUiS0rVRsVf9vdSupqwuh3WPvhvPXu9aFJDj7GbGCsilyn+tYwZP2EqEY1oRxUiFHdOS7gl1S9wFBg==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
category: "engine/kinds/knowledge"
version: "1.0.0"
location:
  directory: knowledge
resolution:
  - step: resolve_references
effective_trust:
  include_references: false
execution:
  # Op-dispatch execution model. The daemon resolves the requested op
  # (default: `compose`) against the declared operations, validates
  # inputs, then spawns the kind's runtime with a BatchOpEnvelope.
  # Mixed-dispatch reject forbids `operations` + `delegate`/`terminator`.
  #
  # `operations:` lists the GENERICALLY-DISPATCHABLE ops (invocable via
  # `execute … op=<name>`). It is NOT the full set the runtime implements:
  # `compose_positions` (multi-root context composition) is also handled by
  # the knowledge runtime, but ONLY via the `compose_context_positions`
  # launch augmentation, which builds a bespoke multi-root payload and is
  # not generically dispatchable. It is intentionally absent here so a
  # direct `op=compose_positions` is cleanly rejected as undeclared.
  operations:
    - name: compose
      side_effects: writes_chain
      dispatch: { via: runtime_registry }
      inputs:
        token_budget:
          type: integer
          required: false
          default: 4000
        exclude_refs:
          type: array
          items:
            type: string
          required: false
          default: []
    # Read side. These ops do not mutate state (side_effects: none); the
    # daemon builds the verified corpus (items_by_ref/edges) and the
    # runtime computes over it.
    - name: query
      side_effects: none
      dispatch: { via: runtime_registry }
      scope: corpus
      inputs:
        query:
          type: string
          required: true
        limit:
          type: integer
          required: false
          default: 10
        include_content:
          type: boolean
          required: false
          default: false
        filters:
          type: object
          required: false
    - name: graph
      side_effects: none
      dispatch: { via: runtime_registry }
      scope: corpus
      inputs:
        roots:
          type: array
          items:
            type: string
          required: false
          default: []
        depth:
          type: integer
          required: false
          default: 3
    - name: validate
      side_effects: none
      dispatch: { via: runtime_registry }
      scope: corpus
      inputs:
        roots:
          type: array
          items:
            type: string
          required: false
          default: []
  default_operation: compose
  thread_profile:
    name: knowledge_run
    root_executable: true
    supports_interrupt: false
    supports_continuation: false
formats:
  - extensions: [".md"]
    parser: parser:ryeos/core/markdown/frontmatter
    signature:
      prefix: "<!--"
      suffix: "-->"
  - extensions: [".yaml", ".yml"]
    parser: parser:ryeos/core/yaml/yaml
    signature:
      prefix: "#"
# Knowledge items have no structural shape requirement at the kind
# level — consumers pull arbitrary structured data from markdown
# frontmatter or yaml documents.
# Identity composer — this kind has no multi-document composition (no extends chain, no inheritance). Items are loaded as-is.
composer: handler:ryeos/core/identity
composed_value_contract:
  root_type: mapping
  required: {}
metadata:
  rules:
    name:
      from: filename
      required: true
    version:
      from: path
      key: version
    category:
      from: relative_dir
      required: true
