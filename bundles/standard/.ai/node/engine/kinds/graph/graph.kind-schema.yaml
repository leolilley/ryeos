# ryeos:signed:2026-07-21T00:24:30Z:8997fef31bff96e5cd6aae2cf167ff539064c3b0a2fe9a695ebb79910484de6b:OfrKbDNbwjyiF2MwN9HPdaZAqWRuNz+IJs0FhxDokwCmxgBNaYITis5M5mymle2qe3gonA7pRyGMIxjqEE5TDg==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
category: "engine/kinds/graph"
version: "1.0.0"
location:
  directory: graphs
resolution:
  - step: resolve_extends_chain
effective_trust:
  include_references: false
execution:
  # Explicit delegation to the runtime registry. The dispatcher will
  # call `RuntimeRegistry::lookup_for("graph")` to find the default
  # runtime serving this kind (today: `runtime:graph-runtime`).
  # Without this `delegate` block the dispatcher refuses to consult
  # the registry — there is no implicit fallback.
  delegate:
    via: runtime_registry
  thread_profile:
    name: graph_run
    root_executable: true
    # A graph walker has NO interrupt contract. There is no in-flight signal a
    # running segment-walk honors and reseals as a partial turn (the way a
    # directive folds SIGUSR1 into an `interrupted: true` cognition_out).
    # Declaring interrupt support would let `allowed_actions` offer — and
    # `commands/submit` accept — an `interrupt` command the walker cannot
    # service, i.e. undefined behavior. So the profile withholds it:
    # `allowed_actions(graph_run, running, …)` omits `interrupt` and
    # `commands/submit` refuses it (belt), and no client surfaces an interrupt
    # control for a graph (suspenders). To stop a graph, cancel or kill it. See
    # .ai/knowledge/ryeos/development/steering-graph-interrupt-and-cancel-path.md.
    supports_interrupt: false
    # A graph self-continues by MACHINE only: when a segment-step budget is
    # exhausted the walker checkpoints the frontier and a machine successor
    # resumes it from that checkpoint. So the kind IS continuation-capable.
    supports_continuation: true
    # But a graph folds no conversation, so an operator follow-up
    # (threads.input) has nowhere to deliver input — it is refused. Graph
    # *follow* — a graph driving and polling a CHILD's continuation to terminal —
    # is a separate capability and grants the parent no operator follow-up.
    supports_operator_followup: false
formats:
  - extensions: [".yaml", ".yml"]
    parser: parser:ryeos/core/yaml/yaml
    signature:
      prefix: "#"
# Graph permissions composer — lifts `requires.capabilities.declared` from the
# graph item into `policy_facts.effective_caps` so the daemon-side callback cap
# enforcement gates graph action callbacks the same way it gates directive tool
# callbacks, and rejects a legacy top-level `permissions:` block.
composer: handler:ryeos/core/graph-permissions
composed_value_contract:
  root_type: mapping
  required: {}
  optional:
    description:
      type: single
      prim: string
    config:
      type: single
      prim: mapping
    # Unified capability requirements: `declared` (self-asserted action
    # authority, lifted into effective_caps by the graph-permissions composer)
    # and `manifest` (runtime authority minted from the signed manifest at
    # launch). Graph composition is leaf-only — no ancestor narrowing.
    requires:
      type: single
      prim: mapping
metadata:
  rules:
    name:
      from: filename
      required: true
    version:
      from: path
      key: version
    description:
      from: path
      key: description
    category:
      from: relative_dir
      required: true
    executor_id:
      from: path
      key: executor_id
