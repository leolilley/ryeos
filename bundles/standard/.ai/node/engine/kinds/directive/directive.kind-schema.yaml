# ryeos:signed:2026-06-23T05:17:20Z:c2f3ef591184a824abf361a3227cc2bd78b3faa68105750de75e33c69f20e504:ieJVG380nFBja3XgMv/EWkBjjRK95JZMrCOysv0gAUhNpkelvecfxgXxAGJANFYtItc6Y6ozBXCuNvpiv1ZOAw==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
category: "engine/kinds/directive"
version: "1.0.0"
location:
  directory: directives
resolution:
  - step: resolve_extends_chain
effective_trust:
  include_references: false
execution:
  # Explicit delegation to the runtime registry. The dispatcher will
  # call `RuntimeRegistry::lookup_for("directive")` to find the
  # default runtime serving this kind (today: `runtime:directive-runtime`).
  # Without this `delegate` block the dispatcher refuses to consult
  # the registry — there is no implicit fallback.
  delegate:
    via: runtime_registry
  thread_profile:
    name: directive_run
    root_executable: true
    supports_interrupt: true
    supports_continuation: true
  # Launch augmentation: before the directive runtime is spawned, the
  # daemon pre-resolves knowledge refs declared in the directive's
  # `context:` block, dispatches a child knowledge-runtime compose
  # method, and writes the rendered strings into `rendered_contexts`.
  # If `composed_context` is missing or empty, the augmentation is a
  # no-op — directives without context blocks are unaffected.
  launch_augmentations:
    - step: compose_context_positions
      target_kind: knowledge
      target_method: compose_positions
      source_derived: composed_context
      output_derived: rendered_contexts
      meta_output_derived: rendered_contexts_meta
      per_position_budget:
        system: 4000
        before: 2000
        after: 2000
formats:
  - extensions: [".md"]
    parser: parser:ryeos/core/markdown/directive
    signature:
      prefix: "<!--"
      suffix: "-->"
inventory_kinds: [tool]
composer: handler:ryeos/core/extends-chain
composer_config:
  extends_field: extends
  fields:
    - name: body
      strategy: root_verbatim
      required: true
      expect_value_type: string
      derive_as: body
    # Unified capability requirements. `declared` (self-asserted action
    # authority → effective_caps) narrows against the parent by dropping;
    # `manifest` (runtime authority, manifest-backed) narrows by failing on
    # widen. A child can never request more than its parent template; the signed
    # bundle manifest is the final upper bound for `manifest` at launch.
    - name: requires
      strategy: narrow_requires_capabilities
      expect_value_type: mapping
    - name: context
      strategy: dict_merge_string_seq_root_last
      expect_value_type: mapping
      derive_as: composed_context
      derived_dict_string_seq: true
    - name: model
      strategy: replace_root_last
      expect_value_type: mapping
    - name: limits
      strategy: dict_merge_root_last
      expect_value_type: mapping
    - name: inputs
      strategy: keyed_seq_merge_root_last
      key: name
      expect_value_type: sequence
  policy_facts:
    - name: effective_caps
      path: [requires, capabilities, declared]
      expect: array_of_strings
composed_value_contract:
  root_type: mapping
  required:
    body:
      type: single
      prim: string
  optional:
    extends:
      type: union
      prims: [string, "null"]
    context:
      type: single
      prim: mapping
    model:
      type: single
      prim: mapping
    limits:
      type: single
      prim: mapping
    inputs:
      type: single
      prim: sequence
    # Unified capability requirements (`capabilities.declared` self-asserted
    # action authority + `capabilities.manifest` manifest-backed runtime
    # authority). Narrowed against the parent through `extends` (see
    # composer_config); `manifest` is additionally bounded by the signed bundle
    # manifest at launch.
    requires:
      type: single
      prim: mapping
metadata:
  rules:
    name:
      from: filename
      required: true
    version:
      from: path
      key: version
    description:
      from: path
      key: description
    category:
      from: relative_dir
      required: true
    required_secrets:
      from: path_string_seq
      key: required_secrets
