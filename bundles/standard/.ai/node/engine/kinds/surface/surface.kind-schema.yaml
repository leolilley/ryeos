# ryeos:signed:2026-05-23T10:47:35Z:473c7e84d86c6e50ef082931d252cd2a223f3ecda19fb9b3d28ebe6a1e3f6675:G8UDmZ02V49MecKtkQWYSO/Bnju52yaLS6YfCOhe9wO1rT9ikn8JCuWMA6ghQNv78gpBswatHZZjRMDNNufFBA==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
category: "engine/kinds/surface"
version: "1.0.0"
location:
  directory: surfaces

formats:
  - extensions: [".yaml", ".yml"]
    parser: parser:ryeos/core/yaml/yaml
    signature:
      prefix: "#"

composer: handler:ryeos/core/extends-chain
resolution:
  - step: resolve_extends_chain
    field: extends
    max_depth: 16
effective_trust:
  include_references: false
composer_config:
  extends_field: extends
  fields:
    - name: layout
      strategy: replace_root_last
      expect_value_type: mapping
      required: true
    - name: input
      strategy: dict_merge_root_last
      expect_value_type: mapping
    - name: ambient
      strategy: dict_merge_root_last
      expect_value_type: mapping
    - name: commands
      strategy: keyed_seq_merge_root_last
      key: id
      expect_value_type: array
    - name: instruments
      strategy: keyed_seq_merge_root_last
      key: id
      expect_value_type: array
    - name: capabilities
      strategy: narrow_against_parent_effective
      expect_value_type: mapping

composed_value_contract:
  root_type: mapping
  required:
    layout:
      type: single
      prim: mapping
  optional:
    extends:
      type: union
      prims: [string, "null"]
    input:
      type: single
      prim: mapping
    ambient:
      type: single
      prim: mapping
    commands:
      type: single
      prim: array
    instruments:
      type: single
      prim: array
    capabilities:
      type: single
      prim: mapping

metadata:
  rules:
    name:
      from: filename
      required: true
      match: filename
    version:
      from: path
      key: version
    description:
      from: path
      key: description
    category:
      from: relative_dir
      required: true
