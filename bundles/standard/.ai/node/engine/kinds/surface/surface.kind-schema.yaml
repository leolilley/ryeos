# ryeos:signed:2026-06-13T03:01:09Z:597c4d6e0a1d2edf2e9c4ff04c5c78a7e874634f6c9bc3f9724366139321d35c:IvpwsStDwfNnBY0z55y2V+luk4+Kcq/Aw8xu3xG2xDwDwCR1z2MV7FEZlORmWAGhlxY5i+gNNOI4NE7Oe4iJDw==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
category: "engine/kinds/surface"
version: "1.0.0"
location:
  directory: surfaces

formats:
  - extensions: [".yaml", ".yml"]
    parser: parser:ryeos/core/yaml/yaml
    signature:
      prefix: "#"

composer: handler:ryeos/core/extends-chain
resolution:
  - step: resolve_extends_chain
    field: extends
    max_depth: 16
effective_trust:
  include_references: false
composer_config:
  extends_field: extends
  fields:
    - name: tiling
      strategy: dict_merge_root_last
      expect_value_type: mapping
    - name: tiles
      strategy: replace_root_last
      expect_value_type: sequence
    - name: slots
      strategy: dict_merge_root_last
      expect_value_type: mapping
    - name: style
      strategy: dict_merge_root_last
      expect_value_type: mapping
    - name: input
      strategy: dict_merge_root_last
      expect_value_type: mapping
    - name: ambient
      strategy: dict_merge_root_last
      expect_value_type: mapping
    - name: affordances
      strategy: keyed_seq_merge_root_last
      key: id
      expect_value_type: array
    - name: instruments
      strategy: keyed_seq_merge_root_last
      key: id
      expect_value_type: array
    - name: capabilities
      strategy: narrow_against_parent_effective
      expect_value_type: mapping

composed_value_contract:
  root_type: mapping
  required: {}
  optional:
    tiling:
      type: single
      prim: mapping
    tiles:
      type: single
      prim: sequence
    slots:
      type: single
      prim: mapping
    style:
      type: single
      prim: mapping
    extends:
      type: union
      prims: [string, "null"]
    input:
      type: single
      prim: mapping
    ambient:
      type: single
      prim: mapping
    affordances:
      type: single
      prim: sequence
      elements:
        type: single
        prim: mapping
        contract:
          root_type: mapping
          required:
            id: { type: single, prim: string }
          optional:
            label: { type: single, prim: string }
            category: { type: single, prim: string }
            icon: { type: single, prim: string }
            caps: { type: single, prim: sequence, elements: { type: single, prim: string } }
    instruments:
      type: single
      prim: sequence
    capabilities:
      type: single
      prim: mapping

metadata:
  rules:
    name:
      from: filename
      required: true
      match: filename
    version:
      from: path
      key: version
    description:
      from: path
      key: description
    category:
      from: relative_dir
      required: true
