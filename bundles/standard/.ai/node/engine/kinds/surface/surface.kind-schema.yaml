# ryeos:signed:2026-07-13T08:32:54Z:3687d79f2dc67ff99e83423b1a5aace2bf42707a428d260e270c181a04fc2f12:fFlr6RsaNUXtv4vQ2wI731/tFvEd8UHHuBGzzBU8XyoRPgxyYu4gYPK6qVjIuD3PHYh52EIiCvayu70HCYk8AQ==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
category: "engine/kinds/surface"
version: "1.0.0"
location:
  directory: surfaces

formats:
  - extensions: [".yaml", ".yml"]
    parser: parser:ryeos/core/yaml/yaml
    signature:
      prefix: "#"

composer: handler:ryeos/core/extends-chain
resolution:
  - step: resolve_extends_chain
    field: extends
    max_depth: 16
effective_trust:
  include_references: false
composer_config:
  extends_field: extends
  fields:
    - name: tiling
      strategy: dict_merge_root_last
      expect_value_type: mapping
    - name: tiles
      strategy: replace_root_last
      expect_value_type: sequence
    - name: slots
      strategy: dict_merge_root_last
      expect_value_type: mapping
    - name: style
      strategy: dict_merge_root_last
      expect_value_type: mapping
    - name: input
      strategy: dict_merge_root_last
      expect_value_type: mapping
    - name: ambient
      strategy: dict_merge_root_last
      expect_value_type: mapping
    - name: affordances
      strategy: keyed_seq_merge_root_last
      key: id
      expect_value_type: array
    - name: instruments
      strategy: keyed_seq_merge_root_last
      key: id
      expect_value_type: array
    - name: capabilities
      strategy: narrow_against_parent_effective
      expect_value_type: mapping
    # replace_root_last, not keyed merge: entries may be bare view refs
    # (legacy flat form) and the keyed merge silently drops keyless items.
    - name: library
      strategy: replace_root_last
      expect_value_type: array
    - name: backdrop
      strategy: replace_root_last
      expect_value_type: string
    - name: overlays
      strategy: dict_merge_root_last
      expect_value_type: mapping

composed_value_contract:
  root_type: mapping
  required: {}
  optional:
    tiling:
      type: single
      prim: mapping
    tiles:
      type: single
      prim: sequence
    slots:
      type: single
      prim: mapping
    style:
      type: single
      prim: mapping
    extends:
      type: union
      prims: [string, "null"]
    input:
      type: single
      prim: mapping
    ambient:
      type: single
      prim: mapping
    affordances:
      type: single
      prim: sequence
      elements:
        type: single
        prim: mapping
        contract:
          root_type: mapping
          required:
            id: { type: single, prim: string }
          optional:
            label: { type: single, prim: string }
            category: { type: single, prim: string }
            icon: { type: single, prim: string }
            caps: { type: single, prim: sequence, elements: { type: single, prim: string } }
    instruments:
      type: single
      prim: sequence
    capabilities:
      type: single
      prim: mapping
    # Grouped `{ group, views }` entries are canonical; bare `view:` ref
    # strings remain accepted (the launcher shelves them under their
    # path-derived group).
    library:
      type: single
      prim: sequence
      elements:
        type: union
        prims: [string, mapping]
    backdrop:
      type: single
      prim: string
    overlays:
      type: single
      prim: mapping

metadata:
  rules:
    name:
      from: filename
      required: true
      match: filename
    version:
      from: path
      key: version
    description:
      from: path
      key: description
    category:
      from: relative_dir
      required: true
