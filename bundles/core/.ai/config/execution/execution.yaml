# Execution config — system defaults
# Override per-project: .ai/config/execution/execution.yaml
category: "execution"
version: "1.0.0"
schema_version: "1.0.0"

# Defaults applied to all tool executions
defaults:
  timeout: 86400
  max_steps: 100
  max_concurrency: 10
  # Cancellation policy applied when the daemon kills a running tool.
  # Read by `NativeAsyncHandler` when the tool declares
  # `native_async: true`. Tools that supply the rich form
  # (`native_async: { cancel_mode, graceful_shutdown_secs }`) override
  # these per-tool. Modes: "graceful" (SIGTERM, wait, SIGKILL) | "hard"
  # (SIGKILL immediately).
  cancellation_mode: "graceful"
  cancellation_grace_secs: 5

# Per-tool overrides (key = tool item_id)
# tools:
#   "my/scraper/tool":
#     timeout: 600
#     cancellation_grace_secs: 30

# Node-scoped valves — read by the daemon at boot from bundle layers plus
# the node's own tree (<app_root>/.ai/config/execution/execution.yaml),
# which is the operator's overlay. Per-launch policy reads use the project
# as overlay and never read this section, so a project cannot set
# node-wide limits.
# node:
#   # Ceiling on launched-and-live launch-window members across ALL
#   # fanouts on this node (a member is a child chain; see the graph
#   # foreach `max_concurrency` launch window). Absent or 0 = unbounded.
#   max_live_fanout: 16
