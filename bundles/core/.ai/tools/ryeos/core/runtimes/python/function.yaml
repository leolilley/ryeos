category: "ryeos/core/runtimes/python"
version: "1.0.0"
executor_id: "@subprocess"
description: "Python function runtime - calls execute(params, project_path) and serializes result to stdout"

env_config:
  interpreter:
    type: local_binary
    binary: python
    candidates: [python3]
    search_paths: [".venv/bin", ".venv/Scripts"]
    var: RYE_PYTHON
    path_candidates: [python3]
  env:
    PYTHONUNBUFFERED: "1"
    PROJECT_VENV_PYTHON: "{interpreter}"

verify_deps:
  enabled: true
  scope: tool_dir
  recursive: true
  extensions: [".py", ".yaml", ".yml", ".json"]
  exclude_dirs: ["__pycache__", ".venv", "node_modules", ".git", "config"]

config_resolve:
  type: single
  spec:
    path: "execution/execution.yaml"
    mode: "deep_merge"

config:
  command: "{interpreter}"
  args:
    - "-I"
    - "-u"
    - "-c"
    - |
      import os,sys,json,hashlib,types,inspect,asyncio
      from pathlib import Path
      _saved_stdout=os.dup(1)
      os.set_inheritable(_saved_stdout,False)
      os.dup2(2,1)
      sys.stdout=sys.stderr
      def prepend(path):
          value=str(path)
          if value and value not in sys.path:sys.path.insert(0,value)
      sealed_path=sys.argv[1]
      handoff=json.loads(os.environ.get("RYEOS_VERIFIED_CODE_MAP","null"))
      entry=handoff.get("entries",dict()).get(sealed_path) if isinstance(handoff,dict) else None
      if not isinstance(handoff,dict) or handoff.get("version")!=1 or not entry:sys.exit("RyeOS Python runtime: missing sealed tool identity")
      tool_path=Path(entry["logical_path"])
      source=Path(sealed_path).read_bytes()
      actual_hash=hashlib.sha256(source).hexdigest()
      if actual_hash!=entry["content_hash"]:sys.exit("RyeOS Python runtime: sealed tool digest mismatch")
      runtime_lib=Path(sys.argv[2]).resolve()
      project_path=sys.argv[3]
      tools_root=None
      for candidate in [tool_path.parent,*tool_path.parents]:
          if candidate.name=="tools" and candidate.parent.name==".ai":
              tools_root=candidate
              break
      if tools_root is None:sys.exit(f"RyeOS Python runtime: tool is not under .ai/tools: {tool_path}")
      rel=tool_path.relative_to(tools_root)
      if len(rel.parts)<2:sys.exit(f"RyeOS Python runtime: invalid tool path under .ai/tools: {tool_path}")
      bundle_tool_root=tools_root/rel.parts[0]
      tool_dir=tool_path.parent
      for path in reversed([tool_dir,bundle_tool_root,bundle_tool_root/"lib",runtime_lib]):prepend(path)
      mod=types.ModuleType("tool")
      mod.__file__=str(tool_path)
      mod.__loader__=None
      mod.__package__=None
      mod.__spec__=None
      exec(compile(source,str(tool_path),"exec"),mod.__dict__)
      fn=getattr(mod,"execute",None)
      if not fn:sys.exit("No execute() in "+str(tool_path))
      p=json.loads(sys.stdin.read())
      if inspect.iscoroutinefunction(fn):r=asyncio.run(fn(p,project_path))
      else:r=fn(p,project_path)
      sys.stdout.flush()
      _payload=(json.dumps(r,default=str)if r is not None else json.dumps(dict()))+"\n"
      os.write(_saved_stdout,_payload.encode())
    - "{tool_path}"
    - "{runtime_dir}/lib"
    - "{project_path}"
  input_data: "{params_json}"
  timeout_secs: 300

config_schema:
  type: object
  properties:
    script:
      type: string
      description: Python module with execute(params, project_path) function
