category: "ryeos/core/runtimes/python"
version: "1.0.0"
executor_id: "@subprocess"
description: "Python script runtime - runs Python scripts that manage their own __main__ entry point"

env_config:
  interpreter:
    type: local_binary
    binary: python
    candidates: [python3]
    search_paths: [".venv/bin", ".venv/Scripts"]
    var: RYE_PYTHON
    path_candidates: [python3]
  env:
    PYTHONUNBUFFERED: "1"
    PROJECT_VENV_PYTHON: "{interpreter}"

verify_deps:
  enabled: true
  scope: tool_dir
  recursive: true
  extensions: [".py", ".yaml", ".yml", ".json"]
  exclude_dirs: ["__pycache__", ".venv", "node_modules", ".git", "config"]

config_resolve:
  type: single
  spec:
    path: "execution/execution.yaml"
    mode: "deep_merge"

config:
  command: "{interpreter}"
  args:
    - "-I"
    - "-u"
    - "-c"
    - |
      import hashlib, json, os, sys
      from pathlib import Path

      def prepend(path):
          value = str(path)
          if value and value not in sys.path:
              sys.path.insert(0, value)

      sealed_path = sys.argv[1]
      handoff = json.loads(os.environ.get("RYEOS_VERIFIED_CODE_MAP", "null"))
      entry = handoff.get("entries", dict()).get(sealed_path) if isinstance(handoff, dict) else None
      if not isinstance(handoff, dict) or handoff.get("version") != 1 or not entry:
          raise SystemExit("RyeOS Python runtime: missing sealed tool identity")
      tool_path = Path(entry["logical_path"])
      source = Path(sealed_path).read_bytes()
      actual_hash = hashlib.sha256(source).hexdigest()
      if actual_hash != entry["content_hash"]:
          raise SystemExit("RyeOS Python runtime: sealed tool digest mismatch")
      runtime_lib = Path(sys.argv[2]).resolve()
      project_path = sys.argv[3]

      tools_root = None
      for candidate in [tool_path.parent, *tool_path.parents]:
          if candidate.name == "tools" and candidate.parent.name == ".ai":
              tools_root = candidate
              break
      if tools_root is None:
          raise SystemExit(f"RyeOS Python runtime: tool is not under .ai/tools: {tool_path}")

      rel = tool_path.relative_to(tools_root)
      if len(rel.parts) < 2:
          raise SystemExit(f"RyeOS Python runtime: invalid tool path under .ai/tools: {tool_path}")

      bundle_tool_root = tools_root / rel.parts[0]
      tool_dir = tool_path.parent

      for path in reversed([tool_dir, bundle_tool_root, bundle_tool_root / "lib", runtime_lib]):
          prepend(path)

      sys.argv = [str(tool_path), "--project-path", project_path]
      globals_dict = dict(
          __name__="__main__",
          __file__=str(tool_path),
          __package__=None,
          __cached__=None,
          __spec__=None,
      )
      exec(compile(source, str(tool_path), "exec"), globals_dict)
    - "{tool_path}"
    - "{runtime_dir}/lib"
    - "{project_path}"
  input_data: "{params_json}"
  timeout_secs: 300

config_schema:
  type: object
  properties:
    script:
      type: string
      description: Python script path or inline code
    args:
      type: array
      items:
        type: string
      description: Script arguments
    module:
      type: string
      description: "Module to run with -m flag"
