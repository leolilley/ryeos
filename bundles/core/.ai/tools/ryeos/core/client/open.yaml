# ryeos:signed:2026-05-23T13:47:50Z:867bb52fe6eccf873a15727b2f073f152197fc38695039e2059c490d027bde9c:CZhrDX7ZMYC/3zKtz3YdKwg4E8ak8mpIBT2KMXZC3XgMVRyvTJnbNA0JJruOa7JhHyFHop1k96ZWVt2AYd/rBQ==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
category: "ryeos/core/client"
name: "open"
executor_id: "@subprocess"
required_caps: []
description: "Resolve an effective client descriptor and launch its declared local binary."

config:
  command: "bin:ryeos-core-tools"
  args:
    - "client-open"
    - "--params-json"
    - "{params_json}"
    - "--project-path"
    - "{project_path}"
  inherit_stdio: true
  inherit_env: true
  timeout_secs: 0

config_schema:
  type: object
  properties:
    client_ref:
      type: string
      description: "Canonical client ref. Derived from the invoking verb when absent."
    surface:
      type: string
      description: "Surface ref to open."
    surface_file:
      type: string
      description: "Local surface preview file."
    mock:
      type: boolean
      default: false
    read_only:
      type: boolean
      default: false
    project:
      type: string
      description: "Project root path."
