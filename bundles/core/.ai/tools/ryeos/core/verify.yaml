category: "ryeos/core"
name: "verify"
executor_id: "@subprocess"
required_caps: ["bundle.read"]
description: "Resolve and trust-verify one or more items via the engine"

config:
  command: "bin:ryeos-core-tools"
  args:
    - "verify"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 60

config_schema:
  type: object
  properties:
    item_ref:
      type: string
      description: "Single canonical ref or .ai path to verify. Prefer item_refs for new callers."
    item_refs:
      description: "Canonical refs or .ai paths to verify. Accepts a string or array; the tool normalizes to an array."
    project_path:
      type: string
      description: "Project root path"
