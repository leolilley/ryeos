version: "1.0.0"
executor_id: "@subprocess"
category: "ryeos/core"
name: "snapshot-show"
required_caps: ["project.read"]
description: "Show metadata for a local snapshot object."

config:
  command: "bin:ryeos-core-tools"
  args:
    - "snapshot"
    - "show"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 60

config_schema:
  type: object
  properties:
    snapshot_hash:
      type: string
      description: "Snapshot hash to inspect"
    project_path:
      type: string
      description: "Optional project root path used to include head/deployed relation flags"
  required: [snapshot_hash]
