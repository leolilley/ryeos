# ryeos:signed:2026-07-21T07:19:08Z:9caabae63b578e1009dd4b8ff043853724d003fa7b91deca75174d622913d2b8:CHUmqFNuKhHA6iY/e+aOBg2jcqiivPo3se+D92+aP/ta9MxDzSjvWG46r8z/ysKCpCnJQ/GzAfFFmLn3bddXCw==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
version: "1.0.0"
executor_id: "@subprocess"
category: "ryeos/core"
name: "snapshot-create"
required_caps: ["ryeos.write.project.live"]
description: "Create a local project snapshot from the current worktree."

config:
  command: "bin:ryeos-core-tools"
  args:
    - "snapshot"
    - "create"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 120

config_schema:
  type: object
  properties:
    project_path:
      type: string
      description: "Project root path"
    message:
      type: string
      description: "Snapshot message"
    allow_empty:
      type: boolean
      description: "Create even when the manifest matches the current head"
      default: false
  required: [project_path]
