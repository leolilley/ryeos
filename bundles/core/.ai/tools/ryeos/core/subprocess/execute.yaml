category: "ryeos/core/subprocess"
version: "1.0.0"
executor_id: null
description: "Internal terminal executor for @subprocess. Not directly executable; wrap it with a tool that declares executor_id: \"@subprocess\" and a config block."

terminal_executor:
  kind: subprocess

# Schema for wrapper `config:` blocks consumed by @subprocess. This is
# not a direct public tool input schema; this terminal item is not
# root-executable.
config_schema:
  type: object
  properties:
    command:
      type: string
      description: Command to execute
    args:
      type: array
      items:
        type: string
      description: Command arguments
    cwd:
      type: string
      description: Working directory
    env:
      type: object
      description: Environment variables
    timeout_secs:
      type: integer
      default: 300
      description: Timeout in seconds
    input_data:
      type: string
      description: Data to pipe to stdin
  required: [command]
