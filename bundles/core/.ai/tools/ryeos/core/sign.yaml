# ryeos:signed:2026-07-02T02:44:51Z:1447ac794be3894557a4bc572eab6986b50800b7b234cbfb29f05e012c360f21:Ubdnnr+HlFyou8Zy5LJ+nkGHUPK7HUMgyjnJEk9qulM5mk21OLncn85Nz/FeApgLv4zACSrp5wlPQp8+/BoRCA==:64f806fe8f81efdecf5245e1b1941aeecfe3a56ff1826adc1214538ab69953ca
version: "1.0.0"
executor_id: "@subprocess"
category: "ryeos/core"
description: "Sign Rye items by canonical ref, canonical-ref glob, or .ai path after running the path-anchoring validator."

config:
  command: "bin:ryeos-core-tools"
  args:
    - "sign"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 60

config_schema:
  type: object
  properties:
    item_refs:
      type: array
      items:
        type: string
      description: "Canonical refs, canonical-ref globs, or .ai paths of the item(s) to sign, e.g. directive:hello, tool:agent/*, or .ai/directives/hello.md"
    project_path:
      type: string
      description: "Project root (parent of .ai/). Defaults to caller cwd."
    source:
      type: string
      enum: [project, user]
      description: "Where to look for the item. `system` is rejected (bundle items are signed by their author key)."
      default: project
  required: [item_refs]
