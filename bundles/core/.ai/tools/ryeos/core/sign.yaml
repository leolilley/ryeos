# ryeos:signed:2026-06-07T03:33:12Z:4f3a02e2cd7e2ced670e53cb154f7ae0a0806a37e0ad17a0222d88f21e7c84e1:BdWviCQfpI1lgysSgtx3OL285ska/lAoDlpP79eea2+2N704yDFC4Q4EeIWJEv5EA9gRigUH5go+XWNhtR3+Bg==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
version: "1.0.0"
executor_id: "@subprocess"
category: "ryeos/core"
description: "Sign Rye items by canonical ref or canonical-ref glob after running the path-anchoring validator."

config:
  command: "bin:ryeos-core-tools"
  args:
    - "sign"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 60

config_schema:
  type: object
  properties:
    item_ref:
      type: string
      description: "Canonical ref or canonical-ref glob of the item(s) to sign, e.g. directive:hello or tool:agent/*"
    project_path:
      type: string
      description: "Project root (parent of .ai/). Defaults to caller cwd."
    source:
      type: string
      enum: [project, user]
      description: "Where to look for the item. `system` is rejected (bundle items are signed by their author key)."
      default: project
  required: [item_ref]
