# ryeos:signed:2026-07-02T03:44:32Z:a8d43599d2d1d80ada1696329262b7e1b81762c9531385f0fd4e88751b761364:tOdNaq9V/VJQVp3+ceBj8v8H3aoR8AhE30U6/nTFfhUVGUOXemvostLmh/fl0ryfA7c7Cynb8wyOxPGGqktFDw==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
version: "1.0.0"
executor_id: "@subprocess"
category: "ryeos/core"
description: "Sign Rye items by canonical ref, canonical-ref glob, or .ai path after running the path-anchoring validator."

config:
  command: "bin:ryeos-core-tools"
  args:
    - "sign"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 60

config_schema:
  type: object
  properties:
    item_ref:
      type: string
      description: "Single canonical ref, canonical-ref glob, or .ai path to sign. Prefer item_refs for new callers."
    item_refs:
      description: "Canonical refs, canonical-ref globs, or .ai paths of the item(s) to sign, e.g. directive:hello, tool:agent/*, or .ai/directives/hello.md. Accepts a string or array; the tool normalizes to an array."
    project_path:
      type: string
      description: "Project root (parent of .ai/). Defaults to caller cwd."
    source:
      type: string
      enum: [project, user]
      description: "Where to look for the item. `system` is rejected (bundle items are signed by their author key)."
      default: project
