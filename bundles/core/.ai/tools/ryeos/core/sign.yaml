# ryeos:signed:2026-05-23T09:45:34Z:e2b04f65615d231ab8e92f7941117c54da360a547e93a817f9cc736be0a6436d:Muox3yx1cuPSXbHgkemmmSG0BSr0FGvA+JQpk0xcNGMZl4N3p4ZSxBBsCRlcUho24ZF/88X1R+ziFGEIczDqCA==:f168bc6752bd022d89a6778a8d2239b302f453d7e862770ed7ed1093c96363d1
version: "1.0.0"
executor_id: "@subprocess"
category: "ryeos/core"
description: "Sign a Rye item by canonical ref after running the path-anchoring validator."

config:
  command: "bin:ryeos-core-tools"
  args:
    - "sign"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 60

config_schema:
  type: object
  properties:
    item_ref:
      type: string
      description: "Canonical ref of the item to sign, e.g. directive:hello"
    project_path:
      type: string
      description: "Project root (parent of .ai/). Defaults to caller cwd."
    source:
      type: string
      enum: [project, user]
      description: "Where to look for the item. `system` is rejected (bundle items are signed by their author key)."
      default: project
  required: [item_ref]
