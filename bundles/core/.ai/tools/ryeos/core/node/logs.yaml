category: "ryeos/core/node"
name: "logs"
executor_id: "@subprocess"
required_caps: []
description: "Tail the local node's trace events and startup stderr from the app root."

config:
  command: "bin:ryeos-core-tools"
  args:
    - "logs"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 30

config_schema:
  type: object
  properties:
    app_root:
      type: string
      description: "App root (parent of .ai/). Defaults to RYEOS_APP_ROOT or the XDG data dir."
    lines:
      type: integer
      description: "Number of trailing lines to show from each log. Default 200."
