category: "ryeos/core/node"
name: "doctor"
executor_id: "@subprocess"
required_caps: []
description: "Offline preflight checklist for a project/bundle source."

config:
  command: "bin:ryeos-core-tools"
  args:
    - "doctor"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 120

config_schema:
  type: object
  properties:
    source:
      type: string
      description: "Project/bundle source directory containing .ai/."
    registry_root:
      type: string
      description: "Optional registry/dependency root. May be repeated via registry_roots."
    registry_roots:
      type: array
      items:
        type: string
      description: "Optional registry/dependency roots supplying kind schemas + runtimes."
  required: [source]
