category: "ryeos/core/bundle"
name: "verify"
executor_id: "@subprocess"
required_caps: []
description: "Validate all bundle items, signatures, metadata anchoring, and manifest without rewriting files."

config:
  command: "bin:ryeos-core-tools"
  args:
    - "bundle-verify"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 120

