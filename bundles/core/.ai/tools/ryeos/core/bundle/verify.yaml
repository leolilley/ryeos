category: "ryeos/core/bundle"
name: "verify"
executor_id: "@subprocess"
required_caps: []
description: "Validate all bundle items, signatures, metadata anchoring, and manifest without rewriting files."

config:
  command: "bin:ryeos-core-tools"
  args:
    - "bundle-verify"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 120

config_schema:
  type: object
  properties:
    source:
      type: string
      description: "Bundle source directory containing .ai/."
    registry_root:
      type: string
      description: "Optional registry/dependency root to include during validation."
    registry_roots:
      type: array
      description: "Optional registry/dependency roots to include during validation."
  required: [source]
