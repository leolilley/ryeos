category: "ryeos/core/bundle"
name: "sign"
executor_id: "@subprocess"
required_caps: []
description: "Sign all signable items in a bundle source tree and rebuild binary manifest sidecars when needed."

config:
  command: "bin:ryeos-core-tools"
  args:
    - "bundle-sign"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 300

config_schema:
  type: object
  properties:
    source:
      type: string
      description: "Bundle source directory containing .ai/."
    registry_root:
      type: string
      description: "Optional registry/dependency root supplying kind schemas, parsers, and handlers. May be repeated via registry_roots."
    registry_roots:
      type: array
      items:
        type: string
      description: "Optional registry/dependency roots supplying kind schemas, parsers, and handlers."
  required: [source]
