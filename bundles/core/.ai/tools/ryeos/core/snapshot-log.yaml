version: "1.0.0"
executor_id: "@subprocess"
category: "ryeos/core"
name: "snapshot-log"
required_caps: ["ryeos.read.project.live"]
description: "Show recent snapshots from the principal's local project head."

config:
  command: "bin:ryeos-core-tools"
  args:
    - "snapshot"
    - "log"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 60

config_schema:
  type: object
  properties:
    project_path:
      type: string
      description: "Project root path"
    limit:
      type: integer
      description: "Maximum snapshots to return"
      default: 20
  required: [project_path]
