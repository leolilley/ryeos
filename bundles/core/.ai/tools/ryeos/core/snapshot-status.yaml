# ryeos:signed:2026-07-21T07:18:25Z:3160d63ccdf7063c3e434d34172ba8607e03aea8c256dd582b3ac970c514f639:WCLyFvMHrW21PG3+mwuFYAeTjYgnKBQ8dqN12WwDlVZOfK8FOoHhjuulNkIXeoAXN+8gnGyQ+Wz/srq0D0C8Bg==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
version: "1.0.0"
executor_id: "@subprocess"
category: "ryeos/core"
name: "snapshot-status"
required_caps: ["ryeos.read.project.live"]
description: "Compare the project worktree with the principal's local snapshot head. The worktree scan is timeboxed by default and returns partial results (scan_complete: false) instead of blocking."

config:
  command: "bin:ryeos-core-tools"
  args:
    - "snapshot"
    - "status"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 60

config_schema:
  type: object
  properties:
    project_path:
      type: string
      description: "Project root path"
    include_unchanged:
      type: boolean
      description: "Include unchanged files in the changes list"
      default: false
    time_budget_ms:
      type: integer
      description: "Worktree scan budget in milliseconds; 0 disables the cap and scans the full worktree"
      default: 5000
      minimum: 0
  required: [project_path]
