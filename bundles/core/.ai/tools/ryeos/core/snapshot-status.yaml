version: "1.0.0"
executor_id: "@subprocess"
category: "ryeos/core"
name: "snapshot-status"
required_caps: ["project.read"]
description: "Compare the project worktree with the principal's local snapshot head."

config:
  command: "bin:ryeos-core-tools"
  args:
    - "snapshot"
    - "status"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 60

config_schema:
  type: object
  properties:
    project_path:
      type: string
      description: "Project root path"
    include_unchanged:
      type: boolean
      description: "Include unchanged files in the changes list"
      default: false
  required: [project_path]
