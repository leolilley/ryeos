# ryeos:signed:2026-06-11T21:47:38Z:ca3681cdcc0fb1b2d3b9a63c352e9c491bfc746db49d4eaed11ecdd7158679f9:HBluVWK9PSkcQU2IrGbezy/roHQ6J2dyr2K3yKE5EtZeYf0cEXh00tpRYMsy3oFAH3sRki2pibkpNE7MxS5OBA==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
version: "1.0.0"
executor_id: "@subprocess"
category: "ryeos/core"
name: "snapshot-status"
required_caps: ["project.read"]
description: "Compare the project worktree with the principal's local snapshot head. The worktree scan is timeboxed by default and returns partial results (scan_complete: false) instead of blocking."

config:
  command: "bin:ryeos-core-tools"
  args:
    - "snapshot"
    - "status"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 60

config_schema:
  type: object
  properties:
    project_path:
      type: string
      description: "Project root path"
    include_unchanged:
      type: boolean
      description: "Include unchanged files in the changes list"
      default: false
    time_budget_ms:
      type: integer
      description: "Worktree scan budget in milliseconds; 0 disables the cap and scans the full worktree"
      default: 5000
      minimum: 0
  required: [project_path]
