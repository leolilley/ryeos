category: "engine/kinds/service"
version: "1.0.0"
location:
  directory: services
effective_trust:
  include_references: false
resolution: []
execution:
  terminator:
    kind: in_process
    registry: services
  thread_profile:
    name: service_run
    root_executable: true
    supports_interrupt: false
    supports_continuation: false
formats:
  - extensions: [".yaml", ".yml"]
    parser: parser:ryeos/core/yaml/yaml
    signature:
      prefix: "#"
# Identity composer — service items are loaded as-is.
composer: handler:ryeos/core/identity
composed_value_contract:
  root_type: mapping
  required:
    endpoint: { type: single, prim: string }
  optional:
    name: { type: single, prim: string }
    version: { type: single, prim: string }
    availability:
      type: single
      prim: string
      enum: [both, daemon_only, offline]
    offline_execute: { type: single, prim: string }
    required_caps:
      type: single
      prim: sequence
      elements: { type: single, prim: string }
    description: { type: single, prim: string }
    record_thread: { type: single, prim: boolean }
    ui_read_only: { type: single, prim: boolean }
    ui_dispatch:
      type: single
      prim: string
      enum: [verified, session_local]
    schema: { type: single, prim: mapping }
metadata:
  rules:
    name:
      from: filename
      required: true
    version:
      from: path
      key: version
    category:
      from: relative_dir
      required: true
    endpoint:
      from: path
      key: endpoint
    required_caps:
      from: path_string_seq
      key: required_caps
    description:
      from: path
      key: description
    record_thread:
      from: path_value
      key: record_thread
    ui_read_only:
      from: path_value
      key: ui_read_only
    ui_dispatch:
      from: path
      key: ui_dispatch
    schema:
      from: path_value
      key: schema
