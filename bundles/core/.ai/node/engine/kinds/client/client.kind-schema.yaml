category: "engine/kinds/client"
version: "1.0.0"
location:
  directory: clients

formats:
  - extensions: [".yaml", ".yml"]
    parser: parser:ryeos/core/yaml/yaml
    signature:
      prefix: "#"

composer: handler:ryeos/core/identity

composed_value_contract:
  root_type: mapping
  required:
    launch:
      type: single
      prim: mapping
    serves:
      type: single
      prim: mapping
  optional:
    version:
      type: single
      prim: string
    description:
      type: single
      prim: string
    capabilities:
      type: single
      prim: mapping

metadata:
  rules:
    name:
      from: filename
      required: true
      match: filename
    version:
      from: path
      key: version
    description:
      from: path
      key: description
    category:
      from: relative_dir
      required: true
