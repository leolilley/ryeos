# ryeos:signed:2026-06-19T05:40:59Z:c6087e2213dee4ee5360a9e026ddefa3c6c6cf7f7fd4aa323d45937f1a8947c3:CbB3dijbwHm7QzcUkpKVPO1jBUGPD0iSfRvfJ2Ep1zzuvCG+cehMKT8zJTk/E0dPCM9tUB2V74WBegrj1sR7DA==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
category: "engine/kinds/node"
version: "1.0.0"
# `node` items are signed YAMLs that describe per-node configuration
# (bundle registrations, routes, commands, hosted policy, etc.). They live
# under `<space>/.ai/node/<section>/...` and are interpreted by the daemon's
# node-config loader, not by the dispatch loop — node items are not directly
# executable. Section/category/name are path-derived loader context, not YAML
# payload fields. The schema therefore intentionally has no `execution:` block;
# root-execute lookups against `node:*` refs must yield 501 the same way
# `config:*` does.
location:
  directory: node
effective_trust:
  include_references: false
resolution: []
formats:
  - extensions: [".yaml", ".yml"]
    parser: parser:ryeos/core/yaml/yaml
    signature:
      prefix: "#"
# Identity composer — node items are loaded as-is. Per-section parsing is
# performed by the node-config `SectionTable` after load, not here.
composer: handler:ryeos/core/identity
composed_value_contract:
  root_type: mapping
  # Structural identity is enforced at load time by path containment; the YAML
  # body intentionally omits `category`, `section`, and command `name`.
  required: {}
metadata:
  rules:
    name:
      from: filename
      required: true
    version:
      from: path
      key: version
    description:
      from: path
      key: description
