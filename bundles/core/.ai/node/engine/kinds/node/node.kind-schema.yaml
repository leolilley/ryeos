# ryeos:signed:2026-05-22T19:55:01Z:7a6e087c61a9b3685e92878cc0ae65a0b6d8d6222efd814b2a5908a17dc22161:EHFkNOkIoCxRHX9ymbBu9+gz5kupK7etxGa4Jv0GcTmYiukg6t//RbfFgYN2fxMglirHz5TPbhz66E10bkG+Ag==:f168bc6752bd022d89a6778a8d2239b302f453d7e862770ed7ed1093c96363d1
category: "engine/kinds/node"
version: "1.0.0"
# `node` items are signed YAMLs that describe per-node configuration
# (bundle registrations, identity attestations, etc.). They live under
# `<space>/.ai/node/<section>/<name>.yaml` and are interpreted by the
# daemon's node-config loader, not by the dispatch loop — node items
# are not directly executable. The schema therefore intentionally has
# no `execution:` block; root-execute lookups against `node:*` refs
# must yield 501 the same way `config:*` does.
location:
  directory: node
formats:
  - extensions: [".yaml", ".yml"]
    parser: parser:ryeos/core/yaml/yaml
    signature:
      prefix: "#"
# Identity composer — node items are loaded as-is. Per-section parsing
# is performed by the node-config `SectionTable` after load, not here.
composer: handler:ryeos/core/identity
composed_value_contract:
  root_type: mapping
  # `section` is enforced at load time by the node-config
  # `BootstrapLoader` (path = section invariant), not via the parser
  # composer contract — the YAML parser declares `section` as
  # Optional, so making it Required here would fail
  # `ParserComposerContractViolation`. The loader's stricter check
  # gives a better error message anyway.
  required: {}
metadata:
  rules:
    name:
      from: filename
      required: true
      match: filename
    section:
      from: path
      key: section
    version:
      from: path
      key: version
    description:
      from: path
      key: description
    category:
      from: path
      key: category
      required: true
      match: path