category: "engine/kinds/handler"
version: "1.0.0"
location:
  directory: handlers
effective_trust:
  include_references: false
resolution: []
formats:
  - extensions: [".yaml", ".yml"]
    parser: parser:ryeos/core/yaml/yaml
    signature:
      prefix: "#"
# Handler descriptors are NOT root-executable. They are an
# engine-internal extension-point registry (parsers, composers, and launch
# preparers).
# Therefore: NO `execution:` block, NO terminator. The handler kind is
# config-only metadata.
#
# Items of this kind are loaded by the Layer-1 raw signed-YAML loader
# (HandlerRegistry::load_base) BEFORE parser/composer dispatch is
# wired up. This breaks the bootstrap cycle.
composer: handler:ryeos/core/identity
composed_value_contract:
  root_type: mapping
  required:
    category: { type: single, prim: string }
    name: { type: single, prim: string }
    kind: { type: single, prim: string, enum: [handler] }
    serves: { type: single, prim: string, enum: [parser, composer, launch_preparer] }
    binary_ref: { type: single, prim: string }
    abi_version: { type: single, prim: string }
  optional:
    required_caps:
      type: single
      prim: sequence
      elements: { type: single, prim: string }
    description: { type: single, prim: string }
metadata:
  rules:
    name:
      from: path
      key: name
      required: true
      match: filename
    version:
      from: path
      key: version
    category:
      from: path
      key: category
      required: true
      match: path
    description:
      from: path
      key: description
    serves:
      from: path
      key: serves
      required: true
    binary_ref:
      from: path
      key: binary_ref
