# ryeos:signed:2026-07-02T02:39:08Z:a7ef0bab0337886f8787b0557241fae54b7013ea2768cd097d40be9e3718af7d:2ztijFtD8Y8U97PA2eDehlPUle0qkkmJRoYSaJkc20lwRY+tNkXI5KJx7jvrClAEM6E7JWUKPm/Qk2gh3gOMAg==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
category: "engine/kinds/tool"
version: "1.0.0"
location:
  directory: tools
effective_trust:
  include_references: false
resolution: []
execution:
  terminator:
    kind: subprocess
    protocol: protocol:ryeos/core/opaque
  thread_profile:
    name: tool_run
    root_executable: true
    supports_interrupt: false
    supports_continuation: false
  aliases:
    "@subprocess": "tool:ryeos/core/subprocess/execute"
    "@method_dispatch": "tool:ryeos/core/method-dispatch/execute"
formats:
  - extensions: [".py"]
    parser: parser:ryeos/core/python/tool-header
    signature:
      prefix: "#"
      after_shebang: true
  - extensions: [".yaml", ".yml"]
    parser: parser:ryeos/core/yaml/yaml
    signature:
      prefix: "#"
  - extensions: [".js", ".ts", ".mjs", ".cjs"]
    parser: parser:ryeos/core/javascript/javascript
    signature:
      prefix: "//"
  - extensions: [".json"]
    parser: parser:ryeos/core/yaml/yaml
    signature:
      prefix: "#"
# Empty by design — tool fields (executor_id, tool_type, etc.) are
# extracted via metadata.rules from kind-specific keys in parser_config,
# not enforced at the kind-level shape.
# Identity composer — this kind has no multi-document composition (no extends chain, no inheritance). Items are loaded as-is.
inventory_schema_keys: [input_schema, parameters, config_schema]
composer: handler:ryeos/core/identity
composed_value_contract:
  root_type: mapping
  required: {}
  optional:
    # Structured runtime capability requirements. The daemon mints the
    # requested manifest-backed subset into the callback token at launch —
    # this is NOT self-grantable authority like `required_caps`.
    requires:
      type: single
      prim: mapping
runtime:
  handlers:
    - type: config
    - type: env_config
    - type: config_resolve
    - type: verify_deps
    - type: execution_params
    - type: native_async
    - type: native_resume
  # Keys that are NOT runtime blocks (metadata fields, header). Engine
  # ignores these during runtime block dispatch. Anything else not
  # claimed by a registered handler is a hard `UnknownRuntimeBlock`
  # error.
  ignored_keys:
    - version
    - category
    - description
    - executor_id
    - tool_type
    - required_secrets
    - name
    # `required_caps` is extracted into metadata and enforced by
    # the service/native-runtime/subprocess dispatch paths.
    # Ignored here (runtime block parser) so tool YAMLs may declare
    # it without triggering UnknownRuntimeBlock.
    - required_caps
    # `requires` is the structured runtime-capability requirement block,
    # extracted into metadata and consumed by the launch path to mint
    # callback caps. Ignored here (runtime block parser) so tool YAMLs may
    # declare it without triggering UnknownRuntimeBlock.
    - requires
    # `config_schema` is validated as a pre-pass against the user's
    # ROOT tool item (see plan_builder.rs::build_plan and
    # runtime/config_schema.rs). Wrapper / runtime YAMLs may declare
    # their own `config_schema` for documentation — the engine
    # deliberately does not enforce them at chain compile time. On
    # terminal/internal tools such as `ryeos/core/subprocess/execute`,
    # `config_schema` documents the wrapper `config:` shape, not a
    # public direct-call parameter surface.
    - config_schema
    # TODO: handlers for these blocks land in subsequent phases.
    - execution_owner
    - native_resume
    # `method_dispatch` configures a method-dispatch wrapper tool's target
    # method/ref. Extracted into metadata.extra by the rule below and read by
    # the method-dispatch terminal executor; ignored here (runtime block parser)
    # so wrappers may declare it without triggering UnknownRuntimeBlock.
    - method_dispatch
    # `terminal_executor` is the typed descriptor a terminal executor tool
    # (`executor_id: null`) declares to select its execution routine
    # (subprocess vs method_dispatch). Read by the dispatcher's chain-terminal
    # resolver, not by a runtime handler; ignored here so terminal tools carrying
    # it don't trip UnknownRuntimeBlock during plan compilation.
    - terminal_executor
metadata:
  # Tool YAML files use plain keys (`category`, `version`, etc.). Tool
  # Python files use a comment-YAML `# ryeos-tool:` header that parses
  # to the same plain-key shape. Downstream rules — and the path
  # validator — therefore see ONE shape regardless of source format.
  rules:
    name:
      from: filename
      required: true
      match: filename
    version:
      from: path
      key: version
    executor_id:
      from: path
      key: executor_id
    description:
      from: path
      key: description
    category:
      from: path
      key: category
      required: true
      match: path
    required_secrets:
      from: path_string_seq
      key: required_secrets
    required_caps:
      from: path_string_seq
      key: required_caps
    # Carry the structured `requires:` block verbatim into metadata.extra so
    # the launch path can mint the requested manifest-backed callback caps.
    requires:
      from: path_value
      key: requires
    # Carry the `method_dispatch:` block verbatim into metadata.extra so the
    # method-dispatch terminal executor can read the target method/ref_kind.
    method_dispatch:
      from: path_value
      key: method_dispatch
