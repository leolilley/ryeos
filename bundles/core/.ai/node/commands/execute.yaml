# ryeos:signed:2026-06-23T02:34:31Z:82debf6b2c73d3b40ac303a4a52a5d04908bc2eaefb34474fc9a8d49fb7974e0:r7p/T069FpW0q1l8ij4NCGL5mgaWOR6Bcz7Z8K0hzErOMSQ83wKaOk1FKbKmSps+GINke7H+CAGvU2rGRDwYCA==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
tokens:
- execute
description: "Execute an item (tool, directive, service, graph). On a terminal, streams the live execution log then prints the final result; --no-stream/--json print only the buffered JSON result (also the default when piped), and --stream forces streaming even when piped."
forms:
- slots:
  - field: item_ref
    matcher: canonical_ref
dispatch:
  kind: direct_execute_item_ref
  item_ref_arg: item_ref
  availability: both
project:
  resolution: optional
  default: discover_upward_ai
  no_project_flag: true
  request_project_path: true
parameter_binding:
  mode: tail_object
  input_flag: input
  single_json_object_arg: true
  flag_key_normalization: hyphen_to_underscore
control_flags:
- flag: async
  help: "Accepted/background launch for root-executable refs; returns a thread_id"
  binding: launch_mode_accepted
- flag: stream
  help: "Force the live execution stream on (even when piped)"
  binding: stream_on
- flag: no-stream
  help: "Print the buffered JSON result instead of the live stream"
  binding: stream_off
  aliases:
  - json
- flag: debug-raw
  help: "Attach a debug block (resolved cmd/args/env keys + raw stdio) to the result"
  binding: debug_raw
- flag: method
  help: "Method selector for method-dispatch kinds (e.g. knowledge query); sets call.method"
  binding: call_method
- flag: args
  help: "Method args as a JSON object; sets call.args"
  binding: call_args
