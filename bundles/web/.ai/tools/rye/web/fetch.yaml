# ryeos:signed:2026-06-12T07:47:24Z:cd3dccbe01a35509003e5ad04ac848e151e8ea844408a286a52c6a67e07b43e3:874I2BXQ97ZI8v72qexUbuugCmM/hkQqcLOrB728eSsmw0WAjJPBLwB11dNd0vQIyTN8DKe5kEt8CIyAJ6F7AA==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
category: "rye/web"
version: "1.0.0"
tool_type: "subprocess"
executor_id: "@subprocess"
description: "Fetch an HTTP(S) page and return markdown, text, or HTML"

config:
  command: "bin:ryeos-web-tools"
  args:
    - "fetch"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 60

config_schema:
  type: object
  properties:
    url:
      type: string
      description: "HTTP(S) URL to fetch"
    format:
      type: string
      enum: ["markdown", "text", "html"]
      default: "markdown"
    timeout_secs:
      type: integer
      minimum: 1
      maximum: 50
      default: 30
    max_bytes:
      type: integer
      minimum: 1
      maximum: 5000000
      default: 1000000
    max_output_chars:
      type: integer
      minimum: 1000
      maximum: 200000
      default: 50000
    block_private_networks:
      type: boolean
      default: true
  required: [url]
