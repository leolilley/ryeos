category: "rye/web"
version: "1.0.0"
tool_type: "subprocess"
executor_id: "@subprocess"
description: "Search the web and return ranked result titles, URLs, and snippets"

config:
  command: "bin:ryeos-web-tools"
  args:
    - "search"
    - "--stdin-json"
  input_data: "{params_json}"
  timeout_secs: 30

config_schema:
  type: object
  properties:
    query:
      type: string
      description: "Search query"
      minLength: 1
    num_results:
      type: integer
      minimum: 1
      maximum: 20
      default: 10
      description: "Maximum number of DuckDuckGo results to return"
  required: [query]
