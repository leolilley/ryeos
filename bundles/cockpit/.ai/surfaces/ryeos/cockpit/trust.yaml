# ryeos:signed:2026-05-23T13:47:53Z:0bcdc659655140a92d75ae05946889a83359f43aace6812aea82bb87e8fce191:w4B4eAaPyrA9LQOtcE+2PUiTEHFInvRXMzEhHlJq0RXlYP++pyBQye1e66+ZWi1ZynN4K0EWhcrQKX93X+kFCg==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
extends: surface:ryeos/cockpit/base
name: trust-console
version: "1.0.0"
description: Trust/security-focused RyeOS cockpit

layout:
  root: main
  nodes:
    main:
      type: split
      axis: horizontal
      ratio: 0.35
      first: trust
      second: right
    trust:
      type: pane
      view: trust
    right:
      type: split
      axis: vertical
      ratio: 0.6
      first: thread_list
      second: items
    thread_list:
      type: pane
      view: thread_list
    items:
      type: pane
      view: space_browser

affordances:
  - id: view.trust
    label: Trust Dashboard
    category: Trust
  - id: view.items
    label: Item Signatures
    category: Trust

instruments:
  - id: trust_summary
    kind: facet_status
    source: global
    facets:
      - trust.summary
      - trust.untrusted_count
