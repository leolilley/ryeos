kind: client
name: web
version: "1.0.0"
description: Browser surface renderer for RyeOS

serves:
  kind: surface
  renderer: browser

launch:
  mode: cli_exec
  binary_ref: bin/{triple}/web
  args:
    surface: "--surface"
    read_only: "--read-only"
    allow_actions: "--allow-actions"
    print_url: "--print-url"
    no_open: "--no-open"
    project: "--project"

capabilities:
  requires_daemon: true
  owns_tty: false
  interactive: true
