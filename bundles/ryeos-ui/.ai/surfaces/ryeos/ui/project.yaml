# ryeos:signed:2026-07-13T01:54:18Z:e7fb76531dc3cdf9242eb1ecf49548aa38edd5cbe1b4a9b713f11763a4ae7c51:qSg+0mBkhTOwG1zAB5zGL7JQC/dPA2euAY7xZuGMAmGUgbOFPwoBq8FPMovHTjkPTcNelPiHn7jree/PJuBrAA==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
name: ryeos-ui-project
version: "1.0.0"
description: Active project explorer for files, signed items, and related execution

tiling:
  mode: master_stack
  master: { side: left, arrange: vertical, ratio: 0.46, count: 1 }
  stack: { arrange: vertical }
  insert: end

tiles:
  - "view:ryeos/project/files"
  - "view:ryeos/project/items"
  - "view:ryeos/threads/history"

slots:
  bottom: { content: "view:ryeos/input", open: true, size: 7 }
  top:    { content: "view:ryeos/node/status", open: true, size: 3 }
  right:  { content: "view:ryeos/item/inspector", open: false, size: 40 }

style:
  border: thin

backdrop: view:ryeos/backdrop/prism-shards

library:
  - group: Threads
    views:
      - view:ryeos/threads/history
      - view:ryeos/thread/tree
  - group: Project
    views:
      - view:ryeos/project/files
      - view:ryeos/project/items
      - view:ryeos/project/schedules
      - view:ryeos/items/space

input:
  route:
    invoke:
      type: service
      ref: service:threads/input
    params:
      directive: directive:ryeos/ops/base
      project_path: ""

ambient:
  show_background: true
  opacity: 1.0

affordances:
  - id: view.files
    label: Files
    category: View
  - id: view.items
    label: Items
    category: View
  - id: view.threads
    label: Threads
    category: View
  - id: view.schedules
    label: Schedules
    category: View
  - id: view.item_inspector
    label: Inspector
    category: View
