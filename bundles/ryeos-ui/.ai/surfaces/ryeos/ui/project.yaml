# ryeos:signed:2026-07-15T02:11:39Z:7d8f7ef395d0114a782ca0ff733d39a0c984638b7defac9607006b4c7e52a2d0:YtJpFXgD4sIhmgTUJjoK9idaQCX3fSJ+vXfm9uX/No5m0zpooJGK6ZzJ0FA2hh/WiDAQ/CUVUh5PG5Ig//QxAA==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
name: ryeos-ui-project
version: "1.0.0"
description: Active project explorer for files, signed items, and related execution

tiling:
  mode: master_stack
  master: { side: left, arrange: vertical, ratio: 0.46, count: 1 }
  stack: { arrange: vertical }
  insert: end

tiles:
  - "view:ryeos/project/files"
  - "view:ryeos/project/items"
  - "view:ryeos/threads/history"

slots:
  bottom: { content: "view:ryeos/input", open: true, size: 7 }
  top:    { content: "view:ryeos/node/status", open: true, size: 3 }
  right:  { content: "view:ryeos/item/inspector", open: false, size: 40 }

style:
  border: thin

backdrop: view:ryeos/backdrop/prism-shards

library:
  - group: Threads
    views:
      - view:ryeos/threads/history
      - view:ryeos/thread/tree
  - group: Project
    views:
      - view:ryeos/project/files
      - view:ryeos/project/items
      - view:ryeos/project/schedules
      - view:ryeos/items/space

input:
  route:
    invoke:
      type: service
      ref: service:threads/input
    params:
      target:
        kind: fresh
        item_ref: directive:ryeos/ops/base
        project_path: ""
        ref_bindings:
          model: directive:ryeos/ops/base

ambient:
  show_background: true
  opacity: 1.0

affordances:
  - id: view.files
    label: Files
    category: View
  - id: view.items
    label: Items
    category: View
  - id: view.threads
    label: Threads
    category: View
  - id: view.schedules
    label: Schedules
    category: View
  - id: view.item_inspector
    label: Inspector
    category: View
