# ryeos:signed:2026-07-06T13:09:32Z:ee9d784ad0ba40461efbed42176245f4339af1ee81e5bf4dd5d60c7b7d93c2b9:dHh/14Z7oD1Hw1lbl82PvKS4GrOYTe4xwK4mBPx1WjOkeM5VwrVWhUCeDIb6qw791uf+65Rdctwj9emd0tGoAw==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
# ryeos:unsigned
name: ryeos-ui-thread
version: "1.0.0"
description: Directive thread — watch and drive a single execution stream

# One center tile: the directive thread event stream. It starts empty
# (its source is the route head thread `@facet:input.route.thread`, which
# is None until the first submit), then fills as the execution streams.
# The bottom input targets the same directive route, so submitting here
# launches a thread and the timeline above shows it live.
tiling:
  mode: master_stack
  master: { side: left, arrange: vertical, ratio: 1.0, count: 1 }
  stack: { arrange: vertical }
  insert: end

tiles:
  - "view:ryeos/thread/transcript"

slots:
  bottom: { content: "view:ryeos/input", open: true, size: 7 }
  right: { content: "view:ryeos/item/inspector", open: false, size: 40 }

style:
  border: thin

library:
  - view:ryeos/thread/transcript
  - view:ryeos/threads/live
  - view:ryeos/threads/live-all
  - view:ryeos/threads/history
  - view:ryeos/project/files
  - view:ryeos/project/items
  - view:ryeos/project/schedules
  - view:ryeos/node/threads/live
  - view:ryeos/node/threads/history
  - view:ryeos/node/events
  - view:ryeos/chain/timeline
  - view:ryeos/input
  - view:ryeos/run/activity
  - view:ryeos/run/all-activity
  - view:ryeos/projects/list
  - view:ryeos/item/inspector
  - view:ryeos/threads/list
  - view:ryeos/node/status

input:
  route:
    invoke:
      type: service
      ref: service:threads/input
    params:
      directive: directive:ryeos/ops/base
      project_path: ""

ambient:
  show_background: true
  opacity: 1.0

affordances:
  - id: view.threads
    label: Threads
    category: View
  - id: view.item_inspector
    label: Inspector
    category: View
