# ryeos:signed:2026-07-13T01:54:18Z:3f72c34f2eb7c50fa46c1486dbd7892754c2dcfc87a4e1955cd917e066db41fc:VFbe6xuj6wL/lSNl5MVpf+SDIJMnRagf1LnYYmeavB87Z3rlxe9jtSrTPHGtATI0anmkT7mJaBAJKNnjG5j+AA==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
name: ryeos-ui-thread-crystal
version: "1.0.0"
description: Focused thread transcript over the live prism backdrop

tiling:
  mode: single_lens
  master: { side: left, arrange: vertical, ratio: 1.0, count: 1 }
  stack: { arrange: vertical }
  insert: end

tiles:
  - "view:ryeos/thread/transcript"

slots:
  bottom: { content: "view:ryeos/input", open: true, size: 7 }
  top:    { content: "view:ryeos/node/status", open: true, size: 3 }

style:
  border: hidden

backdrop: view:ryeos/backdrop/prism-shards

library:
  - group: Threads
    views:
      - view:ryeos/threads/history
      - view:ryeos/node/threads/history
      - view:ryeos/thread/tree
  - group: Node
    views:
      - view:ryeos/node/events

input:
  route:
    invoke:
      type: service
      ref: service:threads/input
    params:
      directive: directive:ryeos/ops/base
      project_path: ""

ambient:
  show_background: true
  opacity: 0.35

affordances:
  - id: view.transcript
    label: Transcript
    category: View
  - id: view.threads
    label: Threads
    category: View
  - id: view.events
    label: Events
    category: View
