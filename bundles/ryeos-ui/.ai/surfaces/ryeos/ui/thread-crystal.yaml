# ryeos:signed:2026-07-09T06:05:19Z:a910f6c9eb20a083d1e1f6704a4e99538047142cad84e8e56e657cf6e6340047:MA74XSc9efrATjPf9x1gWcKk2B/MhDCMHwVk31h2zt1L4PdaYC6rhUkUwn2/vrzVYKbnMl82eLFb/eZn5zerBw==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
name: ryeos-ui-thread-crystal
version: "1.0.0"
description: Focused thread transcript over the live prism backdrop

tiling:
  mode: single_lens
  master: { side: left, arrange: vertical, ratio: 1.0, count: 1 }
  stack: { arrange: vertical }
  insert: end

tiles:
  - "view:ryeos/thread/transcript"

slots:
  bottom: { content: "view:ryeos/input", open: true, size: 7 }
  top:    { content: "view:ryeos/node/status", open: true, size: 3 }

style:
  border: hidden

backdrop: view:ryeos/backdrop/prism-shards

library:
  - view:ryeos/threads/history
  - view:ryeos/node/threads/history
  - view:ryeos/node/events

input:
  route:
    invoke:
      type: service
      ref: service:threads/input
    params:
      directive: directive:ryeos/ops/base
      project_path: ""

ambient:
  show_background: true
  opacity: 0.35

affordances:
  - id: view.transcript
    label: Transcript
    category: View
  - id: view.threads
    label: Threads
    category: View
  - id: view.events
    label: Events
    category: View
