# ryeos:signed:2026-07-15T02:11:39Z:45c958cdf473d2b35d78bf566542a368eb0924e9a96c901e42d78bb288260f39:ZB4FkPLpd/39idZepSVDGbqTJAOWpOeVliprbkkphQw/XUvK0TNoYaCEW0I5OQMehvi3AvfzYYdx8WEkwJJgBQ==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
name: ryeos-ui-workbench
version: "1.0.0"
description: Working seat - home pane beside a content-bound thread list

tiling:
  mode: master_stack
  master: { side: left, arrange: vertical, ratio: 0.65, count: 1 }
  stack: { arrange: vertical }
  insert: end

tiles:
  - "view:ryeos/graph/topology"
  - "view:ryeos/threads/history"

slots:
  bottom: { content: "view:ryeos/input", open: true, size: 7 }
  right: { content: "view:ryeos/item/inspector", open: false, size: 40 }

style:
  border: thin

library:
  - group: Threads
    views:
      - view:ryeos/threads/history
      - view:ryeos/node/threads/history
      - view:ryeos/thread/tree
  - group: Project
    views:
      - view:ryeos/project/files
      - view:ryeos/project/items
      - view:ryeos/project/schedules
      - view:ryeos/items/space
  - group: Node
    views:
      - view:ryeos/projects/list
      - view:ryeos/node/events
      - view:ryeos/node/remotes
      - view:ryeos/node/bundles
      - view:ryeos/node/gc
      - view:ryeos/graph/topology
      - view:ryeos/atlas
      - view:ryeos/commands/grammar

input:
  route:
    invoke:
      type: service
      ref: service:threads/input
    params:
      target:
        kind: fresh
        item_ref: directive:ryeos/ops/base
        project_path: ""
        ref_bindings:
          model: directive:ryeos/ops/base

ambient:
  show_background: true
  opacity: 1.0

affordances:
  - id: view.graph
    label: Graph
    category: View
  - id: view.threads
    label: Threads
    category: View
