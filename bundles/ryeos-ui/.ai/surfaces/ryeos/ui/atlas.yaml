version: "1.0.0"
description: RyeOS UI with a Three.js 2D namespace atlas background

tiling:
  mode: master_stack
  master: { side: right, arrange: vertical, ratio: 0.6, count: 1 }
  stack: { arrange: horizontal }
  insert: end

