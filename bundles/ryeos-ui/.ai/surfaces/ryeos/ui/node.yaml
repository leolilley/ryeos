# ryeos:unsigned
name: ryeos-ui-node
version: "1.0.0"
description: Node overview for all live threads, projects, events, remotes, and maintenance

tiling:
  mode: master_stack
  master: { side: left, arrange: vertical, ratio: 0.5, count: 1 }
  stack: { arrange: vertical }
  insert: end

tiles:
  - "view:ryeos/run/all-activity"
  - "view:ryeos/projects/list"
  - "view:ryeos/node/events"

slots:
  bottom: { content: "view:ryeos/input", open: true, size: 7 }
  top:    { content: "view:ryeos/node/status", open: true, size: 3 }
  right:  { content: "view:ryeos/item/inspector", open: false, size: 40 }

style:
  border: thin

backdrop: view:ryeos/backdrop/prism-shards

library:
  - view:ryeos/run/all-activity
  - view:ryeos/run/activity
  - view:ryeos/threads/history
  - view:ryeos/node/events
  - view:ryeos/projects/list
  - view:ryeos/node/remotes
  - view:ryeos/node/bundles
  - view:ryeos/node/gc
  - view:ryeos/node/status
  - view:ryeos/thread/transcript
  - view:ryeos/threads/detail
  - view:ryeos/input
  - view:ryeos/backdrop/prism

input:
  route:
    invoke:
      type: service
      ref: service:threads/input
    params:
      directive: directive:ryeos/ops/base
      project_path: ""

ambient:
  show_background: true
  opacity: 1.0

affordances:
  - id: view.all_threads
    label: All threads
    category: View
  - id: view.projects
    label: Projects
    category: View
  - id: view.events
    label: Events
    category: View
  - id: view.remotes
    label: Remotes
    category: View
  - id: view.maintenance
    label: Maintenance
    category: View
