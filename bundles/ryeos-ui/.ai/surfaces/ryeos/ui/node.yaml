# ryeos:signed:2026-07-09T06:05:19Z:fbd518e6976539d49fed4385ca076810f9909bfaab224d515bf708f5a4f0ee74:ICkVRhOfBC1OwHZBQ7W2YXc7GNoenFrrMfVsXe/HGUCUuGcN29KcUzNlTA6nXzM9VOagFM0oTu1ZYGZwtxqZCg==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
name: ryeos-ui-node
version: "1.0.0"
description: Node overview for all live threads, projects, events, remotes, and maintenance

tiling:
  mode: master_stack
  master: { side: left, arrange: vertical, ratio: 0.5, count: 1 }
  stack: { arrange: vertical }
  insert: end

tiles:
  - "view:ryeos/node/threads/history"
  - "view:ryeos/projects/list"
  - "view:ryeos/node/events"

slots:
  bottom: { content: "view:ryeos/input", open: true, size: 7 }
  top:    { content: "view:ryeos/node/status", open: true, size: 3 }
  right:  { content: "view:ryeos/item/inspector", open: false, size: 40 }

style:
  border: thin

backdrop: view:ryeos/backdrop/prism-shards

library:
  - view:ryeos/node/threads/history
  - view:ryeos/node/events
  - view:ryeos/projects/list
  - view:ryeos/node/remotes
  - view:ryeos/node/bundles
  - view:ryeos/node/gc
  - view:ryeos/commands/grammar

input:
  route:
    invoke:
      type: service
      ref: service:threads/input
    params:
      directive: directive:ryeos/ops/base
      project_path: ""

ambient:
  show_background: true
  opacity: 1.0

affordances:
  - id: view.all_threads
    label: All threads
    category: View
  - id: view.projects
    label: Projects
    category: View
  - id: view.events
    label: Events
    category: View
  - id: view.remotes
    label: Remotes
    category: View
  - id: view.maintenance
    label: Maintenance
    category: View
