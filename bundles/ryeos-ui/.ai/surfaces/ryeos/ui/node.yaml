name: ryeos-ui-node
version: "1.0.0"
description: Node overview for all live threads, projects, events, remotes, and maintenance

tiling:
  mode: master_stack
  master: { side: left, arrange: vertical, ratio: 0.5, count: 1 }
  stack: { arrange: vertical }
  insert: end

tiles:
  - "view:ryeos/node/threads/history"
  - "view:ryeos/projects/list"
  - "view:ryeos/node/events"

slots:
  bottom: { content: "view:ryeos/input", open: true, size: 7 }
  top:    { content: "view:ryeos/node/status", open: true, size: 3 }
  right:  { content: "view:ryeos/item/inspector", open: false, size: 40 }

style:
  border: thin

backdrop: view:ryeos/backdrop/prism-shards

library:
  - group: Threads
    views:
      - view:ryeos/node/threads/history
      - view:ryeos/thread/tree
  - group: Node
    views:
      - view:ryeos/projects/list
      - view:ryeos/node/events
      - view:ryeos/node/remotes
      - view:ryeos/node/bundles
      - view:ryeos/node/gc
      - view:ryeos/commands/grammar

input:
  route:
    invoke:
      type: service
      ref: service:threads/input
    params:
      target:
        kind: fresh
        item_ref: directive:ryeos/ops/base
        project_path: ""
        ref_bindings:
          model: directive:ryeos/ops/base

ambient:
  show_background: true
  opacity: 1.0

affordances:
  - id: view.all_threads
    label: All threads
    category: View
  - id: view.projects
    label: Projects
    category: View
  - id: view.events
    label: Events
    category: View
  - id: view.remotes
    label: Remotes
    category: View
  - id: view.maintenance
    label: Maintenance
    category: View
