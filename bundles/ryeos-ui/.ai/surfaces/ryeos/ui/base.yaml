# ryeos:unsigned
name: ryeos-ui-base
version: "1.0.0"
description: RyeOS UI home space

tiling:
  mode: master_stack
  master: { side: right, arrange: vertical, ratio: 0.6, count: 1 }
  stack: { arrange: horizontal }
  insert: end

tiles:
  - "view:ryeos/backdrop/splash"

slots:
  bottom: { content: "view:ryeos/input", open: true, size: 7 }
  top:    { content: "view:ryeos/node/status", open: false, size: 6 }
  left: { content: "view:ryeos/threads/history", open: false, size: 32 }
  right: { content: "view:ryeos/item/inspector", open: false, size: 40 }

style:
  border: thin

backdrop: view:ryeos/backdrop/prism-shards

library:
  - view:ryeos/backdrop/prism
  - view:ryeos/backdrop/prism-shards
  - view:ryeos/backdrop/splash
  - view:ryeos/input
  - view:ryeos/run/activity
  - view:ryeos/run/all-activity
  - view:ryeos/threads/history
  - view:ryeos/thread/transcript
  - view:ryeos/threads/detail
  - view:ryeos/project/files
  - view:ryeos/project/items
  - view:ryeos/project/schedules
  - view:ryeos/node/events
  - view:ryeos/node/remotes
  - view:ryeos/node/bundles
  - view:ryeos/node/gc
  - view:ryeos/projects/list
  - view:ryeos/node/activity
  - view:ryeos/item/inspector
  - view:ryeos/chain/timeline
  - view:ryeos/remotes/list
  - view:ryeos/schedules/list
  - view:ryeos/commands/grammar
  - view:ryeos/bundles/list
  - view:ryeos/node/status
  - view:ryeos/items/space
  - view:ryeos/item/explain
  - view:ryeos/files/list
  - view:ryeos/gc/status

overlays:
  views:
    title: Views
    widget: table
    columns: [View, Description]
    source: { ref: "runtime:views/launchable" }
    hint: "type to filter views · enter to open · shift+enter for new tile"
  commands:
    title: Commands
    widget: palette
    source: { ref: "runtime:commands/available" }
    hint: "type to filter commands · enter to run"
  help:
    title: Help
    widget: table
    columns: [Topic, Open]
    source: { ref: "runtime:help" }
    hint: "type to filter help · esc to close"
  shortcuts:
    title: Shortcuts
    widget: table
    columns: [Keys, Action]
    source: { ref: "runtime:shortcuts" }
    hint: "type to filter shortcuts · esc to close"

input:
  route:
    invoke:
      type: service
      ref: service:threads/input
    params:
      directive: directive:ryeos/ops/base
      project_path: ""

ambient:
  show_background: true
  opacity: 0.35

affordances:
  - id: view.graph
    label: Graph
    category: View
  - id: view.items
    label: Items
    category: View
  - id: view.files
    label: Files
    category: View
  - id: view.item_inspector
    label: Inspector
    category: View
  - id: view.threads
    label: Threads
    category: View
  - id: view.services
    label: Services
    category: View
