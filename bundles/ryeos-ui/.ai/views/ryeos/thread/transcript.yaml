# ryeos:unsigned
name: thread-transcript
version: "1.0.0"
description: >-
  Full event braid transcript for the input route's conversation chain. This is
  the truth lens over a thread: cognition, provider stream, tool calls,
  artifacts, receipts, and raw event detail.

widget: timeline
source:
  ref: service:events/chain_replay
  params:
    chain_root_id: "@facet:input.route.chain_root"
  collection: events
projections:
  expand:
    fields:
      - event_type
      - thread_id
      - chain_root_id
      - chain_seq
      - payload.graph_run_id
      - payload.node
      - payload.step
      - payload.item_id
      - payload.tool
      - payload.status
      - payload.error
      - payload.result_size_bytes
      - payload.truncated_reason
      - payload.uri
      - payload.content_hash
  event_kinds:
    cognition_out:
      primary: payload.content
      role: flow
    thread_continued:
      primary: payload.previous_thread_id
      meta: event_type
      role: boundary
    cognition_in:
      primary: payload.turn
      meta: event_type
      role: boundary
    tool_call_start:
      primary: payload.tool
      meta: payload.call_id
      role: pair_open
      pair_key: payload.call_id
    tool_call_result:
      primary: payload.tool
      meta: payload.result_size_bytes
      role: pair_close
      pair_key: payload.call_id
      tone:
        field: payload.truncated_reason
        missing: good
        map:
          error_envelope: danger
          size_cap_exceeded: warn
          result_guard: warn
        default: good
    provider_retry:
      primary: payload.error
      meta: payload.attempt
      role: boundary
      tone:
        field: event_type
        missing: warn
        map:
          provider_retry: warn
        default: warn
    cost_untracked:
      primary: payload.model
      meta: payload.reason
      role: boundary
      tone:
        field: event_type
        missing: warn
        map:
          cost_untracked: warn
        default: warn
    graph_follow_suspended:
      primary: payload.node
      meta: payload.item_id
      role: boundary
    milestone:
      primary: payload.kind
      meta: payload.node
      role: line
      tone:
        field: event_type
        map:
          milestone: accent
        default: accent
  default:
    primary: event_type
    meta: ts
refresh:
  on_hint: thread
