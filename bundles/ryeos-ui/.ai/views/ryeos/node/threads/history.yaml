# ryeos:signed:2026-07-13T10:47:02Z:fabc1e43071e66c1c8c90431c31690838ee6fe8d943989d1134776638e030482:1mL1K7KPcLiHefRav5o3cZysBd7sU+naZ2TyL+Hk9Nscfhkn82VzED3rRc4PJ6UAYFAkHegQ4HTocRJI9I6EDw==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
name: node-threads-history
title: Node Threads
version: "1.0.0"
description: >-
  Node-wide thread history across project contexts. The input acts as the
  active/status/kind/source filter instead of a separate active-only view.

widget: table
source:
  ref: service:ui/ryeos-ui/threads/list
  params:
    limit: 200
    sort: watch
    # Substrate plumbing (threads/get polls, status strips, chain
    # replays) records a service_run per invocation and drowns the
    # execution signal ~9:1. The watch views exclude them wholesale;
    # tool/graph/directive/knowledge runs and seats are the content.
    exclude_item_prefixes: ["service:"]
  collection: threads
projections:
  columns:
    - label: thread
      field: thread_id
    - label: kind
      field: kind
    # Leaf-first: the segment that names the thing survives a narrow
    # cell; the raw canonical ref rides beside it as `id`.
    - label: item
      field: item_ref
      present: tail_first
    - label: id
      field: item_ref
    - label: project
      field: project.name
    - label: status
      field: status
    - label: source
      field: requested_by
    - label: follow
      field: follow.role
      tone:
        field: follow.display_state
        map:
          suspended: warn
          resume_queued: neutral
          resumed: good
    - label: created
      field: created_at
  expand:
    fields: [thread_id, chain_root_id, project.name, project.path, item_ref, current_node.node, follow.role, follow.display_state, follow.follow_node, follow.child_thread_id, follow.child_chain_root_id, follow.parent_successor_thread_id, error]
  tone:
    field: status
    map:
      running: accent
      # A queued (created/accepted) thread sits calm — only genuinely
      # RUNNING rows breathe, so a fanned-out cohort backlog reads as a
      # queue, not a wall of live activity.
      created: neutral
      accepted: neutral
      failed: danger
      killed: danger
      timed_out: danger
      cancelled: warn
      completed: good
    default: neutral
selection:
  activate: watch
affordances:
  - id: watch
    label: Watch
    invoke:
      plane: ui
      facet: input.route
      merge:
        thread: "{record.thread_id}"
        chain_root: "{record.chain_root_id}"
      open_view: view:ryeos/thread/transcript
      drill: true
  - id: watch-child
    label: Watch child
    invoke:
      plane: ui
      facet: input.route
      merge:
        thread: "{record.follow.child_thread_id}"
        chain_root: "{record.follow.child_chain_root_id}"
      open_view: view:ryeos/thread/transcript
      drill: true
  - id: inspect
    label: Inspect
    invoke:
      plane: ui
      facet: selection
      value:
        thread: "{record.thread_id}"
      open_view: view:ryeos/threads/detail
input:
  id: filter
  feeds:
    fields:
      - { param: active, label: active }
      - { param: status, label: status }
      - { param: kind, label: kind }
      - { param: requested_by, label: source }
    debounce_ms: 120
refresh:
  on_hint: [thread, activity]
