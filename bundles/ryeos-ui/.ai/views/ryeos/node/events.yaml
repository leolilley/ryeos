# ryeos:signed:2026-07-09T06:05:20Z:49f78d6abfcc3bbb46577fcc322697f0592c4baeb31fe43a54d5a70e878c83f1:Gpw4ohz+ULywYPBiqp2r58lrrkYibyQG+8UBkvZozOB7EfYlwfN0vVnqZ7Ng2e7w3Rb9H7e6xGxbZckt6y/uAQ==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
name: node-events
title: Events
version: "1.0.0"
description: Recent durable events across every thread on the node

widget: sections
affordances:
  - id: watch-thread
    label: Watch thread
    invoke:
      plane: ui
      facet: input.route
      merge:
        thread: "{record.thread_id}"
        chain_root: "{record.chain_root_id}"
      open_view: view:ryeos/thread/transcript
      drill: true
sections:
  - title: Pulse
    source:
      ref: service:ui/ryeos-ui/node/activity
      params:
        event_limit: 1
      collection: pulse
    projection:
      primary: value
      meta: label
  - title: Recent
    source:
      ref: service:ui/ryeos-ui/node/activity
      params:
        event_limit: 80
        exclude_types: ["seat.facet", "thread_usage", "cognition_out"]
      collection: events
    projection:
      primary: event_type
      meta: thread_id
      tone:
        field: event_type
        map:
          thread_failed: danger
          thread_killed: danger
          thread_timed_out: danger
          thread_cancelled: warn
          provider_retry: warn
          cost_untracked: warn
          thread_completed: good
          artifact_published: good
          thread_created: accent
          child_thread_spawned: accent
        default: neutral
    activate: watch-thread
refresh:
  on_hint: [thread, activity]
