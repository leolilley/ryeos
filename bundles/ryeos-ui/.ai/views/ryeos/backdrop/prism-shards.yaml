# ryeos:unsigned
name: backdrop-prism-shards
version: "1.0.0"
description: >-
  A second RyeOS backdrop: the same filled prism scene, authored as four
  clipped shards that ease apart and rejoin. Each shard remains a generic
  `fill` object using the prism SDF; `clip` carves the object-local slice
  and `break` offsets it on a loop.

widget: scene
body:
  sweep: { period: 56, width: 4.2 }
  objects:
    - { kind: fill, shape: prism, id: prism/shard-left, position: [0.0, 0.4], scale: [3.0, 3.6, 2.6], clip: { x_min: -3.0, x_max: -1.05 }, break: { away: [-2.9, 0.55], period: 132, phase: 0 }, color: "#d65d0e", tone: accent, opacity: 0.92, spin: 0.42 }
    - { kind: fill, shape: prism, id: prism/shard-core, position: [0.0, 0.4], scale: [3.0, 3.6, 2.6], clip: { x_min: -1.15, x_max: 0.85 }, break: { away: [-0.45, -0.22], period: 132, phase: 8 }, color: "#fe8019", tone: accent, opacity: 0.96, spin: 0.58 }
    - { kind: fill, shape: prism, id: prism/shard-right, position: [0.0, 0.4], scale: [3.0, 3.6, 2.6], clip: { x_min: 0.75, x_max: 3.0 }, break: { away: [2.75, 0.62], period: 132, phase: 16 }, color: "#d65d0e", tone: accent, opacity: 0.9, spin: 0.74 }
    - { kind: fill, shape: prism, id: prism/shard-lower, position: [0.0, 0.4], scale: [3.0, 3.6, 2.6], clip: { x_min: -0.35, x_max: 1.9, y_min: -6.2, y_max: -1.05 }, break: { away: [0.85, -1.5], period: 132, phase: 24 }, color: "#fabd2f", tone: warn, opacity: 0.64, spin: -0.36 }

    - { kind: particle, position: [-11.0, 4.0], scale: 0.4, color: "#a89984", tone: neutral, opacity: 0.7, glyph: diamond, orbit: 0.5, fit: false }
    - { kind: particle, position: [10.0, 3.4], scale: 0.5, color: "#d5c4a1", tone: neutral, opacity: 0.7, glyph: diamond, orbit: -0.6, fit: false }
