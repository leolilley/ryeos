name: chain-timeline
version: "1.0.0"
description: Event braid timeline for the input route's conversation chain

widget: timeline
source:
  ref: service:events/chain_replay
  params:
    chain_root_id: "@facet:input.route.chain_root"
  collection: events
projections:
  expand:
    fields:
      - event_type
      - thread_id
      - chain_root_id
      - chain_seq
      - payload.graph_run_id
      - payload.node
      - payload.step
      - payload.item_id
      - payload.tool
      - payload.status
      - payload.error
      - payload.result_size_bytes
      - payload.truncated_reason
      - payload.uri
      - payload.content_hash
  event_kinds:
    cognition_out:
      primary: payload.content
      role: flow
    thread_continued:
      primary: payload.previous_thread_id
      meta: event_type
      role: boundary
    cognition_in:
      primary: payload.turn
      meta: event_type
      role: boundary
    tool_call_start:
      primary: payload.tool
      meta: payload.call_id
      role: pair_open
      pair_key: payload.call_id
    tool_call_result:
      primary: payload.tool
      meta: payload.result_size_bytes
      role: pair_close
      pair_key: payload.call_id
      tone:
        field: payload.truncated_reason
        missing: good
        map:
          error_envelope: danger
          size_cap_exceeded: warn
          result_guard: warn
        default: good
    provider_retry:
      primary: payload.error
      meta: payload.attempt
      role: boundary
      tone:
        field: event_type
        missing: warn
        map:
          provider_retry: warn
        default: warn
    cost_untracked:
      primary: payload.model
      meta: payload.reason
      role: boundary
      tone:
        field: event_type
        missing: warn
        map:
          cost_untracked: warn
        default: warn
    # A graph `follow:` node suspended the run (`continued`) to await its child
    # chain. The event names only the local follow node — the child chain is
    # dispatched after the checkpoint, so the payload carries no child ref. The
    # timeline widget refines this into an accent milestone (see
    # `execution_entry` in base `ryeos_ui::timeline`); the boundary projection here
    # is the declarative record for other consumers.
    graph_follow_suspended:
      primary: payload.node
      meta: payload.item_id
      role: boundary
    # Generic domain milestone — the runtime-on-behalf-of-tool channel. Surface
    # the namespaced `kind` (e.g. arc's level_up / cases_emitted / board) with
    # the graph node that produced it, accent-toned so the meaningful moments
    # stand out. This is the legible default so a milestone never renders as a
    # bare event line; an arc-tuned view can refine per-kind (e.g. render a
    # board) on top of it.
    milestone:
      primary: payload.kind
      meta: payload.node
      role: line
      tone:
        field: event_type
        map:
          milestone: accent
        default: accent
  default:
    primary: event_type
    meta: ts
refresh:
  on_hint: thread
