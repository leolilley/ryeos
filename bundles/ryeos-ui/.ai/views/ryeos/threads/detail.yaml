# ryeos:signed:2026-07-06T12:24:56Z:525db0338d96fbd9d9e4fcd46b1677ce3fef54386df64ec0edbff2c7b0a2ff99:B/eaO6RM02acOyoKSu3KPhWbQ0f0I/M0gyCZZ5djeU2gA2e2AlEBuHN4gdOlrJeEt+/C/CBb3b2mQQmEDLLdCw==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
name: thread-detail
version: "1.0.0"
description: >-
  Thread detail lens: the triage read for one execution. Sections project the
  inspect service (summary, usage, outcome, artifacts, children) — each reads a
  sub-value of the one inspect response, so the whole thing degrades to empty
  sections rather than a raw-JSON dump when a thread has no result/artifacts yet.

widget: sections
title: Thread

sections:
  # Summary: the whole `thread` sub-record projected to one row (item + status),
  # toned by status so the header reads at a glance.
  - title: Summary
    source:
      ref: service:ui/ryeos-ui/thread/inspect
      params:
        thread_id: "@facet:selection.thread"
      collection: thread
    projection:
      primary: item_ref
      meta: status
      tone:
        field: status
        map:
          running: accent
          created: accent
          failed: danger
          cancelled: warn
          completed: good
        default: neutral

  # Project: the launch project context, when the thread carries one. This is
  # display/scoping metadata for local RyeOS UI sessions, not an authorization
  # boundary; old/system rows may be empty.
  - title: Project
    source:
      ref: service:ui/ryeos-ui/thread/inspect
      params:
        thread_id: "@facet:selection.thread"
      collection: thread
    projection:
      primary: project.path
      meta: project.name

  # Follow: the graph `follow:` lineage, present only when this thread issued or
  # resumed a follow. Sourced from the daemon-emitted labeled-rows `follow`
  # collection (`{label, value}` — the same shape as Usage / Execution), so each
  # lineage fact renders as its own row: `state` (suspended / resumed), phase,
  # follow node, child chain, child thread, child status, resume successor.
  # Absent rows (a still-running child, or a durably-recognized successor that no
  # longer carries the child identity) are dropped by the daemon, and a non-follow
  # thread yields an empty collection — so the section degrades to empty rather
  # than dumping the thread record.
  - title: Follow
    source:
      ref: service:ui/ryeos-ui/thread/inspect
      params:
        thread_id: "@facet:selection.thread"
      collection: follow
    projection:
      primary: value
      meta: label

  # Usage: chain-wide execution totals (tokens, cost, turns, thread count), one
  # metric per row — the deep-watch summary of what this execution consumed.
  - title: Usage
    source:
      ref: service:ui/ryeos-ui/thread/inspect
      params:
        thread_id: "@facet:selection.thread"
      collection: usage
    projection:
      primary: value
      meta: label

  # Execution: the thread's durable execution posture — capabilities minted,
  # hard limits, effective trust class, model, runtime — one labeled metric per
  # row, read from the signed thread.json audit record (plus the projection's
  # executor identity). Empty when the thread carries no audit record.
  - title: Execution
    source:
      ref: service:ui/ryeos-ui/thread/inspect
      params:
        thread_id: "@facet:selection.thread"
      collection: execution_meta
    projection:
      primary: value
      meta: label

  # Outcome: the `result` sub-object (outcome code + error). Null until the
  # thread finishes → this section is simply empty.
  - title: Outcome
    source:
      ref: service:ui/ryeos-ui/thread/inspect
      params:
        thread_id: "@facet:selection.thread"
      collection: result
    projection:
      primary: outcome_code
      meta: error
      tone:
        field: outcome_code
        map:
          ok: good
          error: danger
        default: neutral

  # Artifacts the execution produced (one row each; empty when none).
  - title: Artifacts
    source:
      ref: service:ui/ryeos-ui/thread/inspect
      params:
        thread_id: "@facet:selection.thread"
      collection: artifacts
    projection:
      primary: artifact_type
      meta: uri

  # Child threads spawned by this one (the chain fanning out).
  - title: Children
    source:
      ref: service:ui/ryeos-ui/thread/inspect
      params:
        thread_id: "@facet:selection.thread"
      collection: children
    projection:
      primary: item_ref
      meta: status
      tone:
        field: status
        map:
          running: accent
          created: accent
          failed: danger
          cancelled: warn
          completed: good
        default: neutral

# Re-fetch whenever the selected thread changes (the inspect affordance writes
# selection.thread before opening this lens).
refresh:
  on_facet: selection
