# ryeos:signed:2026-07-16T01:27:49Z:28f028f635bf8f56663ebaab13d8f3d3a4e154fa3562325254acf7349eff87a8:/9DNuUI6GF08dA3SrMkZOtTyj2yq6oQkyrbvqK4jn/t2r9qQN8VRUkg/lBMTWRpECHWQLe6sVCRIMY7mN7nlDw==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
name: project-threads
title: Project Threads
version: "1.0.0"
description: >-
  Active-project thread history. This is the broad project execution table:
  running, failed, cancelled, and completed threads are all present, with the
  input acting as the active/status/kind/source filter instead of separate
  active-only views.

widget: table
source:
  ref: service:ui/ryeos-ui/threads/list
  params:
    project: current
    project_path: ""
    limit: 200
    sort: watch
  collection: threads
projections:
  columns:
    - label: thread
      field: thread_id
    - label: kind
      field: kind
      present: words
    # The table carries the readable leaf; the full canonical ref remains in
    # expanded detail.
    - label: item
      field: item_ref
      present: leaf
    - label: project
      field: project.name
      fallback: node
    - label: status
      field: status
      present: words
    - label: lineage
      field: follow.display_state
      present: words
      tone:
        field: follow.display_state
        map:
          suspended: warn
          resume_queued: neutral
          resumed: good
    - label: created
      field: created_at
      present: time_date
  expand:
    fields: [thread_id, chain_root_id, project.name, project.path, item_ref, requested_by, created_at, current_node.node, follow.role, follow.display_state, follow.phase, follow.follow_node, follow.child_thread_id, follow.child_chain_root_id, follow.child_terminal_status, follow.parent_successor_thread_id, follow.cohort.done, follow.cohort.expected, error]
  tone:
    field: status
    map:
      running: accent
      # A queued (created/accepted) thread sits calm — only genuinely
      # RUNNING rows breathe, so a fanned-out cohort backlog reads as a
      # queue, not a wall of live activity.
      created: neutral
      accepted: neutral
      failed: danger
      killed: danger
      timed_out: danger
      cancelled: warn
      completed: good
    default: neutral
selection:
  activate: watch
affordances:
  - id: watch
    label: Watch
    invoke:
      plane: ui
      facet: input.route
      merge:
        thread: "{record.thread_id}"
        chain_root: "{record.chain_root_id}"
      open_view: view:ryeos/thread/transcript
      drill: true
  - id: watch-child
    label: Watch child
    invoke:
      plane: ui
      facet: input.route
      merge:
        thread: "{record.follow.child_thread_id}"
        chain_root: "{record.follow.child_chain_root_id}"
      open_view: view:ryeos/thread/transcript
      drill: true
  - id: tree
    label: Tree
    invoke:
      plane: ui
      facet: input.route
      merge:
        thread: "{record.thread_id}"
        chain_root: "{record.chain_root_id}"
      open_view: view:ryeos/thread/tree
      drill: true
  - id: inspect
    label: Inspect
    invoke:
      plane: ui
      facet: selection
      value:
        thread: "{record.thread_id}"
      open_view: view:ryeos/threads/detail
  - id: cancel
    label: Cancel
    invoke:
      plane: rye
      ref: service:commands/submit
      args:
        thread_id: "{record.thread_id}"
        command_type: cancel
      notice: "Cancelled {result.thread_id}."
input:
  id: filter
  feeds:
    fields:
      - { param: active, label: active }
      - { param: status, label: status }
      - { param: kind, label: kind }
      - { param: requested_by, label: source }
    debounce_ms: 120
refresh:
  on_hint: [thread, activity]
