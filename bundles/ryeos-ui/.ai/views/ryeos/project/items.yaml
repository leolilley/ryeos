# ryeos:unsigned
name: project-items
version: "1.0.0"
description: Signed content visible from the active project

widget: table
source:
  ref: service:ui/ryeos-ui/items/list
  params:
    limit: 500
    project_path: ""
  collection: items
projections:
  columns:
    - label: item
      field: canonical_ref
    - label: kind
      field: item_kind
    - label: space
      field: space
    - label: trust
      field: trust.class
  tone:
    field: trust.class
    map:
      trusted: good
      untrusted: danger
      unsigned: warn
      unknown: neutral
    default: neutral
selection:
  activate: inspect
affordances:
  - id: inspect
    label: Inspect
    invoke:
      plane: ui
      facet: selection
      value:
        item: "{record.canonical_ref}"
  - id: explain
    label: Explain
    invoke:
      plane: ui
      facet: selection
      value:
        item: "{record.canonical_ref}"
      open_view: view:ryeos/item/explain
