# ryeos:signed:2026-07-03T09:54:36Z:3902e3d24dde375192452d2bcbe5a5a0eeec7a8f915b4892200d6551575e1317:2GGePzZvuSu1bXymFSThLw6+hdzcZPfj+8xPE5DiPjsgeF6TRq6eAHO54da5SzPr73Uzf2l1NIkhPrTUygGjBQ==:741a8bc609b398aaec0685e5aefb682faf5129a66bd192f888d23bb642c18eea
name: items-space
version: "1.0.0"
description: The item space - signed content across system, user, and project

widget: table
source:
  ref: service:ui/ryeos-ui/items/list
  params:
    limit: 500
    project_path: ""
  collection: items
projections:
  columns:
    - label: item
      field: canonical_ref
    - label: kind
      field: item_kind
    - label: space
      field: space
    - label: trust
      field: trust.class
  tone:
    field: trust.class
    map:
      trusted: good
      untrusted: danger
      unsigned: warn
      unknown: neutral
    default: neutral
selection:
  activate: inspect
affordances:
  - id: inspect
    label: Inspect
    invoke:
      plane: ui
      facet: selection
      value:
        item: "{record.canonical_ref}"
  # Explain swaps the center lens to the item's "why" read: write the selected
  # item FIRST (the explain sources read @facet:selection.item), then open the
  # lens — the open_view ordering guarantees the facet is set before the new
  # lens fetches service:items/effective.
  - id: explain
    label: Explain
    invoke:
      plane: ui
      facet: selection
      value:
        item: "{record.canonical_ref}"
      open_view: view:ryeos/item/explain
