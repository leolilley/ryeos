# ryeos:unsigned
name: project-activity
version: "1.0.0"
description: >-
  Live activity for the active project: running threads plus graph follow
  parents suspended on live children, newest first. Enter steps into a thread's
  transcript, with Backspace returning to this project activity lens.

widget: table
source:
  ref: service:ui/ryeos-ui/threads/list
  params:
    # Only live threads — the settled history is not activity. Newest first.
    active: true
    project: current
    project_path: ""
    sort: newest
    limit: 60
    exclude_item_prefixes:
      - service:ui/ryeos-ui/
      - surface:ryeos/ui/
  collection: threads
projections:
  columns:
    - label: id
      field: thread_id
    - label: project
      field: project.name
    - label: item
      field: item_ref
    - label: stage
      field: current_node.node
    - label: follow
      field: follow.display_state
      tone:
        field: follow.display_state
        map:
          suspended: warn
          resume_queued: neutral
          resumed: good
    - label: status
      field: status
    - label: started
      field: created_at
  expand:
    fields: [thread_id, chain_root_id, project.name, project.path, item_ref, current_node.node, follow.role, follow.follow_node, follow.child_thread_id, follow.child_chain_root_id, follow.parent_successor_thread_id, error]
  tone:
    field: status
    map:
      running: accent
      created: accent
      accepted: accent
      failed: danger
      cancelled: warn
      killed: danger
      timed_out: warn
      completed: good
    default: neutral
# Enter steps into the thread's braid: aim the route at the thread (both thread +
# chain_root so the braid resolves) and swap the single center lens to its
# timeline, which renders the thread's own children as drill-ins.
selection:
  activate: watch
affordances:
  - id: watch
    label: Watch
    invoke:
      plane: ui
      facet: input.route
      merge:
        thread: "{record.thread_id}"
        chain_root: "{record.chain_root_id}"
      open_view: view:ryeos/thread/transcript
      # Step INTO the braid (returnable via Backspace), pushing activity onto the
      # drill stack so the operator can walk back up to the live view.
      drill: true
refresh:
  on_hint: [thread, activity]
