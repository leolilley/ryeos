[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
filterwarnings =
    ignore:The '(timeout|verify)' parameter is deprecated:DeprecationWarning:supabase
markers =
    unit: fast isolated tests
    integration: multi-component tests
    e2e: full scenarios (slow, requires API keys)
