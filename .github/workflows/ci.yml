name: CI

on:
  push:
    branches:
      - next
      - main
  pull_request:
    branches:
      - next
      - main
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run the workspace test gate"
        required: true
        default: true
        type: boolean
      refresh_bundles:
        description: "Run the expensive bundle refresh/populate path"
        required: true
        default: false
        type: boolean
      installed_resume_smoke:
        description: "Run the installed init/start/restart resume smoke (expensive)"
        required: true
        default: false
        type: boolean
      bundle_set:
        description: "Bundle set for refresh_bundles"
        required: true
        default: full
        type: choice
        options:
          - full
          - standard
          - hosted-node
          - hosted-workflow

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Keep CI resource usage predictable. Override in workflow YAML if the runner
  # class changes; local gate defaults remain machine-sensitive.
  GATE_BUILD_JOBS: 2
  GATE_TEST_THREADS: 2

jobs:
  static-policy:
    name: Static repository policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install checksum-pinned workflow and shell linters
        run: ./scripts/ci/install-static-linters.sh "$RUNNER_TEMP/ryeos-linters"

      - name: Check workflows and release/install shell
        run: ./scripts/ci/lint-workflows-and-shell.sh "$RUNNER_TEMP/ryeos-linters"

      - name: Check release input validation
        run: ./scripts/release/test-resolve-version.sh

      - name: Check deterministic AUR metadata preparation
        run: ./scripts/release/test-prepare-aur.sh

      - name: Check deterministic official bundle packaging
        run: ./scripts/release/test-package-bundle-artifact.sh

      - name: Check explicit publisher trust boundaries
        run: ./scripts/ci/test-publisher-trust-policy.sh

      - name: Check canonical naming
        run: ./scripts/lint-naming.sh

      - name: Check CLI presentation boundaries
        run: ./scripts/lint-cli-presentation.sh

      - name: Check shell terminal presentation
        run: ./scripts/pkg/test-ryeos-terminal.sh

      - name: Check removed compatibility vocabulary
        run: ./scripts/lint-no-content-wrap.sh

      - name: Check workspace dependency direction
        run: ./scripts/lint-dependency-layers.py

      - name: Check browser key adapter
        working-directory: crates/clients/web
        run: npm test

  rust-policy:
    name: Rust formatting, lint, and dependency policy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcap-dev binutils xz-utils pkg-config libssl-dev ca-certificates openssl

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master, pinned
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Install cargo-deny
        uses: taiki-e/install-action@1725d1806acf0cd664ecc8dd0fcff6d896453dcf # cargo-deny

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # Correction runs should reuse compiled RyeOS crates, not only third-party
          # dependencies, and a failing gate must still publish its valid artifacts.
          key: workspace-crates-v1
          cache-workspace-crates: true
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check Clippy policy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Check dependency advisories, licenses, and sources
        run: cargo deny check

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Scan repository history
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Workspace tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_tests }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcap-dev binutils xz-utils pkg-config libssl-dev ca-certificates openssl

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master, pinned
        with:
          toolchain: 1.95.0

      - name: Install cargo-nextest
        uses: taiki-e/install-action@e658debeddbabf20b2b866d9235eb08a2375b1ad # nextest

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # Keep the expensive bundle/test compilation warm across CI repair runs.
          key: workspace-crates-v1
          cache-workspace-crates: true
          cache-on-failure: true

      - name: Show tool versions
        run: |
          rustc --version
          cargo --version
          cargo nextest --version

      - name: Run workspace gate
        # --refresh-bundles populates + dev-key-signs the bundle bin trees the
        # live-registry tests load from, then runs the suite (with per-test
        # bundle refresh skipped so it isn't repeated).
        env:
          GATE_BUNDLE_TARGET_DIR: ${{ runner.temp }}/ryeos-bundle-target
        run: ./scripts/gate.sh --refresh-bundles

  bundle-refresh:
    name: Bundle refresh
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_bundles }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcap-dev binutils xz-utils pkg-config libssl-dev ca-certificates openssl

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master, pinned
        with:
          toolchain: 1.95.0

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Show tool versions
        run: |
          rustc --version
          cargo --version
          openssl version

      - name: Refresh bundle sources
        env:
          BUNDLE_SET: ${{ inputs.bundle_set }}
        run: ./scripts/gate.sh --refresh-bundles --no-tests --bundle-set "$BUNDLE_SET"

  installed-resume-smoke:
    name: Installed restart/resume smoke
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.installed_resume_smoke }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcap-dev binutils xz-utils pkg-config libssl-dev ca-certificates openssl python3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master, pinned
        with:
          toolchain: 1.95.0

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build and install standard distribution
        run: |
          sudo ./scripts/pkg/install-local-direct.sh \
            --populate --all --bundle-set standard --no-init --no-daemon-restart

      - name: Exercise installed restart and resume
        env:
          # The manual smoke job populates bundles with the repository's dev
          # publisher. Trust that exact document explicitly; release artifacts
          # use the hardcoded official publisher and need no override.
          RYEOS_SMOKE_TRUST_FILE: /usr/share/ryeos/.ai/PUBLISHER_TRUST.toml
        run: ./scripts/smoke-installed-resume.sh
