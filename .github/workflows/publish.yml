name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish (or 'all')"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - lillux
          - ryeos-engine
          - ryeos-core
          - ryeos
          - ryeos-web
          - ryeos-code
          - ryeos-email
          - ryeos-mcp
          - ryeos-cli
          - ryeos-node

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── Build lillux once and share via artifact ─────────────────────
  build-lillux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build lillux wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: lillux/lillux
          args: --release --out dist-wheel
          manylinux: auto

      - name: Build lillux sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: lillux/lillux
          command: sdist
          args: --out dist-sdist

      - name: Combine dist artifacts
        run: |
          mkdir -p lillux/lillux/dist
          cp lillux/lillux/dist-wheel/* lillux/lillux/dist/
          cp lillux/lillux/dist-sdist/* lillux/lillux/dist/

      - name: Upload lillux dist
        uses: actions/upload-artifact@v4
        with:
          name: lillux-dist
          path: lillux/lillux/dist/
          retention-days: 1

  # ── Re-sign with CI key and run tests ────────────────────────────
  test:
    needs: build-lillux
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download lillux dist
        uses: actions/download-artifact@v4
        with:
          name: lillux-dist
          path: lillux/lillux/dist

      - name: Install lillux wheel
        run: pip install lillux/lillux/dist/*.whl

      - name: Install dependencies
        run: |
          pip install -e ryeos -e ryeos/bundles/core -e ryeos/bundles/standard \
                      -e ryeos/bundles/web -e ryeos/bundles/code -e ryeos/bundles/email \
                      -e ryeos-mcp -e ryeos-cli -e ryeos-node
          pip install pytest pytest-asyncio

      - name: Import CI signing key
        env:
          RYE_SIGNING_KEY: ${{ secrets.RYE_SIGNING_KEY }}
          RYE_SIGNING_PUBKEY: ${{ secrets.RYE_SIGNING_PUBKEY }}
        run: |
          mkdir -p ~/.ai/config/keys/signing
          echo "$RYE_SIGNING_KEY" > ~/.ai/config/keys/signing/private_key.pem
          chmod 600 ~/.ai/config/keys/signing/private_key.pem
          echo "$RYE_SIGNING_PUBKEY" > ~/.ai/config/keys/signing/public_key.pem
          # Trust the CI key in user space
          python -c "
          import os
          from rye.utils.trust_store import TrustStore
          pub = open(os.path.expanduser('~/.ai/config/keys/signing/public_key.pem'), 'rb').read()
          store = TrustStore()
          store.add_key(pub, owner='github-ci', space='user', version='1.0.0')
          "

      - name: Re-sign all bundle items with CI key
        run: |
          BUNDLES=(
            "ryeos/bundles/core/ryeos_core"
            "ryeos/bundles/standard/ryeos_std"
            "ryeos/bundles/web/ryeos_web"
            "ryeos/bundles/code/ryeos_code"
            "ryeos/bundles/email/ryeos_email"
          )
          for bundle in "${BUNDLES[@]}"; do
            for item_type in directive tool knowledge config; do
              rye -p "$bundle" sign "$item_type" '*' 2>/dev/null || true
            done
          done

      - name: Run tests
        run: python -m pytest tests/ -x -q

  # ── Build & publish each Python package individually ─────────────
  publish-python:
    needs: test
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - package: ryeos-engine
            path: ryeos
          - package: ryeos-core
            path: ryeos/bundles/core
          - package: ryeos
            path: ryeos/bundles/standard
          - package: ryeos-web
            path: ryeos/bundles/web
          - package: ryeos-code
            path: ryeos/bundles/code
          - package: ryeos-email
            path: ryeos/bundles/email
          - package: ryeos-mcp
            path: ryeos-mcp
          - package: ryeos-cli
            path: ryeos-cli
          - package: ryeos-node
            path: ryeos-node
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Check if this package should run
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "push" ]] || \
             [[ "${{ github.event.inputs.package }}" == "all" ]] || \
             [[ "${{ github.event.inputs.package }}" == "${{ matrix.package }}" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.check.outputs.skip == 'false'

      - uses: actions/setup-python@v6
        if: steps.check.outputs.skip == 'false'
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download lillux dist
        if: steps.check.outputs.skip == 'false'
        uses: actions/download-artifact@v4
        with:
          name: lillux-dist
          path: lillux/lillux/dist

      - name: Install build tools and runtime
        if: steps.check.outputs.skip == 'false'
        run: |
          pip install build
          pip install lillux/lillux/dist/*.whl
          pip install -e ryeos -e ryeos/bundles/core -e ryeos/bundles/standard -e ryeos-cli

      - name: Import CI signing key
        if: steps.check.outputs.skip == 'false' && contains(fromJSON('["ryeos-core","ryeos","ryeos-web","ryeos-code","ryeos-email"]'), matrix.package)
        env:
          RYE_SIGNING_KEY: ${{ secrets.RYE_SIGNING_KEY }}
          RYE_SIGNING_PUBKEY: ${{ secrets.RYE_SIGNING_PUBKEY }}
        run: |
          mkdir -p ~/.ai/config/keys/signing
          echo "$RYE_SIGNING_KEY" > ~/.ai/config/keys/signing/private_key.pem
          chmod 600 ~/.ai/config/keys/signing/private_key.pem
          echo "$RYE_SIGNING_PUBKEY" > ~/.ai/config/keys/signing/public_key.pem
          python -c "
          import os
          from rye.utils.trust_store import TrustStore
          pub = open(os.path.expanduser('~/.ai/config/keys/signing/public_key.pem'), 'rb').read()
          store = TrustStore()
          store.add_key(pub, owner='github-ci', space='user', version='1.0.0')
          "

      - name: Re-sign and rebuild bundle manifest with CI key
        if: steps.check.outputs.skip == 'false' && contains(fromJSON('["ryeos-core","ryeos","ryeos-web","ryeos-code","ryeos-email"]'), matrix.package)
        run: |
          # Re-sign ryeos-core first (provides bundler/verify tools used by all bundles)
          CORE_DIR=$(find ryeos/bundles/core -maxdepth 2 -type d -name ".ai" -printf '%h\n' | head -1)
          for item_type in directive tool knowledge config; do
            rye -p "$CORE_DIR" sign "$item_type" '*' 2>/dev/null || true
          done
          # Re-sign target bundle items with CI key
          PACKAGE_DIR=$(find ${{ matrix.path }} -maxdepth 2 -type d -name ".ai" -printf '%h\n' | head -1)
          if [ "$PACKAGE_DIR" != "$CORE_DIR" ]; then
            for item_type in directive tool knowledge config; do
              rye -p "$PACKAGE_DIR" sign "$item_type" '*' 2>/dev/null || true
            done
          fi
          # Rebuild manifest so hashes match the re-signed files
          rye remote bundle build "$PACKAGE_DIR" --bundle-id ${{ matrix.package }}
          # Verify the rebuilt manifest
          rye -p "$PACKAGE_DIR" remote bundle verify ${{ matrix.package }}

      - name: Build wheel
        if: steps.check.outputs.skip == 'false'
        run: python -m build --wheel
        working-directory: ${{ matrix.path }}

      - name: Publish to PyPI
        if: steps.check.outputs.skip == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ matrix.path }}/dist/
          skip-existing: true

  # ── Publish data bundles to Rye Registry ──────────────────────────
  publish-bundles:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - bundle: ryeos-core
            path: ryeos/bundles/core
            package: ryeos-core
          - bundle: ryeos
            path: ryeos/bundles/standard
            package: ryeos
          - bundle: ryeos-web
            path: ryeos/bundles/web
            package: ryeos-web
          - bundle: ryeos-code
            path: ryeos/bundles/code
            package: ryeos-code
          - bundle: ryeos-email
            path: ryeos/bundles/email
            package: ryeos-email
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Check if this bundle should run
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "push" ]] || \
             [[ "${{ github.event.inputs.package }}" == "all" ]] || \
             [[ "${{ github.event.inputs.package }}" == "${{ matrix.package }}" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.check.outputs.skip == 'false'

      - uses: actions/setup-python@v6
        if: steps.check.outputs.skip == 'false'
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download lillux dist
        if: steps.check.outputs.skip == 'false'
        uses: actions/download-artifact@v4
        with:
          name: lillux-dist
          path: lillux/lillux/dist

      - name: Install from local checkout
        if: steps.check.outputs.skip == 'false'
        run: |
          pip install lillux/lillux/dist/*.whl
          pip install -e ryeos -e ryeos/bundles/core -e ryeos/bundles/standard -e ryeos-cli

      - name: Import CI signing key
        if: steps.check.outputs.skip == 'false'
        env:
          RYE_SIGNING_KEY: ${{ secrets.RYE_SIGNING_KEY }}
          RYE_SIGNING_PUBKEY: ${{ secrets.RYE_SIGNING_PUBKEY }}
        run: |
          mkdir -p ~/.ai/config/keys/signing
          echo "$RYE_SIGNING_KEY" > ~/.ai/config/keys/signing/private_key.pem
          chmod 600 ~/.ai/config/keys/signing/private_key.pem
          echo "$RYE_SIGNING_PUBKEY" > ~/.ai/config/keys/signing/public_key.pem
          python -c "
          import os
          from rye.utils.trust_store import TrustStore
          pub = open(os.path.expanduser('~/.ai/config/keys/signing/public_key.pem'), 'rb').read()
          store = TrustStore()
          store.add_key(pub, owner='github-ci', space='user', version='1.0.0')
          "

      - name: Find package directory
        if: steps.check.outputs.skip == 'false'
        id: pkg
        run: |
          PKG_DIR=$(find ${{ matrix.path }} -maxdepth 2 -type d -name ".ai" -printf '%h\n' | head -1)
          echo "dir=$PKG_DIR" >> "$GITHUB_OUTPUT"

      - name: Re-sign and rebuild bundle manifest with CI key
        if: steps.check.outputs.skip == 'false'
        run: |
          # Re-sign ryeos-core first (provides bundler tools used by all bundles)
          CORE_DIR=$(find ryeos/bundles/core -maxdepth 2 -type d -name ".ai" -printf '%h\n' | head -1)
          for item_type in directive tool knowledge config; do
            rye -p "$CORE_DIR" sign "$item_type" '*' 2>/dev/null || true
          done
          # Re-sign target bundle items
          if [ "${{ steps.pkg.outputs.dir }}" != "$CORE_DIR" ]; then
            for item_type in directive tool knowledge config; do
              rye -p "${{ steps.pkg.outputs.dir }}" sign "$item_type" '*' 2>/dev/null || true
            done
          fi
          rye remote bundle build "${{ steps.pkg.outputs.dir }}" --bundle-id ${{ matrix.bundle }} --version "${GITHUB_REF_NAME#v}"

      - name: Configure registry remote
        if: steps.check.outputs.skip == 'false'
        env:
          RYE_REGISTRY_URL: ${{ secrets.RYE_REGISTRY_URL }}
        run: |
          mkdir -p ~/.ai/config/remotes
          printf 'remotes:\n  registry:\n    url: %s\n    roles: [registry]\n' "$RYE_REGISTRY_URL" > ~/.ai/config/remotes/remotes.yaml

      - name: Push bundle to registry
        if: steps.check.outputs.skip == 'false'
        run: rye -p ${{ steps.pkg.outputs.dir }} remote bundle push ${{ matrix.bundle }}

  # ── Publish lillux to PyPI ─────────────────────────────────────────
  publish-rust:
    needs: [test, build-lillux]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Check if this package should run
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "push" ]] || \
             [[ "${{ github.event.inputs.package }}" == "all" ]] || \
             [[ "${{ github.event.inputs.package }}" == "lillux" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download lillux dist
        if: steps.check.outputs.skip == 'false'
        uses: actions/download-artifact@v4
        with:
          name: lillux-dist
          path: dist

      - name: Publish to PyPI
        if: steps.check.outputs.skip == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
