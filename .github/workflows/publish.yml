name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish (or 'all')"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - lillux
          - lillux-proc
          - lillux-watch
          - ryeos-engine
          - ryeos-core
          - ryeos
          - ryeos-web
          - ryeos-code
          - ryeos-email
          - ryeos-mcp
          - ryeos-cli

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── Build & publish each Python package individually ─────────────
  publish-python:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - package: lillux
            path: lillux/kernel
          - package: ryeos-engine
            path: ryeos
          - package: ryeos-core
            path: ryeos/bundles/core
          - package: ryeos
            path: ryeos/bundles/standard
          - package: ryeos-web
            path: ryeos/bundles/web
          - package: ryeos-code
            path: ryeos/bundles/code
          - package: ryeos-email
            path: ryeos/bundles/email
          - package: ryeos-mcp
            path: ryeos-mcp
          - package: ryeos-cli
            path: ryeos-cli
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Check if this package should run
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "push" ]] || \
             [[ "${{ github.event.inputs.package }}" == "all" ]] || \
             [[ "${{ github.event.inputs.package }}" == "${{ matrix.package }}" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.check.outputs.skip == 'false'

      - uses: actions/setup-python@v6
        if: steps.check.outputs.skip == 'false'
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        if: steps.check.outputs.skip == 'false'
        run: pip install build

      - name: Build wheel
        if: steps.check.outputs.skip == 'false'
        run: python -m build --wheel
        working-directory: ${{ matrix.path }}

      - name: Verify bundle signatures
        if: steps.check.outputs.skip == 'false' && contains(fromJSON('["ryeos-core","ryeos","ryeos-web","ryeos-code","ryeos-email"]'), matrix.package)
        run: |
          pip install -e ryeos -e ryeos/bundles/core -e ryeos-cli
          # Find the inner package dir containing .ai/ (e.g. ryeos_core/, ryeos_std/)
          PACKAGE_DIR=$(find ${{ matrix.path }} -maxdepth 2 -type d -name ".ai" -printf '%h\n' | head -1)
          rye -p "$PACKAGE_DIR" registry bundle verify ${{ matrix.package }}

      - name: Publish to PyPI
        if: steps.check.outputs.skip == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ matrix.path }}/dist/
          skip-existing: true

  # ── Publish data bundles to Rye Registry ──────────────────────────
  publish-bundles:
    needs: publish-python
    strategy:
      fail-fast: false
      matrix:
        include:
          - bundle: ryeos-core
            path: ryeos/bundles/core
            package: ryeos-core
          - bundle: ryeos
            path: ryeos/bundles/standard
            package: ryeos
          - bundle: ryeos-web
            path: ryeos/bundles/web
            package: ryeos-web
          - bundle: ryeos-code
            path: ryeos/bundles/code
            package: ryeos-code
          - bundle: ryeos-email
            path: ryeos/bundles/email
            package: ryeos-email
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Check if this bundle should run
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "push" ]] || \
             [[ "${{ github.event.inputs.package }}" == "all" ]] || \
             [[ "${{ github.event.inputs.package }}" == "${{ matrix.package }}" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.check.outputs.skip == 'false'

      - uses: actions/setup-python@v6
        if: steps.check.outputs.skip == 'false'
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install from local checkout
        if: steps.check.outputs.skip == 'false'
        run: |
          pip install -e ryeos
          pip install -e ryeos/bundles/core
          pip install -e ryeos/bundles/standard
          pip install -e ryeos-cli

      - name: Find package directory
        if: steps.check.outputs.skip == 'false'
        id: pkg
        run: |
          PKG_DIR=$(find ${{ matrix.path }} -maxdepth 2 -type d -name ".ai" -printf '%h\n' | head -1)
          echo "dir=$PKG_DIR" >> "$GITHUB_OUTPUT"

      - name: Build bundle manifest
        if: steps.check.outputs.skip == 'false'
        run: rye registry bundle build ${{ steps.pkg.outputs.dir }} --bundle-id ${{ matrix.bundle }}

      - name: Push bundle to registry
        if: steps.check.outputs.skip == 'false'
        env:
          RYE_REGISTRY_API_KEY: ${{ secrets.RYE_REGISTRY_API_KEY }}
        run: rye -p ${{ steps.pkg.outputs.dir }} registry bundle push ${{ matrix.bundle }}

  # ── Build & publish Rust packages individually ───────────────────
  publish-rust:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - package: lillux-proc
            manifest: lillux/proc
          - package: lillux-watch
            manifest: lillux/watch
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Check if this package should run
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "push" ]] || \
             [[ "${{ github.event.inputs.package }}" == "all" ]] || \
             [[ "${{ github.event.inputs.package }}" == "${{ matrix.package }}" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.check.outputs.skip == 'false'

      - name: Create dist directory
        if: steps.check.outputs.skip == 'false'
        run: mkdir -p ${{ matrix.manifest }}/dist

      - name: Build wheels (maturin)
        if: steps.check.outputs.skip == 'false'
        uses: PyO3/maturin-action@v1
        with:
          working-directory: ${{ matrix.manifest }}
          args: --release --out dist
          manylinux: auto

      - name: Build sdist
        if: steps.check.outputs.skip == 'false'
        uses: PyO3/maturin-action@v1
        with:
          working-directory: ${{ matrix.manifest }}
          command: sdist
          args: --out dist

      - name: Publish to PyPI
        if: steps.check.outputs.skip == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ matrix.manifest }}/dist/
          skip-existing: true
