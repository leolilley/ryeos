name: Publish RyeOS image to GHCR

# Triggered by project release tags. The old Python PyPI publishing flow has
# been removed; the release artifact is the signed GHCR image.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (without `v` prefix), e.g. 0.5.0"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write   # for cosign keyless signing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Resolve and verify source revision
        id: source
        run: |
          git fetch --force --tags
          SOURCE_SHA="$(git rev-parse HEAD)"
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="v${VERSION}"
          TAG_COMMIT="$(git rev-list -n 1 "$TAG")"

          echo "sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "Source SHA: $SOURCE_SHA"
          echo "Tag commit: $TAG_COMMIT"

          if [ "$SOURCE_SHA" != "$TAG_COMMIT" ]; then
            echo "::error::Release image source mismatch: checked-out HEAD $SOURCE_SHA != $TAG $TAG_COMMIT"
            exit 1
          fi

      - name: Assert publisher key secret exists
        run: |
          test -n "${{ secrets.RYEOS_PUBLISHER_KEY }}" || \
            { echo "ERROR: RYEOS_PUBLISHER_KEY secret is not set"; exit 1; }

      - name: Verify publisher key matches OFFICIAL_PUBLISHER_FP
        run: |
          # Extract the compiled-in fingerprint from source (may span 2 lines).
          EXPECTED=$(grep -A1 'OFFICIAL_PUBLISHER_FP.*&str' \
            crates/daemon/ryeos-node/src/init.rs \
            | grep -oE '[0-9a-f]{64}' | head -1)
          echo "Compiled-in OFFICIAL_PUBLISHER_FP: $EXPECTED"

          # Write the secret to a temp file so openssl can read it.
          echo "${{ secrets.RYEOS_PUBLISHER_KEY }}" > /tmp/publisher-key.pem

          # Compute the fingerprint: sha256 of the raw 32-byte Ed25519
          # verifying key (last 32 bytes of the DER-encoded public key).
          ACTUAL=$(openssl pkey -in /tmp/publisher-key.pem -pubout -outform DER 2>/dev/null \
            | tail -c 32 \
            | sha256sum \
            | cut -d' ' -f1)
          rm -f /tmp/publisher-key.pem
          echo "Secret key fingerprint:          $ACTUAL"

          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::Publisher key fingerprint mismatch: secret=$ACTUAL compiled=$EXPECTED"
            echo "The RYEOS_PUBLISHER_KEY secret does not match the OFFICIAL_PUBLISHER_FP"
            echo "compiled into crates/daemon/ryeos-node/src/init.rs."
            echo "Either update the secret or update the source constant."
            exit 1
          fi
          echo "Publisher key fingerprint matches."

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build standard image for verification
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.standard
          # linux/amd64 only for now — bundle bin/ trees only contain
          # x86_64-unknown-linux-gnu binaries. Add arm64 once we ship arm64
          # binaries in the bundles.
          platforms: linux/amd64
          load: true
          push: false
          pull: true
          no-cache: true
          # Injected into the binary at compile time (.git is dockerignored, so
          # the in-container git fallback can't resolve the SHA) and onto the
          # image as OCI labels via the Dockerfile ARGs.
          build-args: |
            VCS_REF=${{ steps.source.outputs.sha }}
            BUILD_DATE=${{ steps.ver.outputs.build_date }}
            RELEASE_BUILD=1
          tags: |
            ghcr.io/leolilley/ryeos-standard:verify-${{ github.run_id }}
          secrets: |
            "publisher-key=${{ secrets.RYEOS_PUBLISHER_KEY }}"

      - name: Verify standard image provenance
        run: |
          IMG="ghcr.io/leolilley/ryeos-standard:verify-${{ github.run_id }}"
          EXPECTED="${{ steps.source.outputs.sha }}"

          ACTUAL="$(docker run --rm --entrypoint /usr/local/bin/ryeosd "$IMG" build-info --revision)"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::stale ryeosd binary: binary=$ACTUAL expected=$EXPECTED"
            exit 1
          fi

          LABEL_REV="$(docker image inspect "$IMG" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
          if [ "$LABEL_REV" != "$EXPECTED" ]; then
            echo "::error::image revision label mismatch: label=$LABEL_REV expected=$EXPECTED"
            exit 1
          fi

      - name: Tag and push verified standard image
        id: push-standard
        run: |
          SRC="ghcr.io/leolilley/ryeos-standard:verify-${{ github.run_id }}"
          VERSION_TAG="ghcr.io/leolilley/ryeos-standard:${{ steps.ver.outputs.version }}"
          LATEST_TAG="ghcr.io/leolilley/ryeos-standard:latest"

          docker tag "$SRC" "$VERSION_TAG"
          docker tag "$SRC" "$LATEST_TAG"
          docker push "$VERSION_TAG"
          docker push "$LATEST_TAG"

          DIGEST="$(docker buildx imagetools inspect "$VERSION_TAG" --format '{{ json .Manifest.Digest }}' | tr -d '"')"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Cosign sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            ghcr.io/leolilley/ryeos-standard@${{ steps.push-standard.outputs.digest }}
