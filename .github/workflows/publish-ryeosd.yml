name: Publish RyeOS release artifacts

# Triggered by project release tags. Publishes signed GHCR images plus the
# officially signed bundle archive consumed by native packages.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (without `v` prefix), e.g. 0.5.0"
        required: true
        type: string
      skip_workspace_tests:
        description: "Operator override: publish without running the workspace test gate"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ryeos-release-publish
  cancel-in-progress: false

jobs:
  qualify:
    name: Qualify release source
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.release.outputs.version }}
      build_date: ${{ steps.release.outputs.build_date }}
      source_sha: ${{ steps.source.outputs.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install checksum-pinned workflow and shell linters
        run: ./scripts/ci/install-static-linters.sh "$RUNNER_TEMP/ryeos-linters"

      - name: Check workflows and release/install shell
        run: ./scripts/ci/lint-workflows-and-shell.sh "$RUNNER_TEMP/ryeos-linters"

      - name: Resolve and validate version
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          VERSION="$(scripts/release/resolve-version.sh \
            "$EVENT_NAME" "$REF_NAME" "$REQUESTED_VERSION")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Check release version resolver cases
        run: ./scripts/release/test-resolve-version.sh

      - name: Resolve and verify source revision
        id: source
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          git fetch --force --tags
          SOURCE_SHA="$(git rev-parse HEAD)"
          TAG="v${VERSION}"
          if ! TAG_COMMIT="$(git rev-parse --verify "${TAG}^{commit}")"; then
            echo "::error::Release tag $TAG does not exist"
            exit 1
          fi
          if [ "$SOURCE_SHA" != "$TAG_COMMIT" ]; then
            echo "::error::Release source mismatch: checked-out HEAD $SOURCE_SHA != $TAG $TAG_COMMIT"
            exit 1
          fi

          echo "sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "Source SHA: $SOURCE_SHA"
          echo "Tag commit: $TAG_COMMIT"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcap-dev binutils xz-utils pkg-config libssl-dev ca-certificates openssl

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master, pinned
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Install cargo-nextest
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_workspace_tests }}
        uses: taiki-e/install-action@e658debeddbabf20b2b866d9235eb08a2375b1ad # nextest

      - name: Install cargo-deny
        uses: taiki-e/install-action@1725d1806acf0cd664ecc8dd0fcff6d896453dcf # cargo-deny

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check Clippy policy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Check dependency advisories, licenses, and sources
        run: cargo deny check

      - name: Scan repository history for secrets
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_workspace_tests }}
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan release revision for secrets
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_workspace_tests }}
        env:
          GITLEAKS_ARCHIVE_SHA256: 9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c
          GITLEAKS_VERSION: 8.24.3
        run: |
          ARCHIVE="$RUNNER_TEMP/gitleaks.tar.gz"
          INSTALL_DIR="$RUNNER_TEMP/gitleaks"
          curl --fail --silent --show-error --location \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            --output "$ARCHIVE"
          echo "${GITLEAKS_ARCHIVE_SHA256}  ${ARCHIVE}" | sha256sum --check --strict
          mkdir -p "$INSTALL_DIR"
          tar -xzf "$ARCHIVE" -C "$INSTALL_DIR" gitleaks
          "$INSTALL_DIR/gitleaks" git --redact --verbose --log-opts=-1 "$GITHUB_WORKSPACE"

      - name: Run release qualification gate
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_workspace_tests }}
        env:
          GATE_BUILD_JOBS: 2
          GATE_BUNDLE_TARGET_DIR: ${{ runner.temp }}/ryeos-bundle-target
          GATE_TEST_THREADS: 2
        run: ./scripts/gate.sh --refresh-bundles

  publish:
    name: Publish qualified artifacts
    needs: qualify
    runs-on: ubuntu-latest
    permissions:
      contents: write # immutable bundle assets on the GitHub release
      packages: write
      id-token: write # for cosign keyless signing
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ needs.qualify.outputs.source_sha }}

      - name: Verify qualified source revision
        env:
          EXPECTED_SHA: ${{ needs.qualify.outputs.source_sha }}
        run: |
          SOURCE_SHA="$(git rev-parse HEAD)"
          if [ "$SOURCE_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::Publish source $SOURCE_SHA differs from qualified source $EXPECTED_SHA"
            exit 1
          fi

      - name: Resolve immutable bundle assets
        id: bundle-assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.qualify.outputs.version }}
        run: |
          TAG="v${VERSION}"
          ARCHIVE="ryeos-bundles-${VERSION}-x86_64.tar.gz"
          CHECKSUM="${ARCHIVE}.sha256"
          ARTIFACT_DIR="$RUNNER_TEMP/ryeos-release-artifacts"
          ARCHIVE_EXISTS=false
          CHECKSUM_EXISTS=false
          [[ ! -e "$ARTIFACT_DIR" ]] || {
            echo "::error::Bundle artifact workspace already exists: $ARTIFACT_DIR"
            exit 1
          }
          if gh release view "$TAG" >/dev/null 2>&1; then
            EXISTING_ASSETS="$(gh release view "$TAG" --json assets --jq '.assets[].name')"
            ARCHIVE_COUNT="$(grep -Fxc "$ARCHIVE" <<<"$EXISTING_ASSETS" || true)"
            CHECKSUM_COUNT="$(grep -Fxc "$CHECKSUM" <<<"$EXISTING_ASSETS" || true)"
            if (( ARCHIVE_COUNT > 1 || CHECKSUM_COUNT > 1 )); then
              echo "::error::Duplicate immutable bundle assets exist for $TAG"
              exit 1
            fi
            if (( ARCHIVE_COUNT == 1 )); then ARCHIVE_EXISTS=true; fi
            if (( CHECKSUM_COUNT == 1 )); then CHECKSUM_EXISTS=true; fi
          fi
          if [[ "$CHECKSUM_EXISTS" == true && "$ARCHIVE_EXISTS" != true ]]; then
            echo "::error::Unsafe checksum-only bundle release state for $TAG; refusing regeneration"
            echo "::error::Follow .ai/knowledge/ryeos/development/release-process.md#interrupted-release-recovery; never guess which archive an orphan checksum described."
            exit 1
          fi
          if [[ "$ARCHIVE_EXISTS" == true ]]; then
            mkdir "$ARTIFACT_DIR"
            gh release download "$TAG" --dir "$ARTIFACT_DIR" --pattern "$ARCHIVE"
            if [[ "$CHECKSUM_EXISTS" == true ]]; then
              gh release download "$TAG" --dir "$ARTIFACT_DIR" --pattern "$CHECKSUM"
              scripts/release/verify-bundle-artifact.sh \
                --version "$VERSION" \
                --archive "$ARTIFACT_DIR/$ARCHIVE" \
                --checksum "$ARTIFACT_DIR/$CHECKSUM"
            else
              # Archive-first publication is recoverable despite nondeterministic
              # authoring timestamps: keep the existing archive canonical and
              # derive its missing checksum instead of re-signing content.
              scripts/release/verify-bundle-artifact.sh \
                --version "$VERSION" \
                --archive "$ARTIFACT_DIR/$ARCHIVE"
              (
                cd "$ARTIFACT_DIR"
                sha256sum "$ARCHIVE" > "$CHECKSUM"
              )
            fi
          fi
          echo "archive_exists=$ARCHIVE_EXISTS" >> "$GITHUB_OUTPUT"
          echo "checksum_exists=$CHECKSUM_EXISTS" >> "$GITHUB_OUTPUT"

      - name: Assert publisher key secret exists
        env:
          PUBLISHER_KEY: ${{ secrets.RYEOS_PUBLISHER_KEY }}
        run: |
          test -n "$PUBLISHER_KEY" || \
            { echo "ERROR: RYEOS_PUBLISHER_KEY secret is not set"; exit 1; }

      - name: Verify publisher key matches OFFICIAL_PUBLISHER_FP
        env:
          PUBLISHER_KEY: ${{ secrets.RYEOS_PUBLISHER_KEY }}
        run: |
          EXPECTED="$(scripts/release/official-publisher-fingerprint.sh)"
          echo "Compiled-in OFFICIAL_PUBLISHER_FP: $EXPECTED"

          # Write the secret to a temp file so openssl can read it.
          KEY_FILE="$(mktemp)"
          trap 'rm -f "$KEY_FILE"' EXIT
          printf '%s\n' "$PUBLISHER_KEY" > "$KEY_FILE"

          # Compute the fingerprint: sha256 of the raw 32-byte Ed25519
          # verifying key (last 32 bytes of the DER-encoded public key).
          ACTUAL=$(openssl pkey -in "$KEY_FILE" -pubout -outform DER 2>/dev/null \
            | tail -c 32 \
            | sha256sum \
            | cut -d' ' -f1)
          echo "Secret key fingerprint:          $ACTUAL"

          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::Publisher key fingerprint mismatch: secret=$ACTUAL compiled=$EXPECTED"
            echo "The RYEOS_PUBLISHER_KEY secret does not match the OFFICIAL_PUBLISHER_FP"
            echo "compiled into crates/daemon/ryeos-node/src/init.rs."
            echo "Either update the secret or update the source constant."
            exit 1
          fi
          echo "Publisher key fingerprint matches."

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and preflight official bundle archive
        if: steps.bundle-assets.outputs.archive_exists != 'true'
        env:
          PUBLISHER_KEY: ${{ secrets.RYEOS_PUBLISHER_KEY }}
          VERSION: ${{ needs.qualify.outputs.version }}
          SOURCE_SHA: ${{ needs.qualify.outputs.source_sha }}
          BUILD_DATE: ${{ needs.qualify.outputs.build_date }}
        run: |
          ARTIFACT_DIR="$RUNNER_TEMP/ryeos-release-artifacts"
          SOURCE_DATE_EPOCH="$(git show -s --format=%ct "$SOURCE_SHA")"
          if [[ -e "$ARTIFACT_DIR" ]]; then
            echo "::error::Bundle artifact output already exists: $ARTIFACT_DIR"
            exit 1
          fi
          mkdir "$ARTIFACT_DIR"
          docker buildx build \
            --file Dockerfile.release-bundles \
            --target artifact \
            --platform linux/amd64 \
            --output "type=local,dest=${ARTIFACT_DIR}" \
            --secret id=publisher-key,env=PUBLISHER_KEY \
            --build-arg "VERSION=${VERSION}" \
            --build-arg "SOURCE_DATE_EPOCH=${SOURCE_DATE_EPOCH}" \
            --build-arg "VCS_REF=${SOURCE_SHA}" \
            --build-arg "BUILD_DATE=${BUILD_DATE}" \
            .
          (
            cd "$ARTIFACT_DIR"
            sha256sum -c "ryeos-bundles-${VERSION}-x86_64.tar.gz.sha256"
          )

      - name: Build standard image for verification
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile.standard
          # linux/amd64 only for now — bundle bin/ trees only contain
          # x86_64-unknown-linux-gnu binaries. Add arm64 once we ship arm64
          # binaries in the bundles.
          platforms: linux/amd64
          load: true
          push: false
          pull: true
          cache-from: type=gha,scope=ryeos-release-image
          cache-to: type=gha,scope=ryeos-release-image,mode=max
          # Injected into the binary at compile time (.git is dockerignored, so
          # the in-container git fallback can't resolve the SHA) and onto the
          # image as OCI labels via the Dockerfile ARGs.
          build-args: |
            VCS_REF=${{ needs.qualify.outputs.source_sha }}
            BUILD_DATE=${{ needs.qualify.outputs.build_date }}
          tags: |
            ghcr.io/leolilley/ryeos-standard:verify-${{ github.run_id }}
          secrets: |
            "publisher-key=${{ secrets.RYEOS_PUBLISHER_KEY }}"

      - name: Verify standard image provenance
        env:
          EXPECTED: ${{ needs.qualify.outputs.source_sha }}
        run: |
          IMG="ghcr.io/leolilley/ryeos-standard:verify-${{ github.run_id }}"

          ACTUAL="$(docker run --rm --entrypoint /usr/local/bin/ryeosd "$IMG" build-info --revision)"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::stale ryeosd binary: binary=$ACTUAL expected=$EXPECTED"
            exit 1
          fi

          LABEL_REV="$(docker image inspect "$IMG" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
          if [ "$LABEL_REV" != "$EXPECTED" ]; then
            echo "::error::image revision label mismatch: label=$LABEL_REV expected=$EXPECTED"
            exit 1
          fi

      - name: Cryptographically preflight reused bundle archive
        if: steps.bundle-assets.outputs.archive_exists == 'true'
        env:
          VERSION: ${{ needs.qualify.outputs.version }}
        run: |
          ARTIFACT_DIR="$RUNNER_TEMP/ryeos-release-artifacts"
          ARCHIVE="$ARTIFACT_DIR/ryeos-bundles-${VERSION}-x86_64.tar.gz"
          EXTRACTED="$RUNNER_TEMP/reused-bundle-preflight"
          [[ ! -e "$EXTRACTED" ]]
          scripts/release/verify-bundle-artifact.sh \
            --version "$VERSION" \
            --archive "$ARCHIVE"
          mkdir "$EXTRACTED"
          tar --no-same-owner --no-same-permissions \
            -xzf "$ARCHIVE" -C "$EXTRACTED"
          docker run --rm \
            --entrypoint /usr/local/bin/ryeos \
            -v "$EXTRACTED/ryeos-bundles-${VERSION}-x86_64:/source:ro" \
            "ghcr.io/leolilley/ryeos-standard:verify-${{ github.run_id }}" \
            init --app-root /tmp/retry-bundle-app --source /source

      # ── central-host image: standard + central-auth + web ──
      # Base for app-hosting nodes (e.g. tv-tracker) that host their own
      # central-auth realm and use rye/web/search. Same build/verify/push/sign
      # flow as the standard image above.
      - name: Build central-host image for verification
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile.central-host
          # linux/amd64 only for now — bundle bin/ trees only contain
          # x86_64-unknown-linux-gnu binaries. Add arm64 once we ship arm64
          # binaries in the bundles.
          platforms: linux/amd64
          load: true
          push: false
          pull: true
          cache-from: type=gha,scope=ryeos-release-image
          cache-to: type=gha,scope=ryeos-release-image,mode=max
          build-args: |
            VCS_REF=${{ needs.qualify.outputs.source_sha }}
            BUILD_DATE=${{ needs.qualify.outputs.build_date }}
          tags: |
            ghcr.io/leolilley/ryeos-central-host:verify-${{ github.run_id }}
          secrets: |
            "publisher-key=${{ secrets.RYEOS_PUBLISHER_KEY }}"

      - name: Verify central-host image provenance
        env:
          EXPECTED: ${{ needs.qualify.outputs.source_sha }}
        run: |
          IMG="ghcr.io/leolilley/ryeos-central-host:verify-${{ github.run_id }}"

          ACTUAL="$(docker run --rm --entrypoint /usr/local/bin/ryeosd "$IMG" build-info --revision)"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::stale ryeosd binary: binary=$ACTUAL expected=$EXPECTED"
            exit 1
          fi

          LABEL_REV="$(docker image inspect "$IMG" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
          if [ "$LABEL_REV" != "$EXPECTED" ]; then
            echo "::error::image revision label mismatch: label=$LABEL_REV expected=$EXPECTED"
            exit 1
          fi

      - name: Smoke standard image default-disabled profile
        env:
          IMG: ghcr.io/leolilley/ryeos-standard:verify-${{ github.run_id }}
        run: |
          VOLUME="ryeos-release-disabled-${{ github.run_id }}"
          CONTAINER="ryeos-release-disabled-${{ github.run_id }}"
          cleanup() {
            docker rm -f "$CONTAINER" >/dev/null 2>&1 || true
            docker volume rm "$VOLUME" >/dev/null 2>&1 || true
          }
          reports_running() {
            LIFECYCLE_STATUS_JSON="$1" python3 - <<'PY'
          import json
          import os

          report = json.loads(os.environ["LIFECYCLE_STATUS_JSON"])
          running = report.get("Running")
          if not isinstance(running, dict) or not isinstance(running.get("metadata"), dict):
              raise SystemExit(f"node is not Running: {report!r}")
          PY
          }
          wait_ready() {
            local report
            for attempt in $(seq 1 60); do
              if report="$(docker exec "$CONTAINER" ryeos node status --json 2>/dev/null)" && \
                 reports_running "$report" && \
                 docker exec "$CONTAINER" ryeos daemon status >/dev/null 2>&1; then
                return 0
              fi
              if [ "$attempt" -eq 60 ]; then
                docker logs "$CONTAINER"
                return 1
              fi
              sleep 1
            done
          }
          assert_isolation_mode() {
            local expected="$1"
            local daemon_report doctor_report
            daemon_report="$(docker exec "$CONTAINER" ryeos daemon status)"
            DAEMON_STATUS_JSON="$daemon_report" EXPECTED_ISOLATION_MODE="$expected" python3 - <<'PY'
          import json
          import os
          import re

          report = json.loads(os.environ["DAEMON_STATUS_JSON"])
          isolation = report.get("isolation") or {}
          expected = os.environ["EXPECTED_ISOLATION_MODE"]
          if isolation.get("version") != 1 or isolation.get("mode") != expected:
              raise SystemExit(
                  f"running daemon isolation mismatch: expected version=1 mode={expected!r}, isolation={isolation!r}"
              )
          if isolation.get("source") != "/data/app/.ai/node/isolation.yaml":
              raise SystemExit(f"running daemon reported the wrong isolation source: {isolation!r}")
          if not re.fullmatch(r"sha256:[0-9a-f]{64}", isolation.get("policy_digest") or ""):
              raise SystemExit(f"running daemon did not report a policy digest: {isolation!r}")
          backend = isolation.get("backend") or {}
          if backend.get("selection") is not None:
              raise SystemExit(f"disabled daemon unexpectedly selected an isolation backend: {backend!r}")
          if any(backend.get(field) for field in (
              "bundle_manifest_digest", "signer_fingerprint", "adapter_build",
              "effective_capabilities", "artifacts",
          )):
              raise SystemExit(f"disabled daemon unexpectedly loaded an isolation backend: {backend!r}")
          PY
            doctor_report="$(docker exec "$CONTAINER" ryeos node doctor --json --no-bundles)"
            ISOLATION_DOCTOR_JSON="$doctor_report" EXPECTED_ISOLATION_MODE="$expected" python3 - <<'PY'
          import json
          import os

          report = json.loads(os.environ["ISOLATION_DOCTOR_JSON"])
          matches = [row for row in report.get("checks", []) if row.get("name") == "isolation"]
          if len(matches) != 1:
              raise SystemExit(f"expected one isolation doctor row, got {matches!r}")
          detail = matches[0].get("detail") or {}
          expected = os.environ["EXPECTED_ISOLATION_MODE"]
          if detail.get("version") != 1 or detail.get("mode") != expected:
              raise SystemExit(
                  f"isolation doctor mismatch: expected version=1 mode={expected!r}, detail={detail!r}"
              )
          expected_backend = "disabled"
          if detail.get("backend_status") != expected_backend:
              raise SystemExit(
                  f"isolation backend status mismatch: expected {expected_backend!r}, detail={detail!r}"
              )
          readable = (detail.get("filesystem") or {}).get("readable") or []
          if "{node_public_identity}" not in readable:
              raise SystemExit(f"node public identity binding missing: detail={detail!r}")
          PY
          }
          trap cleanup EXIT
          docker volume create "$VOLUME"
          docker run -d --name "$CONTAINER" \
            -v "$VOLUME:/data" \
            "$IMG"
          wait_ready
          assert_isolation_mode disabled
          docker exec --workdir /tmp "$CONTAINER" \
            ryeos execute tool:ryeos/core/identity/public_key
          docker restart "$CONTAINER"
          wait_ready
          assert_isolation_mode disabled

      - name: Scan standard image for known vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/leolilley/ryeos-standard:verify-${{ github.run_id }}
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          # Keep the gate actionable: fixed findings fail; distro findings with
          # no available remediation remain reported without blocking release.
          ignore-unfixed: true
          exit-code: 1

      - name: Scan central-host image for known vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/leolilley/ryeos-central-host:verify-${{ github.run_id }}
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          # Keep the gate actionable: fixed findings fail; distro findings with
          # no available remediation remain reported without blocking release.
          ignore-unfixed: true
          exit-code: 1

      # Registry credentials are deliberately unavailable until every release
      # image has been built and its embedded provenance has been verified.
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve immutable version tags
        id: resolve-images
        env:
          VERSION: ${{ needs.qualify.outputs.version }}
        run: |
          resolve_image() {
            local image="$1"
            local output_prefix="$2"
            local tag="ghcr.io/leolilley/${image}:${VERSION}"
            local error_file inspection digest
            error_file="$(mktemp)"
            if inspection="$(docker buildx imagetools inspect "$tag" 2>"$error_file")"; then
              digest="$(awk '$1 == "Digest:" { print $2; exit }' <<<"$inspection")"
              [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]] || {
                echo "::error::Could not resolve immutable digest for $tag"
                exit 1
              }
              echo "${output_prefix}_exists=true" >> "$GITHUB_OUTPUT"
              echo "${output_prefix}_digest=$digest" >> "$GITHUB_OUTPUT"
              echo "Reusing $tag at $digest"
            elif grep -Eqi 'manifest unknown|not found|no such manifest|404' "$error_file"; then
              echo "${output_prefix}_exists=false" >> "$GITHUB_OUTPUT"
              echo "${output_prefix}_digest=" >> "$GITHUB_OUTPUT"
              echo "No immutable tag exists yet: $tag"
            else
              cat "$error_file" >&2
              echo "::error::Unable to determine whether immutable tag exists: $tag"
              exit 1
            fi
            rm -f "$error_file"
          }
          resolve_image ryeos-standard standard
          resolve_image ryeos-central-host central

      # The pre-login images above exist only for local qualification. Build
      # only missing immutable tags; an existing tag remains canonical after
      # its resolved digest passes the same checks below.
      - name: Build and push attested immutable standard version
        id: push-standard
        if: steps.resolve-images.outputs.standard_exists != 'true'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile.standard
          platforms: linux/amd64
          push: true
          pull: true
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=ryeos-release-image
          cache-to: type=gha,scope=ryeos-release-image,mode=max
          build-args: |
            VCS_REF=${{ needs.qualify.outputs.source_sha }}
            BUILD_DATE=${{ needs.qualify.outputs.build_date }}
          tags: ghcr.io/leolilley/ryeos-standard:${{ needs.qualify.outputs.version }}
          secrets: |
            "publisher-key=${{ secrets.RYEOS_PUBLISHER_KEY }}"

      - name: Build and push attested immutable central-host version
        id: push-central-host
        if: steps.resolve-images.outputs.central_exists != 'true'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile.central-host
          platforms: linux/amd64
          push: true
          pull: true
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=ryeos-release-image
          cache-to: type=gha,scope=ryeos-release-image,mode=max
          build-args: |
            VCS_REF=${{ needs.qualify.outputs.source_sha }}
            BUILD_DATE=${{ needs.qualify.outputs.build_date }}
          tags: ghcr.io/leolilley/ryeos-central-host:${{ needs.qualify.outputs.version }}
          secrets: |
            "publisher-key=${{ secrets.RYEOS_PUBLISHER_KEY }}"

      - name: Resolve qualified release digests
        id: release-digests
        env:
          EXISTING_STANDARD: ${{ steps.resolve-images.outputs.standard_digest }}
          PUSHED_STANDARD: ${{ steps.push-standard.outputs.digest }}
          EXISTING_CENTRAL: ${{ steps.resolve-images.outputs.central_digest }}
          PUSHED_CENTRAL: ${{ steps.push-central-host.outputs.digest }}
        run: |
          STANDARD_DIGEST="${EXISTING_STANDARD:-$PUSHED_STANDARD}"
          CENTRAL_DIGEST="${EXISTING_CENTRAL:-$PUSHED_CENTRAL}"
          [[ "$STANDARD_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "$CENTRAL_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          echo "standard=$STANDARD_DIGEST" >> "$GITHUB_OUTPUT"
          echo "central=$CENTRAL_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Verify release image provenance and SBOM attestations
        env:
          STANDARD_DIGEST: ${{ steps.release-digests.outputs.standard }}
          CENTRAL_DIGEST: ${{ steps.release-digests.outputs.central }}
          SOURCE_SHA: ${{ needs.qualify.outputs.source_sha }}
        run: |
          for spec in \
            "standard ryeos-standard $STANDARD_DIGEST" \
            "central ryeos-central-host $CENTRAL_DIGEST"
          do
            read -r label image digest <<<"$spec"
            immutable="ghcr.io/leolilley/${image}@${digest}"
            docker buildx imagetools inspect "$immutable" \
              --format '{{ json .Provenance }}' > "$RUNNER_TEMP/${label}-provenance.json"
            jq -e 'type == "object" and length > 0' "$RUNNER_TEMP/${label}-provenance.json"
            jq -e --arg sha "$SOURCE_SHA" \
              '.. | strings | select(. == $sha)' "$RUNNER_TEMP/${label}-provenance.json"
            docker buildx imagetools inspect "$immutable" \
              --format '{{ json .SBOM }}' > "$RUNNER_TEMP/${label}-sbom.json"
            jq -e 'type == "object" and length > 0' "$RUNNER_TEMP/${label}-sbom.json"
          done

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Resolve verified image signatures
        id: image-signatures
        env:
          STANDARD_DIGEST: ${{ steps.release-digests.outputs.standard }}
          CENTRAL_DIGEST: ${{ steps.release-digests.outputs.central }}
          STANDARD_EXISTED: ${{ steps.resolve-images.outputs.standard_exists }}
          CENTRAL_EXISTED: ${{ steps.resolve-images.outputs.central_exists }}
          CERTIFICATE_IDENTITY: https://github.com/${{ github.workflow_ref }}
          CERTIFICATE_OIDC_ISSUER: https://token.actions.githubusercontent.com
        run: |
          signature_state() {
            local label="$1"
            local image="$2"
            local existed="$3"
            if cosign verify \
              --certificate-identity "$CERTIFICATE_IDENTITY" \
              --certificate-oidc-issuer "$CERTIFICATE_OIDC_ISSUER" \
              "$image" >/dev/null 2>&1; then
              echo "${label}=true" >> "$GITHUB_OUTPUT"
            elif [[ "$existed" == true ]]; then
              # Registry attestations are only authenticated after the image
              # signature is verified. Never let a pre-positioned unsigned
              # digest ask this trusted workflow to bless its own provenance.
              echo "::error::Existing immutable image lacks the expected workflow signature: $image"
              echo "::error::Treat this incomplete tag as quarantined; follow .ai/knowledge/ryeos/development/release-process.md#interrupted-release-recovery instead of signing or overwriting it."
              exit 1
            else
              # This digest came directly from this run's successful push step;
              # provenance and SBOM were validated above before signing.
              echo "${label}=false" >> "$GITHUB_OUTPUT"
            fi
          }
          signature_state standard \
            "ghcr.io/leolilley/ryeos-standard@${STANDARD_DIGEST}" \
            "$STANDARD_EXISTED"
          signature_state central \
            "ghcr.io/leolilley/ryeos-central-host@${CENTRAL_DIGEST}" \
            "$CENTRAL_EXISTED"

      - name: Cosign sign newly pushed standard image
        if: steps.image-signatures.outputs.standard != 'true' && steps.resolve-images.outputs.standard_exists != 'true'
        env:
          COSIGN_EXPERIMENTAL: "true"
          DIGEST: ${{ steps.release-digests.outputs.standard }}
        run: cosign sign --yes "ghcr.io/leolilley/ryeos-standard@${DIGEST}"

      - name: Cosign sign newly pushed central-host image
        if: steps.image-signatures.outputs.central != 'true' && steps.resolve-images.outputs.central_exists != 'true'
        env:
          COSIGN_EXPERIMENTAL: "true"
          DIGEST: ${{ steps.release-digests.outputs.central }}
        run: cosign sign --yes "ghcr.io/leolilley/ryeos-central-host@${DIGEST}"

      - name: Verify release image signatures and immutable tag bindings
        env:
          VERSION: ${{ needs.qualify.outputs.version }}
          STANDARD_DIGEST: ${{ steps.release-digests.outputs.standard }}
          CENTRAL_DIGEST: ${{ steps.release-digests.outputs.central }}
          CERTIFICATE_IDENTITY: https://github.com/${{ github.workflow_ref }}
          CERTIFICATE_OIDC_ISSUER: https://token.actions.githubusercontent.com
        run: |
          for spec in \
            "ryeos-standard $STANDARD_DIGEST" \
            "ryeos-central-host $CENTRAL_DIGEST"
          do
            read -r image digest <<<"$spec"
            immutable="ghcr.io/leolilley/${image}@${digest}"
            cosign verify \
              --certificate-identity "$CERTIFICATE_IDENTITY" \
              --certificate-oidc-issuer "$CERTIFICATE_OIDC_ISSUER" \
              "$immutable"
            inspection="$(docker buildx imagetools inspect \
              "ghcr.io/leolilley/${image}:${VERSION}")"
            bound_digest="$(awk '$1 == "Digest:" { print $2; exit }' <<<"$inspection")"
            [[ "$bound_digest" == "$digest" ]] || {
              echo "::error::Immutable tag moved during release: $image:$VERSION"
              exit 1
            }
          done

      - name: Publish immutable official bundle assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.qualify.outputs.version }}
          ARCHIVE_EXISTS: ${{ steps.bundle-assets.outputs.archive_exists }}
          CHECKSUM_EXISTS: ${{ steps.bundle-assets.outputs.checksum_exists }}
        run: |
          TAG="v${VERSION}"
          ARTIFACT_DIR="$RUNNER_TEMP/ryeos-release-artifacts"
          ARCHIVE="$ARTIFACT_DIR/ryeos-bundles-${VERSION}-x86_64.tar.gz"
          CHECKSUM="${ARCHIVE}.sha256"
          test -s "$ARCHIVE"
          test -s "$CHECKSUM"
          scripts/release/verify-bundle-artifact.sh \
            --version "$VERSION" \
            --archive "$ARCHIVE" \
            --checksum "$CHECKSUM"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --verify-tag \
              --title "RyeOS ${VERSION}" \
              --generate-notes
          fi
          # Archive first makes an interrupted upload safely resumable: the
          # missing checksum can be derived from the already-canonical bytes.
          # No --clobber is ever used.
          if [[ "$ARCHIVE_EXISTS" != true ]]; then
            gh release upload "$TAG" "$ARCHIVE"
          fi
          if [[ "$CHECKSUM_EXISTS" != true ]]; then
            gh release upload "$TAG" "$CHECKSUM"
          fi

          PUBLISHED_DIR="$RUNNER_TEMP/verified-published-bundle"
          [[ ! -e "$PUBLISHED_DIR" ]]
          mkdir "$PUBLISHED_DIR"
          gh release download "$TAG" --dir "$PUBLISHED_DIR" \
            --pattern "$(basename "$ARCHIVE")" \
            --pattern "$(basename "$CHECKSUM")"
          scripts/release/verify-bundle-artifact.sh \
            --version "$VERSION" \
            --archive "$PUBLISHED_DIR/$(basename "$ARCHIVE")" \
            --checksum "$PUBLISHED_DIR/$(basename "$CHECKSUM")"

      # Mutable image tags move only after both immutable images and the native
      # bundle artifact have passed verification and publication.
      - name: Promote verified images to latest
        env:
          STANDARD_DIGEST: ${{ steps.release-digests.outputs.standard }}
          CENTRAL_DIGEST: ${{ steps.release-digests.outputs.central }}
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/leolilley/ryeos-standard:latest \
            "ghcr.io/leolilley/ryeos-standard@${STANDARD_DIGEST}"
          docker buildx imagetools create \
            --tag ghcr.io/leolilley/ryeos-central-host:latest \
            "ghcr.io/leolilley/ryeos-central-host@${CENTRAL_DIGEST}"
