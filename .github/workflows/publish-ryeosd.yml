name: Publish RyeOS image to GHCR

# Triggered by project release tags. The old Python PyPI publishing flow has
# been removed; the release artifact is the signed GHCR image.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (without `v` prefix), e.g. 0.5.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ryeos-release-publish
  cancel-in-progress: false

jobs:
  qualify:
    name: Qualify release source
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.release.outputs.version }}
      build_date: ${{ steps.release.outputs.build_date }}
      source_sha: ${{ steps.source.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve and validate version
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          VERSION="$(scripts/release/resolve-version.sh \
            "$EVENT_NAME" "$REF_NAME" "$REQUESTED_VERSION")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Check release version resolver cases
        run: ./scripts/release/test-resolve-version.sh

      - name: Resolve and verify source revision
        id: source
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          git fetch --force --tags
          SOURCE_SHA="$(git rev-parse HEAD)"
          TAG="v${VERSION}"
          if ! TAG_COMMIT="$(git rev-parse --verify "${TAG}^{commit}")"; then
            echo "::error::Release tag $TAG does not exist"
            exit 1
          fi
          if [ "$SOURCE_SHA" != "$TAG_COMMIT" ]; then
            echo "::error::Release source mismatch: checked-out HEAD $SOURCE_SHA != $TAG $TAG_COMMIT"
            exit 1
          fi

          echo "sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "Source SHA: $SOURCE_SHA"
          echo "Tag commit: $TAG_COMMIT"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev ca-certificates openssl

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run release qualification gate
        env:
          GATE_BUILD_JOBS: 2
          GATE_TEST_THREADS: 2
        run: ./scripts/gate.sh --refresh-bundles

  publish:
    name: Publish qualified images
    needs: qualify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # for cosign keyless signing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.qualify.outputs.source_sha }}

      - name: Verify qualified source revision
        env:
          EXPECTED_SHA: ${{ needs.qualify.outputs.source_sha }}
        run: |
          SOURCE_SHA="$(git rev-parse HEAD)"
          if [ "$SOURCE_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::Publish source $SOURCE_SHA differs from qualified source $EXPECTED_SHA"
            exit 1
          fi

      - name: Assert publisher key secret exists
        env:
          PUBLISHER_KEY: ${{ secrets.RYEOS_PUBLISHER_KEY }}
        run: |
          test -n "$PUBLISHER_KEY" || \
            { echo "ERROR: RYEOS_PUBLISHER_KEY secret is not set"; exit 1; }

      - name: Verify publisher key matches OFFICIAL_PUBLISHER_FP
        env:
          PUBLISHER_KEY: ${{ secrets.RYEOS_PUBLISHER_KEY }}
        run: |
          # Extract the compiled-in fingerprint from source (may span 2 lines).
          EXPECTED=$(grep -A1 'OFFICIAL_PUBLISHER_FP.*&str' \
            crates/daemon/ryeos-node/src/init.rs \
            | grep -oE '[0-9a-f]{64}' | head -1)
          echo "Compiled-in OFFICIAL_PUBLISHER_FP: $EXPECTED"

          # Write the secret to a temp file so openssl can read it.
          KEY_FILE="$(mktemp)"
          trap 'rm -f "$KEY_FILE"' EXIT
          printf '%s\n' "$PUBLISHER_KEY" > "$KEY_FILE"

          # Compute the fingerprint: sha256 of the raw 32-byte Ed25519
          # verifying key (last 32 bytes of the DER-encoded public key).
          ACTUAL=$(openssl pkey -in "$KEY_FILE" -pubout -outform DER 2>/dev/null \
            | tail -c 32 \
            | sha256sum \
            | cut -d' ' -f1)
          echo "Secret key fingerprint:          $ACTUAL"

          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::Publisher key fingerprint mismatch: secret=$ACTUAL compiled=$EXPECTED"
            echo "The RYEOS_PUBLISHER_KEY secret does not match the OFFICIAL_PUBLISHER_FP"
            echo "compiled into crates/daemon/ryeos-node/src/init.rs."
            echo "Either update the secret or update the source constant."
            exit 1
          fi
          echo "Publisher key fingerprint matches."

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build standard image for verification
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.standard
          # linux/amd64 only for now — bundle bin/ trees only contain
          # x86_64-unknown-linux-gnu binaries. Add arm64 once we ship arm64
          # binaries in the bundles.
          platforms: linux/amd64
          load: true
          push: false
          pull: true
          cache-from: type=gha,scope=ryeos-release-image
          cache-to: type=gha,scope=ryeos-release-image,mode=max
          # Injected into the binary at compile time (.git is dockerignored, so
          # the in-container git fallback can't resolve the SHA) and onto the
          # image as OCI labels via the Dockerfile ARGs.
          build-args: |
            VCS_REF=${{ needs.qualify.outputs.source_sha }}
            BUILD_DATE=${{ needs.qualify.outputs.build_date }}
          tags: |
            ghcr.io/leolilley/ryeos-standard:verify-${{ github.run_id }}
          secrets: |
            "publisher-key=${{ secrets.RYEOS_PUBLISHER_KEY }}"

      - name: Verify standard image provenance
        env:
          EXPECTED: ${{ needs.qualify.outputs.source_sha }}
        run: |
          IMG="ghcr.io/leolilley/ryeos-standard:verify-${{ github.run_id }}"

          ACTUAL="$(docker run --rm --entrypoint /usr/local/bin/ryeosd "$IMG" build-info --revision)"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::stale ryeosd binary: binary=$ACTUAL expected=$EXPECTED"
            exit 1
          fi

          LABEL_REV="$(docker image inspect "$IMG" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
          if [ "$LABEL_REV" != "$EXPECTED" ]; then
            echo "::error::image revision label mismatch: label=$LABEL_REV expected=$EXPECTED"
            exit 1
          fi

      # ── central-host image: standard + central-auth + web ──
      # Base for app-hosting nodes (e.g. tv-tracker) that host their own
      # central-auth realm and use rye/web/search. Same build/verify/push/sign
      # flow as the standard image above.
      - name: Build central-host image for verification
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.central-host
          # linux/amd64 only for now — bundle bin/ trees only contain
          # x86_64-unknown-linux-gnu binaries. Add arm64 once we ship arm64
          # binaries in the bundles.
          platforms: linux/amd64
          load: true
          push: false
          pull: true
          cache-from: type=gha,scope=ryeos-release-image
          cache-to: type=gha,scope=ryeos-release-image,mode=max
          build-args: |
            VCS_REF=${{ needs.qualify.outputs.source_sha }}
            BUILD_DATE=${{ needs.qualify.outputs.build_date }}
          tags: |
            ghcr.io/leolilley/ryeos-central-host:verify-${{ github.run_id }}
          secrets: |
            "publisher-key=${{ secrets.RYEOS_PUBLISHER_KEY }}"

      - name: Verify central-host image provenance
        env:
          EXPECTED: ${{ needs.qualify.outputs.source_sha }}
        run: |
          IMG="ghcr.io/leolilley/ryeos-central-host:verify-${{ github.run_id }}"

          ACTUAL="$(docker run --rm --entrypoint /usr/local/bin/ryeosd "$IMG" build-info --revision)"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::stale ryeosd binary: binary=$ACTUAL expected=$EXPECTED"
            exit 1
          fi

          LABEL_REV="$(docker image inspect "$IMG" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
          if [ "$LABEL_REV" != "$EXPECTED" ]; then
            echo "::error::image revision label mismatch: label=$LABEL_REV expected=$EXPECTED"
            exit 1
          fi

      # Registry credentials are deliberately unavailable until every release
      # image has been built and its embedded provenance has been verified.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push immutable standard version
        id: push-standard
        env:
          VERSION: ${{ needs.qualify.outputs.version }}
        run: |
          SRC="ghcr.io/leolilley/ryeos-standard:verify-${{ github.run_id }}"
          VERSION_TAG="ghcr.io/leolilley/ryeos-standard:${VERSION}"

          docker tag "$SRC" "$VERSION_TAG"
          docker push "$VERSION_TAG"

          DIGEST="$(docker buildx imagetools inspect "$VERSION_TAG" --format '{{ json .Manifest.Digest }}' | tr -d '"')"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Push immutable central-host version
        id: push-central-host
        env:
          VERSION: ${{ needs.qualify.outputs.version }}
        run: |
          SRC="ghcr.io/leolilley/ryeos-central-host:verify-${{ github.run_id }}"
          VERSION_TAG="ghcr.io/leolilley/ryeos-central-host:${VERSION}"

          docker tag "$SRC" "$VERSION_TAG"
          docker push "$VERSION_TAG"

          DIGEST="$(docker buildx imagetools inspect "$VERSION_TAG" --format '{{ json .Manifest.Digest }}' | tr -d '"')"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Cosign sign standard image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
          DIGEST: ${{ steps.push-standard.outputs.digest }}
        run: cosign sign --yes "ghcr.io/leolilley/ryeos-standard@${DIGEST}"

      - name: Cosign sign central-host image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
          DIGEST: ${{ steps.push-central-host.outputs.digest }}
        run: cosign sign --yes "ghcr.io/leolilley/ryeos-central-host@${DIGEST}"

      # Mutable tags move only after both immutable artifacts have passed
      # provenance verification, publication, and signing.
      - name: Promote verified images to latest
        env:
          VERSION: ${{ needs.qualify.outputs.version }}
        run: |
          STANDARD_VERSION="ghcr.io/leolilley/ryeos-standard:${VERSION}"
          CENTRAL_VERSION="ghcr.io/leolilley/ryeos-central-host:${VERSION}"

          docker buildx imagetools create \
            --tag ghcr.io/leolilley/ryeos-standard:latest \
            "$STANDARD_VERSION"
          docker buildx imagetools create \
            --tag ghcr.io/leolilley/ryeos-central-host:latest \
            "$CENTRAL_VERSION"
