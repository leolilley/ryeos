name: Publish ryeosd to GHCR

# Triggered ONLY by tags prefixed `ryeosd-v*` so it never collides with the
# Python `publish.yml` flow (which fires on `v*`). The two pipelines are
# fully isolated.

on:
  push:
    tags:
      - "ryeosd-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (without `ryeosd-v` prefix), e.g. 0.2.0"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write   # for cosign keyless signing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME#ryeosd-v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Assert publisher key secret exists
        run: |
          test -n "${{ secrets.RYEOS_PUBLISHER_KEY }}" || \
            { echo "ERROR: RYEOS_PUBLISHER_KEY secret is not set"; exit 1; }

      - name: Verify publisher key matches OFFICIAL_PUBLISHER_FP
        run: |
          # Extract the compiled-in fingerprint from source (may span 2 lines).
          EXPECTED=$(grep -A1 'OFFICIAL_PUBLISHER_FP.*&str' \
            ryeos-tools/src/actions/init.rs \
            | grep -oE '[0-9a-f]{64}' | head -1)
          echo "Compiled-in OFFICIAL_PUBLISHER_FP: $EXPECTED"

          # Write the secret to a temp file so openssl can read it.
          echo "${{ secrets.RYEOS_PUBLISHER_KEY }}" > /tmp/publisher-key.pem

          # Compute the fingerprint: sha256 of the raw 32-byte Ed25519
          # verifying key (last 32 bytes of the DER-encoded public key).
          ACTUAL=$(openssl pkey -in /tmp/publisher-key.pem -pubout -outform DER 2>/dev/null \
            | tail -c 32 \
            | sha256sum \
            | cut -d' ' -f1)
          rm -f /tmp/publisher-key.pem
          echo "Secret key fingerprint:          $ACTUAL"

          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::Publisher key fingerprint mismatch: secret=$ACTUAL compiled=$EXPECTED"
            echo "The RYEOS_PUBLISHER_KEY secret does not match the OFFICIAL_PUBLISHER_FP"
            echo "compiled into ryeos-tools/src/actions/init.rs."
            echo "Either update the secret or update the source constant."
            exit 1
          fi
          echo "Publisher key fingerprint matches."

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: ./Dockerfile
          # linux/amd64 only for now — bundle bin/ trees only contain
          # x86_64-unknown-linux-gnu binaries. Add arm64 once we ship arm64
          # binaries in the bundles.
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/leolilley/ryeosd-full:${{ steps.ver.outputs.version }}
            ghcr.io/leolilley/ryeosd-full:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
          secrets: |
            "publisher-key=${{ secrets.RYEOS_PUBLISHER_KEY }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Cosign sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            ghcr.io/leolilley/ryeosd-full@${{ steps.build.outputs.digest }}
