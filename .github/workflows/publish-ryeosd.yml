name: Publish RyeOS release artifacts

# Triggered by project release tags. Publishes signed GHCR images plus the
# officially signed bundle archive consumed by native packages.
# Workspace qualification belongs to CI and deliberately does not gate this
# workflow. Release-specific integrity and artifact checks remain fail-closed.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (without `v` prefix), e.g. 0.5.0"
        required: true
        type: string
      recovery_build_date:
        description: "Existing RFC3339 build timestamp to preserve cache/provenance on retry"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: ryeos-release-publish
  cancel-in-progress: false

jobs:
  qualify:
    name: Resolve release source
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.release.outputs.version }}
      build_date: ${{ steps.source.outputs.build_date }}
      source_sha: ${{ steps.source.outputs.sha }}
    steps:
      # On manual recovery, begin with the workflow revision selected by the
      # operator so version validation cannot execute code from an unvalidated
      # input ref. The immutable release tag is checked out below only after
      # the requested version passes the repository's strict resolver.
      - name: Check out release workflow source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Resolve and validate version
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          VERSION="$(scripts/release/resolve-version.sh \
            "$EVENT_NAME" "$REF_NAME" "$REQUESTED_VERSION")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Check out immutable release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: refs/tags/v${{ steps.release.outputs.version }}

      - name: Resolve and verify source revision
        id: source
        env:
          VERSION: ${{ steps.release.outputs.version }}
          RECOVERY_BUILD_DATE: ${{ inputs.recovery_build_date }}
        run: |
          git fetch --force --tags
          SOURCE_SHA="$(git rev-parse HEAD)"
          TAG="v${VERSION}"
          if ! TAG_COMMIT="$(git rev-parse --verify "${TAG}^{commit}")"; then
            echo "::error::Release tag $TAG does not exist"
            exit 1
          fi
          if [ "$SOURCE_SHA" != "$TAG_COMMIT" ]; then
            echo "::error::Release source mismatch: checked-out HEAD $SOURCE_SHA != $TAG $TAG_COMMIT"
            exit 1
          fi
          if [[ -n "$RECOVERY_BUILD_DATE" ]]; then
            if [[ ! "$RECOVERY_BUILD_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$ ]]; then
              echo "::error::Recovery build date must be an RFC3339 UTC timestamp"
              exit 1
            fi
            BUILD_DATE="$RECOVERY_BUILD_DATE"
          else
            BUILD_DATE="$(git show -s --format=%cI "$TAG_COMMIT")"
          fi

          echo "sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "build_date=$BUILD_DATE" >> "$GITHUB_OUTPUT"
          echo "Source SHA: $SOURCE_SHA"
          echo "Tag commit: $TAG_COMMIT"
          echo "Build date: $BUILD_DATE"

  publish:
    name: Publish release artifacts
    needs: qualify
    runs-on: ubuntu-latest
    permissions:
      contents: write # immutable bundle assets on the GitHub release
      packages: write
      id-token: write # for cosign keyless signing
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ needs.qualify.outputs.source_sha }}

      - name: Verify release source revision
        env:
          EXPECTED_SHA: ${{ needs.qualify.outputs.source_sha }}
        run: |
          SOURCE_SHA="$(git rev-parse HEAD)"
          if [ "$SOURCE_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::Publish source $SOURCE_SHA differs from release source $EXPECTED_SHA"
            exit 1
          fi

      - name: Resolve immutable bundle assets
        id: bundle-assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.qualify.outputs.version }}
        run: |
          TAG="v${VERSION}"
          ARCHIVE="ryeos-bundles-${VERSION}-x86_64.tar.gz"
          CHECKSUM="${ARCHIVE}.sha256"
          ARTIFACT_DIR="$RUNNER_TEMP/ryeos-release-artifacts"
          ARCHIVE_EXISTS=false
          CHECKSUM_EXISTS=false
          [[ ! -e "$ARTIFACT_DIR" ]] || {
            echo "::error::Bundle artifact workspace already exists: $ARTIFACT_DIR"
            exit 1
          }
          if gh release view "$TAG" >/dev/null 2>&1; then
            EXISTING_ASSETS="$(gh release view "$TAG" --json assets --jq '.assets[].name')"
            ARCHIVE_COUNT="$(grep -Fxc "$ARCHIVE" <<<"$EXISTING_ASSETS" || true)"
            CHECKSUM_COUNT="$(grep -Fxc "$CHECKSUM" <<<"$EXISTING_ASSETS" || true)"
            if (( ARCHIVE_COUNT > 1 || CHECKSUM_COUNT > 1 )); then
              echo "::error::Duplicate immutable bundle assets exist for $TAG"
              exit 1
            fi
            if (( ARCHIVE_COUNT == 1 )); then ARCHIVE_EXISTS=true; fi
            if (( CHECKSUM_COUNT == 1 )); then CHECKSUM_EXISTS=true; fi
          fi
          if [[ "$CHECKSUM_EXISTS" == true && "$ARCHIVE_EXISTS" != true ]]; then
            echo "::error::Unsafe checksum-only bundle release state for $TAG; refusing regeneration"
            echo "::error::Follow .ai/knowledge/ryeos/development/release-process.md#interrupted-release-recovery; never guess which archive an orphan checksum described."
            exit 1
          fi
          if [[ "$ARCHIVE_EXISTS" == true ]]; then
            mkdir "$ARTIFACT_DIR"
            gh release download "$TAG" --dir "$ARTIFACT_DIR" --pattern "$ARCHIVE"
            if [[ "$CHECKSUM_EXISTS" == true ]]; then
              gh release download "$TAG" --dir "$ARTIFACT_DIR" --pattern "$CHECKSUM"
              scripts/release/verify-bundle-artifact.sh \
                --version "$VERSION" \
                --archive "$ARTIFACT_DIR/$ARCHIVE" \
                --checksum "$ARTIFACT_DIR/$CHECKSUM"
            else
              # Archive-first publication is recoverable despite nondeterministic
              # authoring timestamps: keep the existing archive canonical and
              # derive its missing checksum instead of re-signing content.
              scripts/release/verify-bundle-artifact.sh \
                --version "$VERSION" \
                --archive "$ARTIFACT_DIR/$ARCHIVE"
              (
                cd "$ARTIFACT_DIR"
                sha256sum "$ARCHIVE" > "$CHECKSUM"
              )
            fi
          fi
          echo "archive_exists=$ARCHIVE_EXISTS" >> "$GITHUB_OUTPUT"
          echo "checksum_exists=$CHECKSUM_EXISTS" >> "$GITHUB_OUTPUT"

      - name: Assert publisher key secret exists
        env:
          PUBLISHER_KEY: ${{ secrets.RYEOS_PUBLISHER_KEY }}
        run: |
          test -n "$PUBLISHER_KEY" || \
            { echo "ERROR: RYEOS_PUBLISHER_KEY secret is not set"; exit 1; }

      - name: Verify publisher key matches OFFICIAL_PUBLISHER_FP
        env:
          PUBLISHER_KEY: ${{ secrets.RYEOS_PUBLISHER_KEY }}
        run: |
          EXPECTED="$(scripts/release/official-publisher-fingerprint.sh)"
          echo "Compiled-in OFFICIAL_PUBLISHER_FP: $EXPECTED"

          # Write the secret to a temp file so openssl can read it.
          KEY_FILE="$(mktemp)"
          trap 'rm -f "$KEY_FILE"' EXIT
          printf '%s\n' "$PUBLISHER_KEY" > "$KEY_FILE"

          # Compute the fingerprint: sha256 of the raw 32-byte Ed25519
          # verifying key (last 32 bytes of the DER-encoded public key).
          ACTUAL=$(openssl pkey -in "$KEY_FILE" -pubout -outform DER 2>/dev/null \
            | tail -c 32 \
            | sha256sum \
            | cut -d' ' -f1)
          echo "Secret key fingerprint:          $ACTUAL"

          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::Publisher key fingerprint mismatch: secret=$ACTUAL compiled=$EXPECTED"
            echo "The RYEOS_PUBLISHER_KEY secret does not match the OFFICIAL_PUBLISHER_FP"
            echo "compiled into crates/daemon/ryeos-node/src/init.rs."
            echo "Either update the secret or update the source constant."
            exit 1
          fi
          echo "Publisher key fingerprint matches."

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and preflight official bundle archive
        if: steps.bundle-assets.outputs.archive_exists != 'true'
        env:
          PUBLISHER_KEY: ${{ secrets.RYEOS_PUBLISHER_KEY }}
          VERSION: ${{ needs.qualify.outputs.version }}
          SOURCE_SHA: ${{ needs.qualify.outputs.source_sha }}
          BUILD_DATE: ${{ needs.qualify.outputs.build_date }}
        run: |
          ARTIFACT_DIR="$RUNNER_TEMP/ryeos-release-artifacts"
          SOURCE_DATE_EPOCH="$(git show -s --format=%ct "$SOURCE_SHA")"
          if [[ -e "$ARTIFACT_DIR" ]]; then
            echo "::error::Bundle artifact output already exists: $ARTIFACT_DIR"
            exit 1
          fi
          mkdir "$ARTIFACT_DIR"
          docker buildx build \
            --file Dockerfile.release-bundles \
            --target artifact \
            --platform linux/amd64 \
            --cache-from type=gha,scope=ryeos-release-image \
            --cache-from type=gha,scope=ryeos-release-bundles \
            --cache-to type=gha,scope=ryeos-release-bundles,mode=max \
            --output "type=local,dest=${ARTIFACT_DIR}" \
            --secret id=publisher-key,env=PUBLISHER_KEY \
            --build-arg "VERSION=${VERSION}" \
            --build-arg "SOURCE_DATE_EPOCH=${SOURCE_DATE_EPOCH}" \
            --build-arg "VCS_REF=${SOURCE_SHA}" \
            --build-arg "BUILD_DATE=${BUILD_DATE}" \
            .
          (
            cd "$ARTIFACT_DIR"
            sha256sum -c "ryeos-bundles-${VERSION}-x86_64.tar.gz.sha256"
          )

      # Publish the verified archive before image construction. If a later
      # image step fails, the immutable archive becomes the canonical retry
      # input and is downloaded instead of rebuilt.
      - name: Publish immutable official bundle assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.qualify.outputs.version }}
          ARCHIVE_EXISTS: ${{ steps.bundle-assets.outputs.archive_exists }}
          CHECKSUM_EXISTS: ${{ steps.bundle-assets.outputs.checksum_exists }}
        run: |
          TAG="v${VERSION}"
          ARTIFACT_DIR="$RUNNER_TEMP/ryeos-release-artifacts"
          ARCHIVE="$ARTIFACT_DIR/ryeos-bundles-${VERSION}-x86_64.tar.gz"
          CHECKSUM="${ARCHIVE}.sha256"
          test -s "$ARCHIVE"
          test -s "$CHECKSUM"
          scripts/release/verify-bundle-artifact.sh \
            --version "$VERSION" \
            --archive "$ARCHIVE" \
            --checksum "$CHECKSUM"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --verify-tag \
              --title "RyeOS ${VERSION}" \
              --generate-notes
          fi
          # Archive first makes an interrupted upload safely resumable: the
          # missing checksum can be derived from the already-canonical bytes.
          # No --clobber is ever used.
          if [[ "$ARCHIVE_EXISTS" != true ]]; then
            gh release upload "$TAG" "$ARCHIVE"
          fi
          if [[ "$CHECKSUM_EXISTS" != true ]]; then
            gh release upload "$TAG" "$CHECKSUM"
          fi

          PUBLISHED_DIR="$RUNNER_TEMP/verified-published-bundle"
          [[ ! -e "$PUBLISHED_DIR" ]]
          mkdir "$PUBLISHED_DIR"
          gh release download "$TAG" --dir "$PUBLISHED_DIR" \
            --pattern "$(basename "$ARCHIVE")" \
            --pattern "$(basename "$CHECKSUM")"
          scripts/release/verify-bundle-artifact.sh \
            --version "$VERSION" \
            --archive "$PUBLISHED_DIR/$(basename "$ARCHIVE")" \
            --checksum "$PUBLISHED_DIR/$(basename "$CHECKSUM")"

      # Registry credentials are unavailable until the signed bundle archive
      # has been built and verified. Image provenance and signatures are
      # checked against the immutable pushed digests below.
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Resolve immutable and candidate image tags
        id: resolve-images
        env:
          VERSION: ${{ needs.qualify.outputs.version }}
          SOURCE_SHA: ${{ needs.qualify.outputs.source_sha }}
          BUILD_DATE: ${{ needs.qualify.outputs.build_date }}
        run: |
          resolve_tag() {
            local tag="$1"
            local output_prefix="$2"
            local error_file inspection digest
            error_file="$(mktemp)"
            if inspection="$(docker buildx imagetools inspect "$tag" 2>"$error_file")"; then
              digest="$(awk '$1 == "Digest:" { print $2; exit }' <<<"$inspection")"
              [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]] || {
                echo "::error::Could not resolve immutable digest for $tag"
                exit 1
              }
              echo "${output_prefix}_exists=true" >> "$GITHUB_OUTPUT"
              echo "${output_prefix}_digest=$digest" >> "$GITHUB_OUTPUT"
              echo "Reusing $tag at $digest"
            elif grep -Eqi 'manifest unknown|not found|no such manifest|404' "$error_file"; then
              echo "${output_prefix}_exists=false" >> "$GITHUB_OUTPUT"
              echo "${output_prefix}_digest=" >> "$GITHUB_OUTPUT"
              echo "No immutable tag exists yet: $tag"
            else
              cat "$error_file" >&2
              echo "::error::Unable to determine whether immutable tag exists: $tag"
              exit 1
            fi
            rm -f "$error_file"
          }
          BUILD_DATE_KEY="$(printf '%s' "$BUILD_DATE" | sha256sum | cut -c1-12)"
          CANDIDATE_SUFFIX="candidate-${VERSION}-${SOURCE_SHA}-${BUILD_DATE_KEY}"
          STANDARD_VERSION="ghcr.io/leolilley/ryeos-standard:${VERSION}"
          CENTRAL_VERSION="ghcr.io/leolilley/ryeos-central-host:${VERSION}"
          STANDARD_CANDIDATE="ghcr.io/leolilley/ryeos-standard:${CANDIDATE_SUFFIX}"
          CENTRAL_CANDIDATE="ghcr.io/leolilley/ryeos-central-host:${CANDIDATE_SUFFIX}"
          echo "standard_candidate_tag=$STANDARD_CANDIDATE" >> "$GITHUB_OUTPUT"
          echo "central_candidate_tag=$CENTRAL_CANDIDATE" >> "$GITHUB_OUTPUT"
          resolve_tag "$STANDARD_VERSION" standard
          resolve_tag "$CENTRAL_VERSION" central
          if [[ "$(grep '^standard_exists=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2)" != true ]]; then
            resolve_tag "$STANDARD_CANDIDATE" standard_candidate
          else
            echo "standard_candidate_exists=false" >> "$GITHUB_OUTPUT"
            echo "standard_candidate_digest=" >> "$GITHUB_OUTPUT"
          fi
          if [[ "$(grep '^central_exists=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2)" != true ]]; then
            resolve_tag "$CENTRAL_CANDIDATE" central_candidate
          else
            echo "central_candidate_exists=false" >> "$GITHUB_OUTPUT"
            echo "central_candidate_digest=" >> "$GITHUB_OUTPUT"
          fi

      # Build once to a source/build-date-scoped candidate. Qualification and
      # immutable promotion below operate on this exact pushed digest.
      - name: Build and push attested standard candidate
        id: push-standard
        if: steps.resolve-images.outputs.standard_exists != 'true' && steps.resolve-images.outputs.standard_candidate_exists != 'true'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile.standard
          platforms: linux/amd64
          push: true
          pull: true
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=ryeos-release-image
          cache-to: type=gha,scope=ryeos-release-image,mode=max
          build-args: |
            VCS_REF=${{ needs.qualify.outputs.source_sha }}
            BUILD_DATE=${{ needs.qualify.outputs.build_date }}
          tags: ${{ steps.resolve-images.outputs.standard_candidate_tag }}
          secrets: |
            "publisher-key=${{ secrets.RYEOS_PUBLISHER_KEY }}"

      - name: Build and push attested central-host candidate
        id: push-central-host
        if: steps.resolve-images.outputs.central_exists != 'true' && steps.resolve-images.outputs.central_candidate_exists != 'true'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile.central-host
          platforms: linux/amd64
          push: true
          pull: true
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=ryeos-release-image
          cache-to: type=gha,scope=ryeos-release-image,mode=max
          build-args: |
            VCS_REF=${{ needs.qualify.outputs.source_sha }}
            BUILD_DATE=${{ needs.qualify.outputs.build_date }}
          tags: ${{ steps.resolve-images.outputs.central_candidate_tag }}
          secrets: |
            "publisher-key=${{ secrets.RYEOS_PUBLISHER_KEY }}"

      - name: Resolve candidate release digests
        id: release-digests
        env:
          EXISTING_STANDARD: ${{ steps.resolve-images.outputs.standard_digest }}
          CANDIDATE_STANDARD: ${{ steps.resolve-images.outputs.standard_candidate_digest }}
          PUSHED_STANDARD: ${{ steps.push-standard.outputs.digest }}
          EXISTING_CENTRAL: ${{ steps.resolve-images.outputs.central_digest }}
          CANDIDATE_CENTRAL: ${{ steps.resolve-images.outputs.central_candidate_digest }}
          PUSHED_CENTRAL: ${{ steps.push-central-host.outputs.digest }}
        run: |
          STANDARD_DIGEST="${EXISTING_STANDARD:-${CANDIDATE_STANDARD:-$PUSHED_STANDARD}}"
          CENTRAL_DIGEST="${EXISTING_CENTRAL:-${CANDIDATE_CENTRAL:-$PUSHED_CENTRAL}}"
          [[ "$STANDARD_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "$CENTRAL_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          echo "standard=$STANDARD_DIGEST" >> "$GITHUB_OUTPUT"
          echo "central=$CENTRAL_DIGEST" >> "$GITHUB_OUTPUT"
          [[ -z "$EXISTING_STANDARD" && -z "$CANDIDATE_STANDARD" ]] && STANDARD_CURRENT=true || STANDARD_CURRENT=false
          [[ -z "$EXISTING_CENTRAL" && -z "$CANDIDATE_CENTRAL" ]] && CENTRAL_CURRENT=true || CENTRAL_CURRENT=false
          echo "standard_current=$STANDARD_CURRENT" >> "$GITHUB_OUTPUT"
          echo "central_current=$CENTRAL_CURRENT" >> "$GITHUB_OUTPUT"

      - name: Authenticate recovered image digests before inspection
        env:
          VERSION: ${{ needs.qualify.outputs.version }}
          STANDARD_DIGEST: ${{ steps.release-digests.outputs.standard }}
          CENTRAL_DIGEST: ${{ steps.release-digests.outputs.central }}
          STANDARD_CURRENT: ${{ steps.release-digests.outputs.standard_current }}
          CENTRAL_CURRENT: ${{ steps.release-digests.outputs.central_current }}
          CURRENT_IDENTITY: https://github.com/${{ github.workflow_ref }}
          TAG_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/publish-ryeosd.yml@refs/tags/v${{ needs.qualify.outputs.version }}
          CERTIFICATE_OIDC_ISSUER: https://token.actions.githubusercontent.com
        run: |
          authenticate_recovered() {
            local image="$1"
            local current="$2"
            [[ "$current" != true ]] || return 0
            if cosign verify \
              --certificate-identity "$TAG_IDENTITY" \
              --certificate-oidc-issuer "$CERTIFICATE_OIDC_ISSUER" \
              "$image" >/dev/null 2>&1; then
              return 0
            fi
            if cosign verify \
              --certificate-identity "$CURRENT_IDENTITY" \
              --certificate-oidc-issuer "$CERTIFICATE_OIDC_ISSUER" \
              "$image" >/dev/null 2>&1; then
              return 0
            fi
            echo "::error::Recovered image lacks an allowed workflow-identity signature: $image"
            exit 1
          }
          authenticate_recovered "ghcr.io/leolilley/ryeos-standard@${STANDARD_DIGEST}" "$STANDARD_CURRENT"
          authenticate_recovered "ghcr.io/leolilley/ryeos-central-host@${CENTRAL_DIGEST}" "$CENTRAL_CURRENT"

      - name: Verify release image provenance and SBOM attestations
        env:
          STANDARD_DIGEST: ${{ steps.release-digests.outputs.standard }}
          CENTRAL_DIGEST: ${{ steps.release-digests.outputs.central }}
          SOURCE_SHA: ${{ needs.qualify.outputs.source_sha }}
        run: |
          for spec in \
            "standard ryeos-standard $STANDARD_DIGEST" \
            "central ryeos-central-host $CENTRAL_DIGEST"
          do
            read -r label image digest <<<"$spec"
            immutable="ghcr.io/leolilley/${image}@${digest}"
            docker buildx imagetools inspect "$immutable" \
              --format '{{ json .Provenance }}' > "$RUNNER_TEMP/${label}-provenance.json"
            jq -e 'type == "object" and length > 0' "$RUNNER_TEMP/${label}-provenance.json"
            jq -e --arg sha "$SOURCE_SHA" \
              '.. | strings | select(. == $sha)' "$RUNNER_TEMP/${label}-provenance.json"
            docker buildx imagetools inspect "$immutable" \
              --format '{{ json .SBOM }}' > "$RUNNER_TEMP/${label}-sbom.json"
            jq -e 'type == "object" and length > 0' "$RUNNER_TEMP/${label}-sbom.json"
          done

      - name: Cosign sign newly pushed standard image
        if: steps.release-digests.outputs.standard_current == 'true'
        env:
          COSIGN_EXPERIMENTAL: "true"
          DIGEST: ${{ steps.release-digests.outputs.standard }}
        run: cosign sign --yes "ghcr.io/leolilley/ryeos-standard@${DIGEST}"

      - name: Cosign sign newly pushed central-host image
        if: steps.release-digests.outputs.central_current == 'true'
        env:
          COSIGN_EXPERIMENTAL: "true"
          DIGEST: ${{ steps.release-digests.outputs.central }}
        run: cosign sign --yes "ghcr.io/leolilley/ryeos-central-host@${DIGEST}"

      - name: Verify candidate image signatures
        env:
          VERSION: ${{ needs.qualify.outputs.version }}
          STANDARD_DIGEST: ${{ steps.release-digests.outputs.standard }}
          CENTRAL_DIGEST: ${{ steps.release-digests.outputs.central }}
          CURRENT_IDENTITY: https://github.com/${{ github.workflow_ref }}
          TAG_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/publish-ryeosd.yml@refs/tags/v${{ needs.qualify.outputs.version }}
          CERTIFICATE_OIDC_ISSUER: https://token.actions.githubusercontent.com
        run: |
          verify_release_signature() {
            local image="$1"
            if cosign verify \
              --certificate-identity "$TAG_IDENTITY" \
              --certificate-oidc-issuer "$CERTIFICATE_OIDC_ISSUER" \
              "$image" >/dev/null 2>&1; then
              return 0
            fi
            cosign verify \
              --certificate-identity "$CURRENT_IDENTITY" \
              --certificate-oidc-issuer "$CERTIFICATE_OIDC_ISSUER" \
              "$image"
          }
          for spec in \
            "ryeos-standard $STANDARD_DIGEST" \
            "ryeos-central-host $CENTRAL_DIGEST"
          do
            read -r image digest <<<"$spec"
            verify_release_signature "ghcr.io/leolilley/${image}@${digest}"
          done

      - name: Qualify exact standard image digest
        env:
          DIGEST: ${{ steps.release-digests.outputs.standard }}
        run: scripts/release/qualify-container-image.sh "ghcr.io/leolilley/ryeos-standard@${DIGEST}" standard --pid1-smoke

      - name: Qualify exact central-host image digest
        env:
          DIGEST: ${{ steps.release-digests.outputs.central }}
        run: scripts/release/qualify-container-image.sh "ghcr.io/leolilley/ryeos-central-host@${DIGEST}" central-host

      # Re-resolve immediately before each create. GHCR does not expose a
      # conditional create-tag API, so registry-level tag immutability remains
      # the strict cross-workflow guarantee; this closes the long
      # build/qualification check-use window and fails rather than overwriting
      # any version tag observed here.
      - name: Promote qualified digests to immutable versions
        env:
          VERSION: ${{ needs.qualify.outputs.version }}
          STANDARD_DIGEST: ${{ steps.release-digests.outputs.standard }}
          CENTRAL_DIGEST: ${{ steps.release-digests.outputs.central }}
          STANDARD_EXISTED: ${{ steps.resolve-images.outputs.standard_exists }}
          CENTRAL_EXISTED: ${{ steps.resolve-images.outputs.central_exists }}
        run: |
          promote_immutable() {
            local image="$1"
            local digest="$2"
            local existed="$3"
            local tag="ghcr.io/leolilley/${image}:${VERSION}"
            local error_file
            [[ "$existed" != true ]] || return 0
            error_file="$(mktemp)"
            if docker buildx imagetools inspect "$tag" >/dev/null 2>"$error_file"; then
              echo "::error::Refusing to overwrite immutable tag created during qualification: $tag"
              exit 1
            fi
            if ! grep -Eqi 'manifest unknown|not found|no such manifest|404' "$error_file"; then
              cat "$error_file" >&2
              echo "::error::Unable to recheck immutable tag immediately before promotion: $tag"
              exit 1
            fi
            rm -f "$error_file"
            docker buildx imagetools create \
              --tag "$tag" \
              "ghcr.io/leolilley/${image}@${digest}"
          }
          promote_immutable ryeos-standard "$STANDARD_DIGEST" "$STANDARD_EXISTED"
          promote_immutable ryeos-central-host "$CENTRAL_DIGEST" "$CENTRAL_EXISTED"

      - name: Verify immutable tag bindings
        env:
          VERSION: ${{ needs.qualify.outputs.version }}
          STANDARD_DIGEST: ${{ steps.release-digests.outputs.standard }}
          CENTRAL_DIGEST: ${{ steps.release-digests.outputs.central }}
        run: |
          for spec in \
            "ryeos-standard $STANDARD_DIGEST" \
            "ryeos-central-host $CENTRAL_DIGEST"
          do
            read -r image digest <<<"$spec"
            inspection="$(docker buildx imagetools inspect \
              "ghcr.io/leolilley/${image}:${VERSION}")"
            bound_digest="$(awk '$1 == "Digest:" { print $2; exit }' <<<"$inspection")"
            [[ "$bound_digest" == "$digest" ]] || {
              echo "::error::Immutable tag does not bind the qualified digest: $image:$VERSION"
              exit 1
            }
          done

      # Mutable image tags move only after both immutable images and the native
      # bundle artifact have passed verification and publication.
      - name: Promote verified images to latest
        env:
          STANDARD_DIGEST: ${{ steps.release-digests.outputs.standard }}
          CENTRAL_DIGEST: ${{ steps.release-digests.outputs.central }}
        run: |
          resolve_latest() {
            local image="$1"
            local inspection error_file digest
            error_file="$(mktemp)"
            if inspection="$(docker buildx imagetools inspect \
              "ghcr.io/leolilley/${image}:latest" 2>"$error_file")"; then
              digest="$(awk '$1 == "Digest:" { print $2; exit }' <<<"$inspection")"
              [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]] || {
                echo "::error::Could not resolve previous latest digest for $image"
                exit 1
              }
              rm -f "$error_file"
              printf '%s' "$digest"
              return 0
            fi
            if grep -Eqi 'manifest unknown|not found|no such manifest|404' "$error_file"; then
              rm -f "$error_file"
              return 0
            fi
            cat "$error_file" >&2
            echo "::error::Unable to resolve previous latest digest for $image"
            exit 1
          }
          PREVIOUS_STANDARD="$(resolve_latest ryeos-standard)"
          PREVIOUS_CENTRAL="$(resolve_latest ryeos-central-host)"
          docker buildx imagetools create \
            --tag ghcr.io/leolilley/ryeos-standard:latest \
            "ghcr.io/leolilley/ryeos-standard@${STANDARD_DIGEST}"
          if ! docker buildx imagetools create \
              --tag ghcr.io/leolilley/ryeos-central-host:latest \
              "ghcr.io/leolilley/ryeos-central-host@${CENTRAL_DIGEST}"; then
            if [[ "$PREVIOUS_STANDARD" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              if docker buildx imagetools create \
                  --tag ghcr.io/leolilley/ryeos-standard:latest \
                  "ghcr.io/leolilley/ryeos-standard@${PREVIOUS_STANDARD}"; then
                restored="$(docker buildx imagetools inspect \
                  ghcr.io/leolilley/ryeos-standard:latest)"
                restored_digest="$(awk '$1 == "Digest:" { print $2; exit }' <<<"$restored")"
                if [[ "$restored_digest" == "$PREVIOUS_STANDARD" ]]; then
                  echo "::error::Central-host latest promotion failed; standard latest was restored"
                else
                  echo "::error::Central-host latest promotion failed and standard rollback verification failed"
                fi
              else
                echo "::error::Central-host latest promotion failed and standard rollback failed"
              fi
            else
              echo "::error::Central-host latest promotion failed; no previous standard latest existed to restore"
            fi
            echo "::error::Previous central latest digest was ${PREVIOUS_CENTRAL:-absent}"
            exit 1
          fi
          for spec in \
            "ryeos-standard $STANDARD_DIGEST" \
            "ryeos-central-host $CENTRAL_DIGEST"
          do
            read -r image digest <<<"$spec"
            inspection="$(docker buildx imagetools inspect \
              "ghcr.io/leolilley/${image}:latest")"
            bound_digest="$(awk '$1 == "Digest:" { print $2; exit }' <<<"$inspection")"
            [[ "$bound_digest" == "$digest" ]] || {
              echo "::error::Latest channel does not bind the qualified digest: $image"
              exit 1
            }
          done
