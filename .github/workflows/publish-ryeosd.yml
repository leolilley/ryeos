name: Publish ryeosd to GHCR

# Triggered ONLY by tags prefixed `ryeosd-v*` so it never collides with the
# Python `publish.yml` flow (which fires on `v*`). The Python workflow does
# not exist on this branch; this workflow does not exist on `main`. The two
# pipelines are fully isolated.

on:
  push:
    tags:
      - "ryeosd-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (without `ryeosd-v` prefix), e.g. 0.1.0"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write   # for cosign keyless signing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME#ryeosd-v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: ./Dockerfile
          # linux/amd64 only for now — bundle bin/ trees only contain
          # x86_64-unknown-linux-gnu binaries. Add arm64 once we ship arm64
          # binaries in the bundles.
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/leolilley/ryeosd-full:${{ steps.ver.outputs.version }}
            ghcr.io/leolilley/ryeosd-full:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
          build-args: |
            RYE_SIGNING_SEED=1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Cosign sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            ghcr.io/leolilley/ryeosd-full@${{ steps.build.outputs.digest }}
